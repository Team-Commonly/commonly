server {
    listen 80;

    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Handle React Router routes by redirecting all requests to index.html
    location / {
        try_files $uri /index.html;
    }

    # Optional: Forward API requests to the backend
    location /api/ {
        proxy_pass http://backend:5000; # Adjust the backend service name and port if necessary
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Error handling for 404
    error_page 404 /index.html;

    # Static file caching (optional)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|mp4|webm|ogg|ogv|json)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}
