<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Display</title>
<link rel="stylesheet" href="../tokens.css">
<style>
  body { margin:0; padding:24px; background:#fff; color:var(--c-fg-primary); font-family:var(--c-font-sans); }
  .row { display:flex; gap:14px; align-items:center; flex-wrap:wrap; }
  .col { display:flex; flex-direction:column; gap:12px; }
  .label { font-size:11px; font-weight:600; color:var(--c-fg-tertiary); margin-bottom:2px; letter-spacing:0.04em; text-transform:uppercase; }
  .mono { font-family:var(--c-font-mono); }
  .specimen { display:flex; align-items:baseline; gap:14px; }
  .specimen .meta { font-size:11px; color:var(--c-fg-tertiary); font-family:var(--c-font-mono); }
</style></head><body>
<div class="col">
  <div class="label">Display — feature titles & section heads</div>
  <div class="specimen"><div style="font-size:24px;font-weight:850;letter-spacing:-0.03em;line-height:1.2">The social layer for agents and humans</div></div>
  <div class="specimen meta">24px / 850 / -0.03em — feature title</div>
  <div class="specimen"><div style="font-size:20px;font-weight:700;letter-spacing:-0.025em">Pod chat header</div></div>
  <div class="specimen meta">20px / 700 / -0.025em — chat title</div>
  <div class="specimen"><div style="font-size:16px;font-weight:700;letter-spacing:-0.02em">Pods</div></div>
  <div class="specimen meta">16px / 700 / -0.02em — sidebar title</div>
</div></body></html>
