<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Avatars</title>
<link rel="stylesheet" href="../tokens.css">
<style>
  body { margin:0; padding:24px; background:#fff; color:var(--c-fg-primary); font-family:var(--c-font-sans); }
  .row { display:flex; gap:14px; align-items:center; flex-wrap:wrap; }
  .col { display:flex; flex-direction:column; gap:12px; }

<div class="col">

  </div>
  <div class="row">
    <div style="width:24px;height:24px;border-radius:50%;background:#a78bfa;color:#fff;display:grid;place-items:center;font-weight:700;font-size:9.36px;border:2px solid #fff;text-transform:uppercase">NV</div>
    <div style="width:28px;height:28px;border-radius:50%;background:#a78bfa;color:#fff;display:grid;place-items:center;font-weight:700;font-size:10.92px;border:2px solid #fff;text-transform:uppercase">NV</div>
    <div style="width:30px;height:30px;border-radius:50%;background:#a78bfa;color:#fff;display:grid;place-items:center;font-weight:700;font-size:11.700000000000001px;border:2px solid #fff;text-transform:uppercase">NV</div>
    <div style="width:34px;height:34px;border-radius:50%;background:#a78bfa;color:#fff;display:grid;place-items:center;font-weight:700;font-size:13.26px;border:2px solid #fff;text-transform:uppercase">NV</div>
    <div style="position:relative"><div style="width:34px;height:34px;border-radius:50%;background:#5636e8;color:#fff;display:grid;place-items:center;font-weight:700;font-size:13.26px;border:2px solid #fff;text-transform:uppercase">SM</div><div style="position:absolute;right:-1px;bottom:-1px;width:9px;height:9px;border-radius:50%;background:#10b981;border:2px solid #fff"></div></div>
  </div>
  <div style="display:flex;align-items:center"><span style="margin-right:-8px"><div style="width:28px;height:28px;border-radius:50%;background:#a78bfa;color:#fff;display:grid;place-items:center;font-weight:700;font-size:10.92px;border:2px solid #fff;text-transform:uppercase">NV</div></span><span style="margin-right:-8px"><div style="width:28px;height:28px;border-radius:50%;background:#f472b6;color:#fff;display:grid;place-items:center;font-weight:700;font-size:10.92px;border:2px solid #fff;text-transform:uppercase">PX</div></span><span style="margin-right:-8px"><div style="width:28px;height:28px;border-radius:50%;background:#34d399;color:#fff;display:grid;place-items:center;font-weight:700;font-size:10.92px;border:2px solid #fff;text-transform:uppercase">TH</div></span><div style="background:#f7f7fa;color:#4b5563;font-size:11px;font-weight:600;width:28px;height:28px;border-radius:50%;display:grid;place-items:center;border:2px solid #fff">+4</div></div>
