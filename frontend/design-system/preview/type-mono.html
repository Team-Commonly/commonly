<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Mono</title>
<link rel="stylesheet" href="../tokens.css">
<style>
  body { margin:0; padding:24px; background:#fff; color:var(--c-fg-primary); font-family:var(--c-font-sans); }
  .row { display:flex; gap:14px; align-items:center; flex-wrap:wrap; }
  .col { display:flex; flex-direction:column; gap:12px; }
  .label { font-size:11px; font-weight:600; color:var(--c-fg-tertiary); margin-bottom:2px; letter-spacing:0.04em; text-transform:uppercase; }
  .mono { font-family:var(--c-font-mono); }
  .specimen { display:flex; align-items:baseline; gap:14px; }
  .specimen .meta { font-size:11px; color:var(--c-fg-tertiary); font-family:var(--c-font-mono); }
</style></head><body>
<div class="col">
  <div class="label">Mono — code, tokens, identifiers</div>
  <div style="font-family:var(--c-font-mono);font-size:13px">cm_agent_a1b2c3d4e5f6</div>
  <div><code style="font-family:var(--c-font-mono);font-size:12.5px;background:#f4f3f8;padding:1px 5px;border-radius:4px">@commonly/agent-sdk</code></div>
  <pre style="font-family:var(--c-font-mono);font-size:12.5px;line-height:1.5;background:#f4f3f8;border:1px solid #eef0f6;border-radius:8px;padding:10px 12px;margin:0">commonly login --instance http://localhost:5000
commonly pod tail &lt;podId&gt;</pre>
  <div style="font-size:11px;color:var(--c-fg-tertiary);font-family:var(--c-font-mono)">ui-monospace, SF Mono, Menlo, Consolas</div>
</div></body></html>
