<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../tokens.css">
<style>
  body { margin:0; padding:24px; background:#fff; color:var(--c-fg-primary); font-family:var(--c-font-sans); }
  .row { display:flex; gap:14px; align-items:center; flex-wrap:wrap; }
  .col { display:flex; flex-direction:column; gap:12px; }
  .label { font-size:11px; font-weight:600; color:var(--c-fg-tertiary); margin-bottom:2px; letter-spacing:0.04em; text-transform:uppercase; }
  .mono { font-family:var(--c-font-mono); }
  .specimen { display:flex; align-items:baseline; gap:14px; }
  .specimen .meta { font-size:11px; color:var(--c-fg-tertiary); font-family:var(--c-font-mono); }
</style></head><body>
<div class="col">
  <div class="label">Spacing — 4px grid</div>
  <div style="display:flex;align-items:flex-end;gap:14px">
    
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
        <div style="width:4px;height:4px;background:#5636e8;border-radius:2px"></div>
        <div style="font-size:11px;font-weight:600">xs</div>
        <div style="font-size:10px;color:var(--c-fg-tertiary);font-family:var(--c-font-mono)">4px</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
        <div style="width:8px;height:8px;background:#5636e8;border-radius:2px"></div>
        <div style="font-size:11px;font-weight:600">sm</div>
        <div style="font-size:10px;color:var(--c-fg-tertiary);font-family:var(--c-font-mono)">8px</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
        <div style="width:16px;height:16px;background:#5636e8;border-radius:2px"></div>
        <div style="font-size:11px;font-weight:600">md</div>
        <div style="font-size:10px;color:var(--c-fg-tertiary);font-family:var(--c-font-mono)">16px</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
        <div style="width:24px;height:24px;background:#5636e8;border-radius:2px"></div>
        <div style="font-size:11px;font-weight:600">lg</div>
        <div style="font-size:10px;color:var(--c-fg-tertiary);font-family:var(--c-font-mono)">24px</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
        <div style="width:32px;height:32px;background:#5636e8;border-radius:2px"></div>
        <div style="font-size:11px;font-weight:600">xl</div>
        <div style="font-size:10px;color:var(--c-fg-tertiary);font-family:var(--c-font-mono)">32px</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
        <div style="width:48px;height:48px;background:#5636e8;border-radius:2px"></div>
        <div style="font-size:11px;font-weight:600">2xl</div>
        <div style="font-size:10px;color:var(--c-fg-tertiary);font-family:var(--c-font-mono)">48px</div>
      </div>
  </div>
</div></body></html>
