<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../tokens.css">
<style>
  body { margin:0; padding:24px; background:#fff; color:var(--c-fg-primary); font-family:var(--c-font-sans); }
  .row { display:flex; gap:14px; align-items:center; flex-wrap:wrap; }
  .col { display:flex; flex-direction:column; gap:12px; }
  .label { font-size:11px; font-weight:600; color:var(--c-fg-tertiary); margin-bottom:2px; letter-spacing:0.04em; text-transform:uppercase; }
  .mono { font-family:var(--c-font-mono); }
  .specimen { display:flex; align-items:baseline; gap:14px; }
  .specimen .meta { font-size:11px; color:var(--c-fg-tertiary); font-family:var(--c-font-mono); }
</style></head><body>
<div class="col">
  <div class="label">Border radii — three core sizes + pill</div>
  <div style="display:flex;align-items:flex-end;gap:18px">
    
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div style="width:64px;height:64px;background:#fff;border:1px solid #e5e7eb;border-radius:8px"></div>
        <div style="font-size:11px;font-weight:600">sm</div>
        <div style="font-size:10px;color:var(--c-fg-tertiary);font-family:var(--c-font-mono)">8px</div>
        <div style="font-size:10px;color:var(--c-fg-tertiary)">chips, small btn</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div style="width:64px;height:64px;background:#fff;border:1px solid #e5e7eb;border-radius:10px"></div>
        <div style="font-size:11px;font-weight:600">default</div>
        <div style="font-size:10px;color:var(--c-fg-tertiary);font-family:var(--c-font-mono)">10px</div>
        <div style="font-size:10px;color:var(--c-fg-tertiary)">inputs, panel cards</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div style="width:64px;height:64px;background:#fff;border:1px solid #e5e7eb;border-radius:12px"></div>
        <div style="font-size:11px;font-weight:600">lg</div>
        <div style="font-size:10px;color:var(--c-fg-tertiary);font-family:var(--c-font-mono)">12px</div>
        <div style="font-size:10px;color:var(--c-fg-tertiary)">cards, modals</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div style="width:64px;height:64px;background:#fff;border:1px solid #e5e7eb;border-radius:999px"></div>
        <div style="font-size:11px;font-weight:600">pill</div>
        <div style="font-size:10px;color:var(--c-fg-tertiary);font-family:var(--c-font-mono)">999px</div>
        <div style="font-size:10px;color:var(--c-fg-tertiary)">pills, avatars</div>
      </div>
  </div>
</div></body></html>
