version: '3'

services:
  # MongoDB service
  mongo:
    image: mongo:latest
    container_name: mongodb-dev
    ports:
      - "27017:27017"
    volumes:
      - mongo-data-dev:/data/db
    networks:
      - app-network-dev

  # PostgreSQL service
  postgres:
    image: postgres:latest
    container_name: postgres-dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
      POSTGRES_DB: ${PG_DATABASE:-commonly}
    volumes:
      - postgres-data-dev:/var/lib/postgresql/data
    networks:
      - app-network-dev

  # Backend service (Development)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: backend-dev
    ports:
      - "5000:5000"
    depends_on:
      - mongo
      - postgres
    environment:
      # Application settings
      - NODE_ENV=development
      - PORT=5000
      
      # Database settings
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017/commonly}
      - PG_USER=${PG_USER:-postgres}
      - PG_PASSWORD=${PG_PASSWORD:-postgres}
      - PG_HOST=${PG_HOST:-postgres}
      - PG_PORT=${PG_PORT:-5432}
      - PG_DATABASE=${PG_DATABASE:-commonly}
      - PG_SSL_CA_PATH=/app/ca.pem
      
      # Authentication
      - JWT_SECRET=${JWT_SECRET:-development-jwt-secret}
      
      # Email settings
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL}
      
      # Frontend URL
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      
      # AI Integration
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      
      # Discord Integration
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_PUBLIC_KEY=${DISCORD_PUBLIC_KEY}
      
      # Test settings
      - TEST_JWT_SECRET=test-jwt-secret
      - TEST_MONGO_URI=mongodb://mongo:27017/commonly-test
    volumes:
      # Mount source code for live reloading
      - ./backend:/app
      # Prevent overwriting node_modules
      - /app/node_modules
      # Mount CA certificate
      - ./ca.pem:/app/ca.pem:ro
    networks:
      - app-network-dev
    # Development: restart on crashes
    restart: unless-stopped

  # Frontend service (Development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: frontend-dev
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:5000}
      - REACT_APP_DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      # Optimized development server settings for lower CPU
      - CHOKIDAR_USEPOLLING=false
      - WATCHPACK_POLLING=false
      - ESLINT_NO_DEV_ERRORS=true
      - GENERATE_SOURCEMAP=false
      - TSC_COMPILE_ON_ERROR=true
    volumes:
      # Mount source code for live reloading
      - ./frontend:/app
      # Prevent overwriting node_modules
      - /app/node_modules
    networks:
      - app-network-dev
    # Development: restart on crashes
    restart: unless-stopped
    stdin_open: true
    tty: true

networks:
  app-network-dev:
    driver: bridge

volumes:
  mongo-data-dev:
  postgres-data-dev: