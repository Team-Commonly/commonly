version: '3'

services:
  # MongoDB service
  mongo:
    image: mongo:latest
    container_name: mongodb-dev
    ports:
      - "27017:27017"
    volumes:
      - mongo-data-dev:/data/db
    networks:
      - app-network-dev

  # PostgreSQL service
  postgres:
    image: postgres:latest
    container_name: postgres-dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
      POSTGRES_DB: ${PG_DATABASE:-commonly}
    volumes:
      - postgres-data-dev:/var/lib/postgresql/data
    networks:
      - app-network-dev

  # Backend service (Development)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: backend-dev
    ports:
      - "5000:5000"
    depends_on:
      - mongo
      - postgres
    environment:
      # Application settings
      - NODE_ENV=development
      - PORT=5000
      
      # Database settings
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017/commonly}
      - PG_USER=${PG_USER:-postgres}
      - PG_PASSWORD=${PG_PASSWORD:-postgres}
      - PG_HOST=${PG_HOST:-postgres}
      - PG_PORT=${PG_PORT:-5432}
      - PG_DATABASE=${PG_DATABASE:-commonly}
      - PG_SSL_CA_PATH=/app/ca.pem
      
      # Authentication
      - JWT_SECRET=${JWT_SECRET:-development-jwt-secret}
      
      # Email settings (SMTP2GO)
      - SMTP2GO_API_KEY=${SMTP2GO_API_KEY}
      - SMTP2GO_FROM_EMAIL=${SMTP2GO_FROM_EMAIL}
      - SMTP2GO_FROM_NAME=${SMTP2GO_FROM_NAME}
      - SMTP2GO_BASE_URL=${SMTP2GO_BASE_URL}
      
      # Frontend URL
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}

      # Marketplace manifest
      - MARKETPLACE_MANIFEST_PATH=/app/packages/commonly-marketplace/marketplace.json
      
      # AI Integration
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LITELLM_BASE_URL=${LITELLM_BASE_URL}
      - LITELLM_API_KEY=${LITELLM_API_KEY}
      - LITELLM_CHAT_MODEL=${LITELLM_CHAT_MODEL}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMENSIONS}
      
      # Discord Integration
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_PUBLIC_KEY=${DISCORD_PUBLIC_KEY}
      
      # Test settings
      - TEST_JWT_SECRET=test-jwt-secret
      - TEST_MONGO_URI=mongodb://mongo:27017/commonly-test
    volumes:
      # Mount source code for live reloading
      - ./backend:/app
      # Mount marketplace manifest from repo root
      - ./packages/commonly-marketplace:/app/packages/commonly-marketplace:ro
      # Mount agent service manifests for auto-registration
      - ./external/commonly-agent-services:/app/external/commonly-agent-services:ro
      # Prevent overwriting node_modules
      - /app/node_modules
      # Mount CA certificate
      - ./ca.pem:/app/ca.pem:ro
    networks:
      - app-network-dev
    # Development: restart on crashes
    restart: unless-stopped

  # Frontend service (Development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: frontend-dev
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:5000}
      - REACT_APP_DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      # Optimized development server settings for lower CPU
      - CHOKIDAR_USEPOLLING=false
      - WATCHPACK_POLLING=false
      - ESLINT_NO_DEV_ERRORS=true
      - GENERATE_SOURCEMAP=false
      - TSC_COMPILE_ON_ERROR=true
    volumes:
      # Mount source code for live reloading
      - ./frontend:/app
      # Prevent overwriting node_modules
      - /app/node_modules
    networks:
      - app-network-dev
    # Development: restart on crashes
    restart: unless-stopped
    stdin_open: true
    tty: true

  # LiteLLM model gateway (optional)
  litellm:
    profiles: ["litellm"]
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm-dev
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-dev-litellm-key}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./external/litellm/config.yaml:/app/config.yaml:ro
    ports:
      - "4000:4000"
    networks:
      - app-network-dev
    restart: unless-stopped
    command: ["--config", "/app/config.yaml"]

  # External agent runtime (Clawdbot / Moltbot Gateway)
  # Uses Claude Code OAuth when ~/.claude is mounted (uses your Claude Code subscription)
  clawdbot-gateway:
    profiles: ["clawdbot"]
    build:
      context: ./_external/clawdbot
      dockerfile: ${CLAWDBOT_DOCKERFILE:-Dockerfile}
    container_name: clawdbot-gateway-dev
    depends_on:
      - backend
    environment:
      # Required for Claude Code OAuth authentication
      - HOME=/home/node
      - CLAWDBOT_GATEWAY_PORT=${CLAWDBOT_GATEWAY_PORT:-18789}
      - CLAWDBOT_BRIDGE_PORT=${CLAWDBOT_BRIDGE_PORT:-18790}
      - CLAWDBOT_GATEWAY_BIND=${CLAWDBOT_GATEWAY_BIND:-lan}
      - CLAWDBOT_GATEWAY_TOKEN=${CLAWDBOT_GATEWAY_TOKEN}
      - CLAWDBOT_CONFIG_DIR=/home/node/.clawdbot
      - CLAWDBOT_WORKSPACE_DIR=/home/node/clawd
      - CLAWDBOT_SKIP_BROWSER_CONTROL_SERVER=${CLAWDBOT_SKIP_BROWSER_CONTROL_SERVER:-1}
      - CLAWDBOT_SKIP_CANVAS_HOST=${CLAWDBOT_SKIP_CANVAS_HOST:-1}
      - CLAWDBOT_SKIP_CHANNELS=${CLAWDBOT_SKIP_CHANNELS:-0}
      - COMMONLY_API_URL=${COMMONLY_API_URL:-http://backend:5000}
      - COMMONLY_API_TOKEN=${COMMONLY_API_TOKEN}
      # Clawdbot uses separate Discord bot to avoid conflicts with Commonly backend
      - DISCORD_CLIENT_ID=${CLAWDBOT_DISCORD_CLIENT_ID}
      - DISCORD_BOT_TOKEN=${CLAWDBOT_DISCORD_BOT_TOKEN}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REFRESH_TOKEN=${GOOGLE_REFRESH_TOKEN}
      # LLM API keys (optional if using Claude Code OAuth)
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./external/clawdbot-state/config:/home/node/.clawdbot
      - ./external/clawdbot-state/workspace:/home/node/clawd
      # Mount Claude Code credentials for OAuth authentication
      # The credentials are in ~/.claude/.credentials.json
      - ${CLAUDE_CREDENTIALS_PATH:-~/.claude}:/home/node/.claude:ro
      # Mount Commonly MCP server for pod context access
      - ./packages/commonly-mcp:/app/commonly-mcp:ro
    ports:
      - "${CLAWDBOT_GATEWAY_PORT:-18789}:18789"
      - "${CLAWDBOT_BRIDGE_PORT:-18790}:18790"
    networks:
      - app-network-dev
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${CLAWDBOT_GATEWAY_BIND:-lan}",
        "--port",
        "${CLAWDBOT_GATEWAY_PORT:-18789}",
        "--allow-unconfigured"
      ]

  clawdbot-cli:
    profiles: ["clawdbot"]
    build:
      context: ./_external/clawdbot
      dockerfile: ${CLAWDBOT_DOCKERFILE:-Dockerfile}
    container_name: clawdbot-cli-dev
    depends_on:
      - clawdbot-gateway
    environment:
      - HOME=/home/node
      - TERM=xterm-256color
      - CLAWDBOT_GATEWAY_PORT=${CLAWDBOT_GATEWAY_PORT:-18789}
      - CLAWDBOT_GATEWAY_TOKEN=${CLAWDBOT_GATEWAY_TOKEN}
    volumes:
      - ./external/clawdbot-state/config:/home/node/.clawdbot
      - ./external/clawdbot-state/workspace:/home/node/clawd
      # Mount Claude Code credentials for OAuth authentication
      # The credentials are in ~/.claude/.credentials.json
      - ${CLAUDE_CREDENTIALS_PATH:-~/.claude}:/home/node/.claude:ro
    networks:
      - app-network-dev
    entrypoint: ["node", "dist/index.js"]
    stdin_open: true
    tty: true

  # External agent runtime (Clawdbot Bridge)
  clawdbot-bridge:
    profiles: ["clawdbot"]
    image: node:20-alpine
    container_name: clawdbot-bridge-dev
    working_dir: /app/external/commonly-agent-services/clawdbot-bridge
    depends_on:
      - backend
      - clawdbot-gateway
    environment:
      - COMMONLY_BASE_URL=${COMMONLY_BASE_URL:-http://backend:5000}
      - COMMONLY_AGENT_TOKEN=${CLAWDBOT_BRIDGE_TOKEN}
      - COMMONLY_AGENT_POLL_MS=${COMMONLY_AGENT_POLL_MS:-5000}
      - CLAWDBOT_GATEWAY_URL=${CLAWDBOT_GATEWAY_URL:-http://clawdbot-gateway:18789}
      - CLAWDBOT_GATEWAY_TOKEN=${CLAWDBOT_GATEWAY_TOKEN}
      - CLAWDBOT_AGENT_ID=${CLAWDBOT_AGENT_ID:-main}
      - CLAWDBOT_MODEL=${CLAWDBOT_MODEL:-moltbot:main}
    volumes:
      - ./external:/app/external:ro
    networks:
      - app-network-dev
    restart: unless-stopped
    command: ["node", "index.js"]

  # External agent runtime (Commonly Bot)
  commonly-bot:
    image: node:20-alpine
    container_name: commonly-bot-dev
    working_dir: /app/external/commonly-agent-services/commonly-bot
    depends_on:
      - backend
    environment:
      - COMMONLY_BASE_URL=${COMMONLY_BASE_URL:-http://backend:5000}
      - COMMONLY_AGENT_TOKEN=${COMMONLY_BOT_TOKEN}
      - COMMONLY_AGENT_POLL_MS=${COMMONLY_AGENT_POLL_MS:-5000}
    volumes:
      - ./external:/app/external:ro
    networks:
      - app-network-dev
    restart: unless-stopped
    command: ["node", "index.js"]

networks:
  app-network-dev:
    driver: bridge

volumes:
  mongo-data-dev:
  postgres-data-dev:
