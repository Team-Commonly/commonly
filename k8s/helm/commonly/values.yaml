# Default values for Commonly Helm chart
# This is a YAML-formatted file with default values
# Override these values in values-dev.yaml or values-prod.yaml

# Global settings
global:
  namespace: commonly
  environment: development

# Agent provisioning (RBAC + PVCs)
agentProvisioning:
  enabled: true
  createWorkspacePvc: false

# Backend service configuration
backend:
  enabled: true
  replicaCount: 1
  image:
    repository: gcr.io/YOUR_OLD_GCP_PROJECT_ID/commonly-backend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 5000
    sessionAffinity: ClientIP
    sessionAffinityTimeout: 10800  # 3 hours
  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "2Gi"
      cpu: "1000m"
  nodeSelector: {}
  tolerations: []
  livenessProbe:
    enabled: true
    path: /api/health/live
    initialDelaySeconds: 30
    periodSeconds: 10
  readinessProbe:
    enabled: true
    path: /api/health/live
    initialDelaySeconds: 10
    periodSeconds: 5
  env:
    nodeEnv: development
    registrationInviteOnly: "1"
    agentProvisionerK8s: "1"
    agentProvisionerDocker: "0"
    agentProvisionerNodePool: ""
    frontendUrl: "https://app-dev.commonly.me"
    backendUrl: "https://api.commonly.me"
    commonlyApiUrl: ""
    clawdbotGatewayUrl: ""
    moltbotGatewayUrl: ""
    pgHost: "commonly-db-commonly-default.d.aivencloud.com"
    pgPort: "21257"
    pgDatabase: "defaultdb"
    pgUser: "avnadmin"
    pgSslEnabled: "true"
    pgCaCertPath: "/app/certs/ca.pem"
    marketplaceManifestPath: "/app/packages/commonly-marketplace/marketplace.json"
  nodeSelector: {}
  tolerations: []

# Frontend service configuration
frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: gcr.io/YOUR_OLD_GCP_PROJECT_ID/commonly-frontend
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  nodeSelector: {}
  tolerations: []

# MongoDB configuration
mongodb:
  enabled: false
  image:
    repository: mongo
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 27017
  persistence:
    enabled: true
    storageClass: standard-rwo
    size: 50Gi
    accessMode: ReadWriteOnce
  resources:
    requests:
      memory: "512Mi"
      cpu: "300m"
    limits:
      memory: "2Gi"
      cpu: "2000m"

# PostgreSQL configuration
postgresql:
  enabled: false
  image:
    repository: postgres
    tag: "15"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 5432
  persistence:
    enabled: true
    storageClass: standard-rwo
    size: 50Gi
    accessMode: ReadWriteOnce
  resources:
    requests:
      memory: "512Mi"
      cpu: "300m"
    limits:
      memory: "2Gi"
      cpu: "2000m"
  database: commonly
  username: postgres
  nodeSelector: {}
  tolerations: []

# Redis configuration (for Socket.io adapter)
redis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 6379
  resources:
    requests:
      memory: "256Mi"
      cpu: "50m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  nodeSelector: {}
  tolerations: []

# External Secrets Operator configuration
externalSecrets:
  enabled: false
  secretStore:
    name: gcpsm-secretstore
    projectId: YOUR_GCP_PROJECT_ID
    clusterLocation: us-central1
    clusterName: commonly-dev
  serviceAccount:
    name: external-secrets-sa
    gcpServiceAccount: commonly-secrets-sa@YOUR_GCP_PROJECT_ID.iam.gserviceaccount.com

# Agent runtime configuration
agents:
  clawdbot:
    enabled: true
    strategy:
      type: Recreate
    image:
      repository: gcr.io/YOUR_OLD_GCP_PROJECT_ID/clawdbot-gateway
      tag: latest
      pullPolicy: IfNotPresent
    config:
      gatewayPort: 18789
      bridgePort: 18790
      gatewayBind: lan
    persistence:
      config:
        enabled: true
        storageClass: standard-rwo
        size: 1Gi
        accessMode: ReadWriteOnce
      workspace:
        enabled: true
        storageClass: standard-rwo
        size: 10Gi
        accessMode: ReadWriteOnce
    resources:
      requests:
        memory: "512Mi"
        cpu: "200m"
      limits:
        memory: "2Gi"
        cpu: "1000m"
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
    nodeSelector: {}
    tolerations: []

  commonlyBot:
    enabled: false
    image:
      repository: gcr.io/YOUR_OLD_GCP_PROJECT_ID/commonly-bot
      tag: latest
      pullPolicy: IfNotPresent
    env:
      pollIntervalMs: 5000
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    nodeSelector: {}
    tolerations: []

# RBAC configuration
rbac:
  create: true
  serviceAccount:
    name: agent-provisioner

# Ingress configuration
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: "backend"
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "commonly-backend"
  hosts:
    frontend:
      host: app-dev.commonly.me
      path: /
      pathType: Prefix
      aliases: []
    backend:
      host: api-dev.commonly.me
      path: /
      pathType: Prefix
      aliases: []
  tls:
    enabled: false
    secretName: commonly-tls

# ConfigMaps configuration
configMaps:
  marketplaceManifest:
    enabled: true
  skillsCatalog:
    enabled: true
  postgresCA:
    enabled: true

# Skills catalog storage (optional)
skillsCatalogStorage:
  enabled: true
  size: 1Gi
  storageClassName: standard-rwo
  accessMode: ReadWriteOnce
  bootstrapFromImage: true
  downloadUrl: "https://storage.googleapis.com/YOUR_OLD_GCP_PROJECT_ID_cloudbuild/awesome-agent-skills-index.json"

# Autoscaling configuration
autoscaling:
  backend:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

# Monitoring configuration
monitoring:
  prometheus:
    enabled: false
    serviceMonitor:
      enabled: false

# Cloudflare Tunnel (optional)
cloudflared:
  enabled: true
  namespace: ingress-nginx
  tunnelId: YOUR_CLOUDFLARE_TUNNEL_ID
  credentialsSecretName: cloudflared-commonly-k8s
  image:
    repository: cloudflare/cloudflared
    tag: "2026.1.2"
  replicas: 2
  ingressService: nginx-ingress-ingress-nginx-controller.ingress-nginx.svc.cluster.local
  ingressPort: 80
  metricsPort: 2000
  hostnames:
    - app.commonly.me
    - api.commonly.me
    - app-dev.commonly.me
    - api-dev.commonly.me

# Backup configuration
backup:
  mongodb:
    enabled: false
    schedule: "0 2 * * *"
    gcs:
      bucket: commonly-dev-backups
      path: mongodb
  postgresql:
    enabled: false
    schedule: "0 2 * * *"
    gcs:
      bucket: commonly-dev-backups
      path: postgresql
