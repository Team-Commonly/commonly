---
# ConfigMap for Clawdbot (moltbot) configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: clawdbot-config
  namespace: {{ include "commonly.namespace" . }}
  labels:
    {{- include "commonly.labels" . | nindent 4 }}
    app: clawdbot
    component: config
data:
  moltbot.json: |
    {
      "models": {
        "providers": {
          {{- if .Values.litellm.codexBypassLitellm }}
          "openai-codex": {
            "baseUrl": "https://chatgpt.com/backend-api",
            "api": "openai-codex-responses",
            "models": [
              {"id": "gpt-5.4", "name": "gpt-5.4"},
              {"id": "gpt-5.4-mini", "name": "gpt-5.4-mini"},
              {"id": "gpt-5.3-codex", "name": "gpt-5.3-codex"}
            ]
          }
          {{- else if .Values.litellm.enabled }}
          "openai-codex": {
            "baseUrl": "http://litellm.{{ include "commonly.namespace" . }}.svc.cluster.local:4000",
            "api": "openai-completions",
            "models": [
              {"id": "gpt-5.4", "name": "gpt-5.4"},
              {"id": "gpt-5.3-codex", "name": "gpt-5.3-codex"}
            ]
          }
          {{- else }}
          "openai-codex": null
          {{- end }}
        }
      },
      "agents": {
        "defaults": {
          "model": {
            "primary": "openrouter/nvidia/nemotron-3-super-120b-a12b:free",
            "fallbacks": ["google/gemini-2.5-flash", "google/gemini-2.5-flash-lite", "google/gemini-2.0-flash"]
          },
          "maxConcurrent": 4,
          "subagents": {
            "maxConcurrent": 8
          }
        },
        "list": []
      },
      "commands": {
        "native": "auto",
        "nativeSkills": "auto"
      },
      "channels": {
        "commonly": {
          "enabled": true,
          "baseUrl": "http://backend.{{ include "commonly.namespace" . }}.svc.cluster.local:5000",
          "accounts": {}
        }
      },
      "gateway": {
        "mode": "local",
        "bind": "lan",
        "auth": {
          "mode": "token"
        },
        "controlUi": {
          "allowInsecureAuth": true
        },
        "http": {
          "endpoints": {
            "chatCompletions": {
              "enabled": true
            }
          }
        }
      },
      "messages": {
        "ackReactionScope": "group-mentions"
      },
      "bindings": [],
      "session": {
        "scope": "per-sender",
        "dmScope": "per-channel-peer",
        "maintenance": {
          "pruneAfter": "30d",
          "maxEntries": 1000
        }
      },
      "tools": {
        "sessions": {
          "visibility": "all"
        }
      },
      "plugins": {
        "entries": {
          "commonly": {
            "enabled": true
          },
          "acpx": {
            "enabled": true,
            "config": {
              "permissionMode": "approve-all",
              "nonInteractivePermissions": "fail",
              "cwd": "/workspace"
            }
          }
        }
      }
    }

---
# ConfigMap for Commonly Bot (internal) configuration
{{- $existingCommonlyBotConfig := (lookup "v1" "ConfigMap" (include "commonly.namespace" .) "commonly-bot-config") }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: commonly-bot-config
  namespace: {{ include "commonly.namespace" . }}
  labels:
    {{- include "commonly.labels" . | nindent 4 }}
    app: commonly-bot
    component: config
data:
  runtime.json: |
{{- if and $existingCommonlyBotConfig $existingCommonlyBotConfig.data (index $existingCommonlyBotConfig.data "runtime.json") }}
{{ index $existingCommonlyBotConfig.data "runtime.json" | nindent 4 }}
{{- else }}
    {
      "accounts": {}
    }
{{- end }}
