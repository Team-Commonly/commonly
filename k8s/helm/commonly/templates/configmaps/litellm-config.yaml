{{- if .Values.litellm.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: {{ include "commonly.namespace" . }}
  labels:
    {{- include "commonly.labels" . | nindent 4 }}
data:
  config.yaml: |
    # LiteLLM proxy config — routes all backend + agent LLM calls
    # Docs: https://docs.litellm.ai/docs/proxy/configs

    model_list:
      # --- Gemini (direct google provider) ---
      - model_name: google/gemini-2.5-flash
        litellm_params:
          model: gemini/gemini-2.5-flash
          api_key: os.environ/GEMINI_API_KEY

      - model_name: google/gemini-2.5-flash-lite
        litellm_params:
          model: gemini/gemini-2.5-flash-lite
          api_key: os.environ/GEMINI_API_KEY

      - model_name: google/gemini-2.0-flash
        litellm_params:
          model: gemini/gemini-2.0-flash
          api_key: os.environ/GEMINI_API_KEY

      # Aliases for backend llmService default model names
      - model_name: gemini-2.5-flash
        litellm_params:
          model: gemini/gemini-2.5-flash
          api_key: os.environ/GEMINI_API_KEY

      # --- OpenRouter (free tier, community agents) ---
      # Registered with both prefixed and un-prefixed model names:
      # - openrouter/* used when gateway calls via openai-codex/gpt-5.4 fallback path
      # - nvidia/* / arcee-ai/* used when gateway uses openrouter:default profile
      #   (OpenClaw strips the "openrouter/" prefix before sending to the provider)
      - model_name: openrouter/nvidia/nemotron-3-super-120b-a12b:free
        litellm_params:
          model: openrouter/nvidia/nemotron-3-super-120b-a12b:free
          api_key: os.environ/OPENROUTER_API_KEY

      - model_name: nvidia/nemotron-3-super-120b-a12b:free
        litellm_params:
          model: openrouter/nvidia/nemotron-3-super-120b-a12b:free
          api_key: os.environ/OPENROUTER_API_KEY

      # NOTE: arcee-ai/trinity-large-preview:free was deregistered at OpenRouter
      # (404 No endpoints found) on 2026-05-03. Removed from model_list and from
      # all fallback chains below. If the model is reinstated, restore it as a
      # paired entry alongside nemotron above.

      # --- Codex (chatgpt/ provider) ---
      # NOTE: LiteLLM's chatgpt/ provider reads tokens from auth.json (written by the
      # codex-auth-seed init + codex-auth-rotator sidecar). The Authenticator ignores
      # api_key in litellm_params, so duplicate deployments per account are useless.
      # Multi-account rotation happens via the sidecar swapping auth.json every 10 min.
      # Each user on the ChatGPT Team has their own quota pool, so rotation gives real
      # multi-account benefit.
      #
      # timeout: 120s per call; fallback to OpenRouter on 429/timeout (router_settings).
      # Pricing sourced from pricepertoken.com 2026-04-04:
      #   gpt-5.4:      $2.50 input / $15.00 output per 1M tokens
      #   gpt-5.4-mini: $0.75 input / $4.50  output per 1M tokens
      #   gpt-5.4-nano: $0.20 input / $1.25  output per 1M tokens
      - model_name: gpt-5.4
        model_info:
          mode: responses
        litellm_params:
          model: chatgpt/gpt-5.4
          timeout: 120
          input_cost_per_token: 0.0000025
          output_cost_per_token: 0.000015

      - model_name: openai-codex/gpt-5.4
        model_info:
          mode: responses
        litellm_params:
          model: chatgpt/gpt-5.4
          timeout: 120
          input_cost_per_token: 0.0000025
          output_cost_per_token: 0.000015

      # --- gpt-5.4-mini (used for dev agent heartbeat orchestration) ---
      - model_name: gpt-5.4-mini
        model_info:
          mode: responses
        litellm_params:
          model: chatgpt/gpt-5.4-mini
          timeout: 120
          input_cost_per_token: 0.00000075
          output_cost_per_token: 0.0000045

      - model_name: openai-codex/gpt-5.4-mini
        model_info:
          mode: responses
        litellm_params:
          model: chatgpt/gpt-5.4-mini
          timeout: 120
          input_cost_per_token: 0.00000075
          output_cost_per_token: 0.0000045

      # --- gpt-5.4-nano (community agents — cheapest Codex model) ---
      - model_name: gpt-5.4-nano
        model_info:
          mode: responses
        litellm_params:
          model: chatgpt/gpt-5.4-nano
          timeout: 120
          input_cost_per_token: 0.0000002
          output_cost_per_token: 0.00000125

      - model_name: openai-codex/gpt-5.4-nano
        model_info:
          mode: responses
        litellm_params:
          model: chatgpt/gpt-5.4-nano
          timeout: 120
          input_cost_per_token: 0.0000002
          output_cost_per_token: 0.00000125

      # Aliases for Codex CLI default model names in openai mode
      # When acpx_run spawns with auth_mode=openai, the CLI may send these model names
      - model_name: codex-mini-latest
        model_info:
          mode: responses
        litellm_params:
          model: chatgpt/gpt-5.4-mini
          input_cost_per_token: 0.00000075
          output_cost_per_token: 0.0000045

      - model_name: o4-mini
        model_info:
          mode: responses
        litellm_params:
          model: chatgpt/gpt-5.4-mini
          input_cost_per_token: 0.00000075
          output_cost_per_token: 0.0000045

      # --- OpenAI (optional, for embeddings) ---
      - model_name: text-embedding-3-large
        litellm_params:
          model: openai/text-embedding-3-large
          api_key: os.environ/OPENAI_API_KEY

      - model_name: gpt-4o
        litellm_params:
          model: openai/gpt-4o
          api_key: os.environ/OPENAI_API_KEY

      # --- OpenAI image generation (agent avatars, enriched content gen) ---
      # Backend openaiImageService.ts hits these via LITELLM_BASE_URL + LITELLM_MASTER_KEY
      # so the real OPENAI_API_KEY only needs to live on the LiteLLM pod, not on the backend.
      # Pricing (April 2026 list):
      #   dall-e-3 standard 1024x1024: $0.04 / image
      #   dall-e-3 hd       1024x1024: $0.08 / image
      #   gpt-image-1       1024x1024: ~$0.04 / image (usage-based, estimate)
      - model_name: dall-e-3
        litellm_params:
          model: openai/dall-e-3
          api_key: os.environ/OPENAI_API_KEY

      - model_name: gpt-image-1
        litellm_params:
          model: openai/gpt-image-1
          api_key: os.environ/OPENAI_API_KEY

    router_settings:
      # The codex-auth-rotator sidecar rotates Codex accounts every 10 min on
      # schedule, AND fast-rotates on 429 via the rate_limit_signal callback
      # (writes /chatgpt-auth/rotate-now → sidecar polls and swaps auth.json).
      routing_strategy: least-busy
      enable_pre_call_checks: true
      # Fallback chain — nemotron only.
      #   - Gemini removed 2026-05-03: GEMINI_API_KEY belongs to a project that
      #     doesn't have generativelanguage.googleapis.com enabled (403). Until
      #     a working key is provisioned in a project where the API is enabled,
      #     gemini fallbacks are net-negative — they add 60-120s of retries per
      #     failed request and surface confusing "Vertex AI" errors to callers.
      #   - Trinity removed 2026-05-03: 404 No endpoints found at OpenRouter.
      # If nemotron is also unavailable (rate limit / OR key exhausted), the
      # request fails fast — caller (gateway/agent) sees the failure, the next
      # request lands on the freshly-rotated Codex account.
      fallbacks:
        - {"gpt-5.4":                 ["openrouter/nvidia/nemotron-3-super-120b-a12b:free"]}
        - {"openai-codex/gpt-5.4":    ["openrouter/nvidia/nemotron-3-super-120b-a12b:free"]}
        - {"gpt-5.4-mini":            ["openrouter/nvidia/nemotron-3-super-120b-a12b:free"]}
        - {"openai-codex/gpt-5.4-mini": ["openrouter/nvidia/nemotron-3-super-120b-a12b:free"]}
        - {"gpt-5.4-nano":            ["openrouter/nvidia/nemotron-3-super-120b-a12b:free"]}
        - {"openai-codex/gpt-5.4-nano": ["openrouter/nvidia/nemotron-3-super-120b-a12b:free"]}
        # No fallback for nemotron itself — fail fast rather than chain through
        # dead endpoints. The rotator + next-request path will pick a fresh
        # Codex account on the subsequent call.
      # One retry on rate-limit, with a deliberate 1s delay so the 429 callback
      # has time to rotate auth.json before the retry reads it. This means a
      # 429 on account-N triggers (a) signal-driven rotation to account-N+1,
      # (b) a 1s wait, (c) one retry that reads the new auth.json. If the
      # retry also 429s, falls to nemotron fallback.
      #
      # Why not num_retries=0: a single 429 used to drop the request entirely,
      # falling to the (then-broken, now-narrow) fallback chain. Same-prompt
      # retries don't bill against the 429'd account (4XX = no charge), so
      # spending one retry across the rotator is genuinely free until success.
      #
      # Why not num_retries>1: chaining retries beyond 1 risks cascading
      # rotations under sustained burst load — multiple retries would each
      # signal the rotator and burn through fresh accounts in milliseconds.
      # See feedback-litellm-retry-doubles-rotation-burn (2026-05-03 incident).
      num_retries: 1
      retry_after: 1

    litellm_settings:
      # Drop unsupported params instead of erroring (important for OpenRouter quirks)
      drop_params: true
      # Custom callback that writes /chatgpt-auth/rotate-now when any request hits a
      # rate limit. The codex-auth-rotator sidecar polls that file and rotates
      # accounts immediately (instead of waiting for its next scheduled tick).
      # The callback module is installed at /tmp/callbacks/rate_limit_signal.py by
      # the container startup script; PYTHONPATH is set accordingly.
      callbacks: rate_limit_signal.proxy_handler_instance

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      database_url: os.environ/DATABASE_URL
      store_model_in_db: true
      # Allow UI access
      ui_access_mode: "all"
      # Spend log retention — without these, LiteLLM_SpendLogs grows unbounded
      # (prod dev observed 5+ GB on the 8 GiB Cloud SQL tier before this cap).
      # STORE_PROMPTS_IN_SPEND_LOGS=true is set in the deployment env, so each
      # row is large; a 7-day window is plenty for dev debugging.
      maximum_spend_logs_retention_period: "7d"
      maximum_spend_logs_retention_interval: "6h"
{{- end }}
