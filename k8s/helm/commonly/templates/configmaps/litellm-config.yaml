{{- if .Values.litellm.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: {{ include "commonly.namespace" . }}
  labels:
    {{- include "commonly.labels" . | nindent 4 }}
data:
  config.yaml: |
    # LiteLLM proxy config — routes all backend + agent LLM calls
    # Docs: https://docs.litellm.ai/docs/proxy/configs

    model_list:
      # --- Gemini (direct google provider) ---
      - model_name: google/gemini-2.5-flash
        litellm_params:
          model: gemini/gemini-2.5-flash
          api_key: os.environ/GEMINI_API_KEY

      - model_name: google/gemini-2.5-flash-lite
        litellm_params:
          model: gemini/gemini-2.5-flash-lite
          api_key: os.environ/GEMINI_API_KEY

      - model_name: google/gemini-2.0-flash
        litellm_params:
          model: gemini/gemini-2.0-flash
          api_key: os.environ/GEMINI_API_KEY

      # Aliases for backend llmService default model names
      - model_name: gemini-2.5-flash
        litellm_params:
          model: gemini/gemini-2.5-flash
          api_key: os.environ/GEMINI_API_KEY

      # --- OpenRouter (free tier, community agents) ---
      # Registered with both prefixed and un-prefixed model names:
      # - openrouter/* used when gateway calls via openai-codex/gpt-5.4 fallback path
      # - nvidia/* / arcee-ai/* used when gateway uses openrouter:default profile
      #   (OpenClaw strips the "openrouter/" prefix before sending to the provider)
      - model_name: openrouter/nvidia/nemotron-3-super-120b-a12b:free
        litellm_params:
          model: openrouter/nvidia/nemotron-3-super-120b-a12b:free
          api_key: os.environ/OPENROUTER_API_KEY

      - model_name: nvidia/nemotron-3-super-120b-a12b:free
        litellm_params:
          model: openrouter/nvidia/nemotron-3-super-120b-a12b:free
          api_key: os.environ/OPENROUTER_API_KEY

      - model_name: openrouter/arcee-ai/trinity-large-preview:free
        litellm_params:
          model: openrouter/arcee-ai/trinity-large-preview:free
          api_key: os.environ/OPENROUTER_API_KEY

      - model_name: arcee-ai/trinity-large-preview:free
        litellm_params:
          model: openrouter/arcee-ai/trinity-large-preview:free
          api_key: os.environ/OPENROUTER_API_KEY

      # --- Codex (chatgpt/ provider, 3 accounts for independent rate-limit pools) ---
      # Account-1: uses auth.json written by init container (chatgpt/ provider requires it for primary)
      # Account-2: api_key in litellm_params (env var, bypasses auth.json)
      # Account-3: api_key in litellm_params (env var, bypasses auth.json)
      # timeout: 120s per deployment — LiteLLM rotates to next account after 2 min instead of hanging.
      # LiteLLM's least-busy routing distributes requests and falls back automatically on 429/timeout.
      # Pricing sourced from pricepertoken.com 2026-04-04:
      #   gpt-5.4:      $2.50 input / $15.00 output per 1M tokens
      #   gpt-5.4-mini: $0.75 input / $4.50  output per 1M tokens
      #   gpt-5.4-nano: $0.20 input / $1.25  output per 1M tokens
      - model_name: gpt-5.4
        model_info:
          mode: responses
        litellm_params:
          model: chatgpt/gpt-5.4
          timeout: 120
          input_cost_per_token: 0.0000025
          output_cost_per_token: 0.000015

      - model_name: openai-codex/gpt-5.4
        model_info:
          mode: responses
        litellm_params:
          model: chatgpt/gpt-5.4
          timeout: 120
          input_cost_per_token: 0.0000025
          output_cost_per_token: 0.000015

      # Account-2 fallback
      - model_name: openai-codex/gpt-5.4
        model_info:
          mode: responses
        litellm_params:
          model: chatgpt/gpt-5.4
          api_key: os.environ/OPENAI_CODEX_ACCESS_TOKEN_2
          timeout: 120
          input_cost_per_token: 0.0000025
          output_cost_per_token: 0.000015

      # Account-3 fallback (separate per-account quota pool)
      - model_name: openai-codex/gpt-5.4
        model_info:
          mode: responses
        litellm_params:
          model: chatgpt/gpt-5.4
          api_key: os.environ/OPENAI_CODEX_ACCESS_TOKEN_3
          timeout: 120
          input_cost_per_token: 0.0000025
          output_cost_per_token: 0.000015

      # --- gpt-5.4-mini (30% of quota vs full gpt-5.4, used for dev agent heartbeat orchestration) ---
      # Same 3-account rotation as full gpt-5.4.
      - model_name: gpt-5.4-mini
        model_info:
          mode: responses
        litellm_params:
          model: chatgpt/gpt-5.4-mini
          timeout: 120
          input_cost_per_token: 0.00000075
          output_cost_per_token: 0.0000045

      - model_name: openai-codex/gpt-5.4-mini
        model_info:
          mode: responses
        litellm_params:
          model: chatgpt/gpt-5.4-mini
          timeout: 120
          input_cost_per_token: 0.00000075
          output_cost_per_token: 0.0000045

      # Account-2 fallback
      - model_name: openai-codex/gpt-5.4-mini
        model_info:
          mode: responses
        litellm_params:
          model: chatgpt/gpt-5.4-mini
          api_key: os.environ/OPENAI_CODEX_ACCESS_TOKEN_2
          timeout: 120
          input_cost_per_token: 0.00000075
          output_cost_per_token: 0.0000045

      # Account-3 fallback (separate per-account quota pool)
      - model_name: openai-codex/gpt-5.4-mini
        model_info:
          mode: responses
        litellm_params:
          model: chatgpt/gpt-5.4-mini
          api_key: os.environ/OPENAI_CODEX_ACCESS_TOKEN_3
          timeout: 120
          input_cost_per_token: 0.00000075
          output_cost_per_token: 0.0000045

      # --- gpt-5.4-nano (community agents — cheapest Codex model, same chatgpt/ OAuth) ---
      - model_name: gpt-5.4-nano
        model_info:
          mode: responses
        litellm_params:
          model: chatgpt/gpt-5.4-nano
          timeout: 120
          input_cost_per_token: 0.0000002
          output_cost_per_token: 0.00000125

      - model_name: openai-codex/gpt-5.4-nano
        model_info:
          mode: responses
        litellm_params:
          model: chatgpt/gpt-5.4-nano
          timeout: 120
          input_cost_per_token: 0.0000002
          output_cost_per_token: 0.00000125

      # Account-2 fallback
      - model_name: openai-codex/gpt-5.4-nano
        model_info:
          mode: responses
        litellm_params:
          model: chatgpt/gpt-5.4-nano
          api_key: os.environ/OPENAI_CODEX_ACCESS_TOKEN_2
          timeout: 120
          input_cost_per_token: 0.0000002
          output_cost_per_token: 0.00000125

      # Account-3 fallback (separate per-account quota pool)
      - model_name: openai-codex/gpt-5.4-nano
        model_info:
          mode: responses
        litellm_params:
          model: chatgpt/gpt-5.4-nano
          api_key: os.environ/OPENAI_CODEX_ACCESS_TOKEN_3
          timeout: 120
          input_cost_per_token: 0.0000002
          output_cost_per_token: 0.00000125

      # Aliases for Codex CLI default model names in openai mode
      # When acpx_run spawns with auth_mode=openai, the CLI may send these model names
      - model_name: codex-mini-latest
        model_info:
          mode: responses
        litellm_params:
          model: chatgpt/gpt-5.4-mini
          input_cost_per_token: 0.00000075
          output_cost_per_token: 0.0000045

      - model_name: o4-mini
        model_info:
          mode: responses
        litellm_params:
          model: chatgpt/gpt-5.4-mini
          input_cost_per_token: 0.00000075
          output_cost_per_token: 0.0000045

      # --- OpenAI (optional, for embeddings) ---
      - model_name: text-embedding-3-large
        litellm_params:
          model: openai/text-embedding-3-large
          api_key: os.environ/OPENAI_API_KEY

      - model_name: gpt-4o
        litellm_params:
          model: openai/gpt-4o
          api_key: os.environ/OPENAI_API_KEY

    router_settings:
      # Distribute across 3 Codex accounts; fall over on 429 or auth errors
      routing_strategy: least-busy
      enable_pre_call_checks: true
      # When ALL Codex accounts are exhausted (weekly quota), fall back to OpenRouter.
      # This applies to acpx_run calls that route gpt-5.4 through LiteLLM.
      fallbacks:
        - {"gpt-5.4": ["openrouter/nvidia/nemotron-3-super-120b-a12b:free", "openrouter/arcee-ai/trinity-large-preview:free"]}
        - {"openai-codex/gpt-5.4": ["openrouter/nvidia/nemotron-3-super-120b-a12b:free", "openrouter/arcee-ai/trinity-large-preview:free"]}
        - {"gpt-5.4-mini": ["openrouter/nvidia/nemotron-3-super-120b-a12b:free", "openrouter/arcee-ai/trinity-large-preview:free"]}
        - {"openai-codex/gpt-5.4-mini": ["openrouter/nvidia/nemotron-3-super-120b-a12b:free", "openrouter/arcee-ai/trinity-large-preview:free"]}
        - {"gpt-5.4-nano": ["openrouter/nvidia/nemotron-3-super-120b-a12b:free", "openrouter/arcee-ai/trinity-large-preview:free"]}
        - {"openai-codex/gpt-5.4-nano": ["openrouter/nvidia/nemotron-3-super-120b-a12b:free", "openrouter/arcee-ai/trinity-large-preview:free"]}
        # OpenRouter models fall back to each other — prevents crash when one 429s
        - {"openrouter/nvidia/nemotron-3-super-120b-a12b:free": ["openrouter/arcee-ai/trinity-large-preview:free"]}
        - {"nvidia/nemotron-3-super-120b-a12b:free": ["openrouter/arcee-ai/trinity-large-preview:free"]}
      # Retry once before triggering fallback to catch transient errors
      num_retries: 1
      retry_after: 5

    litellm_settings:
      # Drop unsupported params instead of erroring (important for OpenRouter quirks)
      drop_params: true

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      database_url: os.environ/DATABASE_URL
      store_model_in_db: true
      # Allow UI access
      ui_access_mode: "all"
{{- end }}
