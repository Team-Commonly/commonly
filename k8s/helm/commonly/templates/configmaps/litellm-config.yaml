{{- if .Values.litellm.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: {{ include "commonly.namespace" . }}
  labels:
    {{- include "commonly.labels" . | nindent 4 }}
data:
  config.yaml: |
    # LiteLLM proxy config — routes all backend + agent LLM calls
    # Docs: https://docs.litellm.ai/docs/proxy/configs

    model_list:
      # --- Gemini (direct google provider) ---
      - model_name: google/gemini-2.5-flash
        litellm_params:
          model: gemini/gemini-2.5-flash
          api_key: os.environ/GEMINI_API_KEY

      - model_name: google/gemini-2.5-flash-lite
        litellm_params:
          model: gemini/gemini-2.5-flash-lite
          api_key: os.environ/GEMINI_API_KEY

      - model_name: google/gemini-2.0-flash
        litellm_params:
          model: gemini/gemini-2.0-flash
          api_key: os.environ/GEMINI_API_KEY

      # Aliases for backend llmService default model names
      - model_name: gemini-2.5-flash
        litellm_params:
          model: gemini/gemini-2.5-flash
          api_key: os.environ/GEMINI_API_KEY

      # --- OpenRouter (free tier, community agents) ---
      # Registered with both prefixed and un-prefixed model names:
      # - openrouter/* used when gateway calls via openai-codex/gpt-5.4 fallback path
      # - nvidia/* / arcee-ai/* used when gateway uses openrouter:default profile
      #   (OpenClaw strips the "openrouter/" prefix before sending to the provider)
      - model_name: openrouter/nvidia/nemotron-3-super-120b-a12b:free
        litellm_params:
          model: openrouter/nvidia/nemotron-3-super-120b-a12b:free
          api_key: os.environ/OPENROUTER_API_KEY

      - model_name: nvidia/nemotron-3-super-120b-a12b:free
        litellm_params:
          model: openrouter/nvidia/nemotron-3-super-120b-a12b:free
          api_key: os.environ/OPENROUTER_API_KEY

      - model_name: openrouter/arcee-ai/trinity-large-preview:free
        litellm_params:
          model: openrouter/arcee-ai/trinity-large-preview:free
          api_key: os.environ/OPENROUTER_API_KEY

      - model_name: arcee-ai/trinity-large-preview:free
        litellm_params:
          model: openrouter/arcee-ai/trinity-large-preview:free
          api_key: os.environ/OPENROUTER_API_KEY

      # --- Codex (chatgpt/ provider, 3 accounts for independent rate-limit pools) ---
      # Account-1: token written to /chatgpt-auth/auth.json by codex-auth-seed init container.
      # Accounts 2 & 3: tokens passed via api_key in litellm_params (env var, no auth.json needed).
      # All three serve the same model names — LiteLLM's least-busy routing distributes requests
      # and falls back to accounts 2 or 3 automatically when account-1 hits 429.
      # Note: accounts 1 & 2 share the same ChatGPT team plan; account-3 is a separate plan
      # with a fully independent weekly rate-limit pool.
      - model_name: gpt-5.4
        model_info:
          mode: responses
        litellm_params:
          model: chatgpt/gpt-5.4

      - model_name: openai-codex/gpt-5.4
        model_info:
          mode: responses
        litellm_params:
          model: chatgpt/gpt-5.4

      # Account-2 fallback
      - model_name: openai-codex/gpt-5.4
        model_info:
          mode: responses
        litellm_params:
          model: chatgpt/gpt-5.4
          api_key: os.environ/OPENAI_CODEX_ACCESS_TOKEN_2

      # Account-3 fallback (separate ChatGPT plan — independent rate-limit pool)
      - model_name: openai-codex/gpt-5.4
        model_info:
          mode: responses
        litellm_params:
          model: chatgpt/gpt-5.4
          api_key: os.environ/OPENAI_CODEX_ACCESS_TOKEN_3

      # --- OpenAI (optional, for embeddings) ---
      - model_name: text-embedding-3-large
        litellm_params:
          model: openai/text-embedding-3-large
          api_key: os.environ/OPENAI_API_KEY

      - model_name: gpt-4o
        litellm_params:
          model: openai/gpt-4o
          api_key: os.environ/OPENAI_API_KEY

    router_settings:
      # Distribute across 3 Codex accounts; fall over on 429 or auth errors
      routing_strategy: least-busy
      enable_pre_call_checks: true
      # When ALL Codex accounts are exhausted (weekly quota), fall back to OpenRouter.
      # This applies to acpx_run calls that route gpt-5.4 through LiteLLM.
      fallbacks:
        - {"gpt-5.4": ["openrouter/nvidia/nemotron-3-super-120b-a12b:free", "openrouter/arcee-ai/trinity-large-preview:free"]}
        - {"openai-codex/gpt-5.4": ["openrouter/nvidia/nemotron-3-super-120b-a12b:free", "openrouter/arcee-ai/trinity-large-preview:free"]}
      # Retry once before triggering fallback to catch transient errors
      num_retries: 1
      retry_after: 5

    litellm_settings:
      # Drop unsupported params instead of erroring (important for OpenRouter quirks)
      drop_params: true

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      # Persist logs to Aiven PostgreSQL — LiteLLM creates its own tables (LiteLLM_SpendLogs etc.)
      database_url: os.environ/DATABASE_URL
      store_model_in_db: true
      # Allow UI access
      ui_access_mode: "all"
      # Auto-purge spend logs older than 2 days to keep Aiven PG storage small
      max_request_log_retention_days: 2
      # Store full prompt/response bodies in LiteLLM_SpendLogs for UI inspection
      # NOTE: must be under general_settings (not litellm_settings) — that's where the code reads it
      store_prompts_in_spend_logs: true
{{- end }}
