{{- if .Values.agents.clawdbot.persistence.config.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: clawdbot-config-pvc
  namespace: {{ include "commonly.namespace" . }}
  labels:
    {{- include "commonly.labels" . | nindent 4 }}
    app: clawdbot
    component: config
spec:
  accessModes:
  - {{ .Values.agents.clawdbot.persistence.config.accessMode }}
  storageClassName: {{ .Values.agents.clawdbot.persistence.config.storageClass }}
  resources:
    requests:
      storage: {{ .Values.agents.clawdbot.persistence.config.size }}
{{- end }}
