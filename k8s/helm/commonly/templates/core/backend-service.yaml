{{- if .Values.backend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: {{ include "commonly.namespace" . }}
  labels:
    {{- include "commonly.backend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  sessionAffinity: {{ .Values.backend.service.sessionAffinity }}
  {{- if .Values.backend.service.sessionAffinity }}
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: {{ .Values.backend.service.sessionAffinityTimeout }}
  {{- end }}
  ports:
  - port: {{ .Values.backend.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "commonly.backend.selectorLabels" . | nindent 4 }}
{{- end }}
