{{- if .Values.backend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: {{ include "commonly.namespace" . }}
  labels:
    {{- include "commonly.backend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "commonly.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "commonly.backend.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.rbac.serviceAccount.name }}
      {{- if and .Values.skillsCatalogStorage.enabled .Values.skillsCatalogStorage.bootstrapFromImage }}
      initContainers:
      - name: skills-catalog-bootstrap
        image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
        imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
        command: ["/bin/sh", "-c"]
        args:
          - |
            if [ -n "${SKILLS_CATALOG_URL}" ]; then
              echo "Downloading skills catalog from ${SKILLS_CATALOG_URL}";
              if curl -fsSL "${SKILLS_CATALOG_URL}" -o /catalog/awesome-agent-skills-index.json; then
                exit 0;
              fi
              echo "Download failed, falling back to image file";
            fi
            if [ -f /app/docs/skills/awesome-agent-skills-index.json ]; then
              cp /app/docs/skills/awesome-agent-skills-index.json /catalog/awesome-agent-skills-index.json;
              exit 0;
            fi
            echo "skills catalog not found in image or download URL, skipping bootstrap";
        env:
        - name: SKILLS_CATALOG_URL
          value: {{ .Values.skillsCatalogStorage.downloadUrl | quote }}
        volumeMounts:
        - name: skills-catalog
          mountPath: /catalog
      {{- end }}
      containers:
      - name: backend
        image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
        imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.backend.service.port }}
          name: http
        env:
        # Node Environment
        - name: NODE_ENV
          value: {{ .Values.backend.env.nodeEnv }}
        - name: PORT
          value: {{ .Values.backend.service.port | quote }}
        {{- if .Values.backend.env.registrationInviteOnly }}
        - name: REGISTRATION_INVITE_ONLY
          value: {{ .Values.backend.env.registrationInviteOnly | quote }}
        {{- end }}

        # Database Connections
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: mongo-uri
        - name: PG_HOST
          value: {{ .Values.backend.env.pgHost | default (printf "postgres.%s.svc.cluster.local" (include "commonly.namespace" .)) | quote }}
        - name: PG_PORT
          value: {{ .Values.backend.env.pgPort | default "5432" | quote }}
        - name: PG_DATABASE
          value: {{ .Values.backend.env.pgDatabase | default .Values.postgresql.database | quote }}
        - name: PG_USER
          value: {{ .Values.backend.env.pgUser | default .Values.postgresql.username | quote }}
        - name: PG_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: postgres-password
        - name: PG_SSL_ENABLED
          value: {{ .Values.backend.env.pgSslEnabled | default "true" | quote }}
        - name: PG_CA_CERT_PATH
          value: {{ .Values.backend.env.pgCaCertPath | default "/app/certs/ca.pem" | quote }}
        - name: PG_SSL_CA_PATH
          value: {{ .Values.backend.env.pgCaCertPath | default "/app/certs/ca.pem" | quote }}

        # Redis for Socket.io
        - name: REDIS_HOST
          value: redis.{{ include "commonly.namespace" . }}.svc.cluster.local
        - name: REDIS_PORT
          value: {{ .Values.redis.service.port | quote }}

        # JWT and Session
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: jwt-secret
        - name: SESSION_SECRET
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: session-secret
        {{- if .Values.backend.env.frontendUrl }}
        - name: FRONTEND_URL
          value: {{ .Values.backend.env.frontendUrl | quote }}
        {{- else }}
        - name: FRONTEND_URL
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: FRONTEND_URL
              optional: true
        {{- end }}
        {{- if .Values.backend.env.backendUrl }}
        - name: BACKEND_URL
          value: {{ .Values.backend.env.backendUrl | quote }}
        {{- else }}
        - name: BACKEND_URL
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: BACKEND_URL
              optional: true
        {{- end }}

        # Email Configuration (SMTP2GO)
        - name: SMTP2GO_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: SMTP2GO_API_KEY
              optional: true
        - name: SMTP2GO_FROM_EMAIL
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: SMTP2GO_FROM_EMAIL
              optional: true
        - name: SMTP2GO_FROM_NAME
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: SMTP2GO_FROM_NAME
              optional: true
        - name: SMTP2GO_BASE_URL
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: SMTP2GO_BASE_URL
              optional: true

        # AI Services
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: gemini-api-key
        - name: OPENROUTER_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openrouter-api-key
              optional: true
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openai-api-key
              optional: true
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: anthropic-api-key
              optional: true

        # Discord Integration
        - name: DISCORD_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: discord-bot-token
        - name: DISCORD_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: discord-client-id
        - name: DISCORD_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: discord-client-secret
        - name: DISCORD_GUILD_ID
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: discord-guild-id
              optional: true

        # OAuth Providers
        - name: GOOGLE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: google-client-id
              optional: true
        - name: GOOGLE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: google-client-secret
              optional: true
        - name: GITHUB_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: github-client-id
              optional: true
        - name: GITHUB_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: github-client-secret
              optional: true
        - name: GITHUB_PAT
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: GITHUB_PAT
              optional: true
        - name: X_OAUTH_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: x-oauth-client-id
              optional: true
        - name: X_OAUTH_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: x-oauth-client-secret
              optional: true

        # Agent Runtime Configuration
        - name: AGENT_PROVISIONER_K8S
          value: {{ .Values.backend.env.agentProvisionerK8s | quote }}
        - name: AGENT_PROVISIONER_DOCKER
          value: {{ .Values.backend.env.agentProvisionerDocker | quote }}
        {{- if .Values.backend.env.agentProvisionerNodePool }}
        - name: AGENT_PROVISIONER_NODE_POOL
          value: {{ .Values.backend.env.agentProvisionerNodePool | quote }}
        {{- end }}
        - name: K8S_NAMESPACE
          value: {{ include "commonly.namespace" . | quote }}
        - name: COMMONLY_API_URL
          value: {{ .Values.backend.env.commonlyApiUrl | default (printf "http://backend.%s.svc.cluster.local:5000" (include "commonly.namespace" .)) | quote }}
        - name: CLAWDBOT_GATEWAY_URL
          value: {{ .Values.backend.env.clawdbotGatewayUrl | default (printf "http://clawdbot-gateway.%s.svc.cluster.local:18789" (include "commonly.namespace" .)) | quote }}
        - name: MOLTBOT_GATEWAY_URL
          value: {{ .Values.backend.env.moltbotGatewayUrl | default (printf "ws://clawdbot-gateway.%s.svc.cluster.local:18789" (include "commonly.namespace" .)) | quote }}
        - name: CLAWDBOT_IMAGE
          value: "{{ .Values.agents.clawdbot.image.repository }}:{{ .Values.agents.clawdbot.image.tag }}"
        - name: CLAWDBOT_GATEWAY_TOKEN
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: clawdbot-gateway-token
        - name: COMMONLY_BOT_RUNTIME_TOKEN
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: commonly-bot-runtime-token

        # Other Integrations
        - name: SLACK_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: slack-bot-token
              optional: true
        - name: GROUPME_BOT_ID
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: groupme-bot-id
              optional: true
        - name: TELEGRAM_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: telegram-bot-token
              optional: true
        - name: BRAVE_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: brave-api-key
              optional: true
        - name: FIRECRAWL_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: firecrawl-api-key
              optional: true
        - name: DEEPGRAM_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: deepgram-api-key
              optional: true

        # LiteLLM Configuration
        - name: LITELLM_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: litellm-master-key
              optional: true
        - name: LITELLM_BASE_URL
          value: "http://litellm:4000"
        - name: LITELLM_CHAT_MODEL
          value: "chatgpt/gpt-5.4-mini"
        - name: SKILLS_CATALOG_PATH
          value: /app/docs/skills/awesome-agent-skills-index.json
        - name: MARKETPLACE_MANIFEST_PATH
          value: {{ .Values.backend.env.marketplaceManifestPath | default "/app/packages/commonly-marketplace/marketplace.json" | quote }}

        # Logging
        - name: LOG_LEVEL
          value: {{ .Values.backend.env.logLevel | default "info" }}

        # Agent session size threshold
        {{- if .Values.backend.env.agentSessionMaxSizeKb }}
        - name: AGENT_SESSION_MAX_SIZE_KB
          value: {{ .Values.backend.env.agentSessionMaxSizeKb | quote }}
        {{- end }}

        # GCP Secret Manager credentials
        {{- if .Values.externalSecrets.enabled }}
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: /app/gcp/secret-access-credentials.json
        - name: GCP_PROJECT_ID
          value: {{ .Values.externalSecrets.secretStore.projectId | quote }}
        {{- end }}

        volumeMounts:
        - name: postgres-ca-cert
          mountPath: /app/certs
          readOnly: true
        - name: marketplace-manifest
          mountPath: /app/packages/commonly-marketplace
          readOnly: true
        - name: skills-catalog
          mountPath: /app/docs/skills
          readOnly: true
        {{- if .Values.externalSecrets.enabled }}
        - name: gcpsm-credentials
          mountPath: /app/gcp
          readOnly: true
        {{- end }}

        resources:
          {{- toYaml .Values.backend.resources | nindent 10 }}

        {{- if .Values.backend.livenessProbe.enabled }}
        livenessProbe:
          httpGet:
            path: {{ .Values.backend.livenessProbe.path }}
            port: http
          initialDelaySeconds: {{ .Values.backend.livenessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.backend.livenessProbe.periodSeconds }}
        {{- end }}

        {{- if .Values.backend.readinessProbe.enabled }}
        readinessProbe:
          httpGet:
            path: {{ .Values.backend.readinessProbe.path }}
            port: http
          initialDelaySeconds: {{ .Values.backend.readinessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.backend.readinessProbe.periodSeconds }}
        {{- end }}

      {{- if and .Values.backend.nodeSelector (gt (len .Values.backend.nodeSelector) 0) }}
      nodeSelector:
        {{- toYaml .Values.backend.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if and .Values.backend.tolerations (gt (len .Values.backend.tolerations) 0) }}
      tolerations:
        {{- toYaml .Values.backend.tolerations | nindent 8 }}
      {{- end }}

      volumes:
      - name: postgres-ca-cert
        secret:
          secretName: postgres-ca-cert
      - name: marketplace-manifest
        configMap:
          name: marketplace-manifest
      {{- if .Values.externalSecrets.enabled }}
      - name: gcpsm-credentials
        secret:
          secretName: gcpsm-secret
          items:
          - key: secret-access-credentials
            path: secret-access-credentials.json
      {{- end }}
      {{- if .Values.skillsCatalogStorage.enabled }}
      - name: skills-catalog
        persistentVolumeClaim:
          claimName: skills-catalog-pvc
      {{- else }}
      - name: skills-catalog
        configMap:
          name: skills-catalog
      {{- end }}
{{- end }}
