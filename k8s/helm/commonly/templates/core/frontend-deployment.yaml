{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: {{ include "commonly.namespace" . }}
  labels:
    {{- include "commonly.frontend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "commonly.frontend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "commonly.frontend.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - name: frontend
        image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
        imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.frontend.service.port }}
          name: http
        resources:
          {{- toYaml .Values.frontend.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
      {{- if and .Values.frontend.nodeSelector (gt (len .Values.frontend.nodeSelector) 0) }}
      nodeSelector:
        {{- toYaml .Values.frontend.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if and .Values.frontend.tolerations (gt (len .Values.frontend.tolerations) 0) }}
      tolerations:
        {{- toYaml .Values.frontend.tolerations | nindent 8 }}
      {{- end }}
{{- end }}
