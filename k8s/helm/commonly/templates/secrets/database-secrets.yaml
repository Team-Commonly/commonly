{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: database-credentials
  namespace: {{ include "commonly.namespace" . }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore.name }}
    kind: SecretStore
  target:
    name: database-credentials
    creationPolicy: Owner
  data:
  - secretKey: mongo-uri
    remoteRef:
      key: commonly-dev-mongo-uri
  - secretKey: mongo-password
    remoteRef:
      key: commonly-dev-mongo-password
  - secretKey: postgres-password
    remoteRef:
      key: commonly-dev-postgres-password
{{- end }}
