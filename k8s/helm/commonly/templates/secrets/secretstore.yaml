{{- if .Values.externalSecrets.enabled }}
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: {{ .Values.externalSecrets.secretStore.name }}
  namespace: {{ include "commonly.namespace" . }}
spec:
  provider:
    gcpsm:
      projectID: {{ .Values.externalSecrets.secretStore.projectId | quote }}
      auth:
        {{- if .Values.externalSecrets.workloadIdentity.enabled }}
        workloadIdentity:
          serviceAccountRef:
            name: {{ .Values.externalSecrets.workloadIdentity.serviceAccountName }}
        {{- else }}
        secretRef:
          secretAccessKeySecretRef:
            name: gcpsm-secret
            key: secret-access-credentials
        {{- end }}
{{- end }}
{{- if and .Values.externalSecrets.enabled .Values.externalSecrets.workloadIdentity.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.externalSecrets.workloadIdentity.serviceAccountName }}
  namespace: {{ include "commonly.namespace" . }}
  annotations:
    iam.gke.io/gcp-service-account: {{ .Values.externalSecrets.workloadIdentity.gcpServiceAccount }}
{{- end }}
