{{- if not .Values.externalSecrets.enabled }}
# Local development secrets — created when externalSecrets.enabled=false
# These replace the ExternalSecret resources that normally pull from GCP Secret Manager.
# All values here are safe for local/test use only. NEVER use in production.
---
apiVersion: v1
kind: Secret
metadata:
  name: api-keys
  namespace: {{ include "commonly.namespace" . }}
  labels:
    {{- include "commonly.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Auth — override via --set localSecrets.jwtSecret=... or in your own values file
  jwt-secret: {{ .Values.localSecrets.jwtSecret | default "local-dev-jwt-secret-change-in-prod" | quote }}
  session-secret: {{ .Values.localSecrets.sessionSecret | default "local-dev-session-secret-change-in-prod" | quote }}

  # AI services — empty by default; set your own keys to enable features
  gemini-api-key: {{ .Values.localSecrets.geminiApiKey | default "" | quote }}
  openrouter-api-key: {{ .Values.localSecrets.openrouterApiKey | default "" | quote }}
  openai-api-key: {{ .Values.localSecrets.openaiApiKey | default "" | quote }}
  anthropic-api-key: {{ .Values.localSecrets.anthropicApiKey | default "" | quote }}
  litellm-master-key: {{ .Values.localSecrets.litellmMasterKey | default "" | quote }}

  # Discord — empty by default; set to enable Discord integration
  discord-bot-token: {{ .Values.localSecrets.discordBotToken | default "" | quote }}
  discord-client-id: {{ .Values.localSecrets.discordClientId | default "" | quote }}
  discord-client-secret: {{ .Values.localSecrets.discordClientSecret | default "" | quote }}
  discord-guild-id: {{ .Values.localSecrets.discordGuildId | default "" | quote }}

  # OAuth providers — empty by default
  google-client-id: {{ .Values.localSecrets.googleClientId | default "" | quote }}
  google-client-secret: {{ .Values.localSecrets.googleClientSecret | default "" | quote }}
  github-client-id: {{ .Values.localSecrets.githubClientId | default "" | quote }}
  github-client-secret: {{ .Values.localSecrets.githubClientSecret | default "" | quote }}
  x-oauth-client-id: {{ .Values.localSecrets.xOauthClientId | default "" | quote }}
  x-oauth-client-secret: {{ .Values.localSecrets.xOauthClientSecret | default "" | quote }}
  GITHUB_PAT: {{ .Values.localSecrets.githubPat | default "" | quote }}

  # Agent runtime tokens — generated placeholder values for local use
  clawdbot-gateway-token: {{ .Values.localSecrets.clawdbotGatewayToken | default "local-gateway-token" | quote }}
  commonly-bot-runtime-token: {{ .Values.localSecrets.commonlyBotRuntimeToken | default "local-bot-token" | quote }}

  # Integrations — empty by default
  slack-bot-token: {{ .Values.localSecrets.slackBotToken | default "" | quote }}
  groupme-bot-id: {{ .Values.localSecrets.groupmeBotId | default "" | quote }}
  telegram-bot-token: {{ .Values.localSecrets.telegramBotToken | default "" | quote }}
  brave-api-key: {{ .Values.localSecrets.braveApiKey | default "" | quote }}
  brave-api-key-2: {{ .Values.localSecrets.braveApiKey2 | default "" | quote }}
  firecrawl-api-key: {{ .Values.localSecrets.firecrawlApiKey | default "" | quote }}
  deepgram-api-key: {{ .Values.localSecrets.deepgramApiKey | default "" | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: database-credentials
  namespace: {{ include "commonly.namespace" . }}
  labels:
    {{- include "commonly.labels" . | nindent 4 }}
type: Opaque
stringData:
  # MongoDB — URI is auto-constructed to point at the in-cluster StatefulSet
  mongo-password: {{ .Values.localSecrets.mongoPassword | default "locally" | quote }}
  mongo-uri: {{ .Values.localSecrets.mongoUri | default (printf "mongodb://admin:locally@mongodb.%s.svc.cluster.local:27017/commonly?authSource=admin" (include "commonly.namespace" .)) | quote }}
  # PostgreSQL
  postgres-password: {{ .Values.localSecrets.postgresPassword | default "locally" | quote }}
---
# Postgres CA cert — empty placeholder; SSL is disabled in local mode
apiVersion: v1
kind: Secret
metadata:
  name: postgres-ca-cert
  namespace: {{ include "commonly.namespace" . }}
  labels:
    {{- include "commonly.labels" . | nindent 4 }}
type: Opaque
data:
  # Empty cert — not used when PG_SSL_ENABLED=false
  ca.pem: ""
{{- end }}
