{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: api-keys
  namespace: {{ include "commonly.namespace" . }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore.name }}
    kind: SecretStore
  target:
    name: api-keys
    creationPolicy: Owner
  data:
  # JWT and Authentication
  - secretKey: jwt-secret
    remoteRef:
      key: commonly-dev-jwt-secret

  # AI Services
  - secretKey: gemini-api-key
    remoteRef:
      key: commonly-dev-gemini-api-key
  - secretKey: openrouter-api-key
    remoteRef:
      key: commonly-dev-openrouter-api-key
  - secretKey: openai-api-key
    remoteRef:
      key: commonly-dev-openai-api-key
  - secretKey: anthropic-api-key
    remoteRef:
      key: commonly-dev-anthropic-api-key

  # Discord Integration
  - secretKey: discord-bot-token
    remoteRef:
      key: commonly-dev-discord-bot-token
  - secretKey: discord-client-id
    remoteRef:
      key: commonly-dev-discord-client-id
  - secretKey: discord-client-secret
    remoteRef:
      key: commonly-dev-discord-client-secret
  - secretKey: discord-guild-id
    remoteRef:
      key: commonly-dev-discord-guild-id

  # OAuth Providers
  - secretKey: google-client-id
    remoteRef:
      key: commonly-dev-google-client-id
  - secretKey: google-client-secret
    remoteRef:
      key: commonly-dev-google-client-secret
  - secretKey: github-client-id
    remoteRef:
      key: commonly-dev-github-client-id
  - secretKey: github-client-secret
    remoteRef:
      key: commonly-dev-github-client-secret
  - secretKey: x-oauth-client-id
    remoteRef:
      key: commonly-dev-x-oauth-client-id
  - secretKey: x-oauth-client-secret
    remoteRef:
      key: commonly-dev-x-oauth-client-secret

  # Agent Runtime Tokens
  - secretKey: clawdbot-gateway-token
    remoteRef:
      key: commonly-dev-clawdbot-gateway-token
  - secretKey: commonly-bot-runtime-token
    remoteRef:
      key: commonly-dev-commonly-bot-runtime-token

  # Other Integrations
  - secretKey: slack-bot-token
    remoteRef:
      key: commonly-dev-slack-bot-token
  - secretKey: groupme-bot-id
    remoteRef:
      key: commonly-dev-groupme-bot-id
  - secretKey: telegram-bot-token
    remoteRef:
      key: commonly-dev-telegram-bot-token
  - secretKey: brave-api-key
    remoteRef:
      key: commonly-dev-brave-api-key
  - secretKey: brave-api-key-2
    remoteRef:
      key: commonly-dev-brave-api-key-2

  # LiteLLM Configuration
  - secretKey: litellm-master-key
    remoteRef:
      key: commonly-dev-litellm-master-key

  # Session and Security
  - secretKey: session-secret
    remoteRef:
      key: commonly-dev-session-secret
{{- end }}
