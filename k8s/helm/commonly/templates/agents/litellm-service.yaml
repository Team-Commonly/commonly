{{- if .Values.litellm.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: {{ include "commonly.namespace" . }}
  labels:
    {{- include "commonly.labels" . | nindent 4 }}
    app: litellm
spec:
  type: ClusterIP
  selector:
    {{- include "commonly.selectorLabels" . | nindent 4 }}
    app: litellm
  ports:
  - name: http
    port: 4000
    targetPort: 4000
    protocol: TCP
{{- end }}
