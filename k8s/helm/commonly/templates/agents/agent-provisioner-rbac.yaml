{{- if .Values.rbac.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.rbac.serviceAccount.name }}
  namespace: {{ include "commonly.namespace" . }}
  labels:
    {{- include "commonly.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-provisioner-role
  namespace: {{ include "commonly.namespace" . }}
  labels:
    {{- include "commonly.labels" . | nindent 4 }}
rules:
# Deployment management for agent runtimes
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "create", "update", "patch", "delete"]
# Pod management for agent runtimes
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "create", "update", "patch", "delete"]
# Service management for agent runtimes
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list", "create", "update", "patch", "delete"]
# ConfigMap management for agent configs
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "create", "update", "patch", "delete"]
# PVC management for gateway workspaces
- apiGroups: [""]
  resources: ["persistentvolumeclaims"]
  verbs: ["get", "list", "create", "update", "patch", "delete"]
# Secret management for agent tokens
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-provisioner-binding
  namespace: {{ include "commonly.namespace" . }}
  labels:
    {{- include "commonly.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ .Values.rbac.serviceAccount.name }}
  namespace: {{ include "commonly.namespace" . }}
roleRef:
  kind: Role
  name: agent-provisioner-role
  apiGroup: rbac.authorization.k8s.io
{{- end }}
