{{- if .Values.agents.cloudCodex.enabled }}
{{- /*
  cloud-codex — runs `commonly agent run <name>` + the codex CLI inside the
  cluster, as an alternative to `sam-local-codex` (which runs the same pair
  on an operator's laptop).

  Why cluster-side codex matters:
    ChatGPT binds OAuth sessions to the IP/device that completed device-auth.
    A session device-auth'd on a laptop and then used by LiteLLM from the
    cluster's IP gets `token_invalidated` immediately on first use. That's
    why dev's LiteLLM Codex path has been flapping despite fresh tokens.
    When `codex login --device-auth` runs INSIDE this pod, the cluster IP
    is what ChatGPT sees both for the device-auth AND for subsequent CLI
    calls — no mismatch, no anti-abuse revoke.

  Operator flow (one-time per agent install):
    1. Pre-create the AgentInstallation via `POST /api/registry/install`
       and obtain a runtime token (cm_agent_*). Stash it in the secret
       referenced by COMMONLY_AGENT_TOKEN below.
    2. `helm upgrade` — pod boots; init container installs codex + commonly
       CLIs to /tools; main container waits for ~/.codex/auth.json.
    3. `kubectl exec -n commonly-dev deploy/cloud-codex-<agent> -- codex login --device-auth`
       — operator completes device-auth in their browser; auth.json lands
       on the PVC at /root/.codex/auth.json.
    4. Main container picks up auth.json, runs `commonly agent run <name>`
       in poll mode against CAP. Replies use codex CLI executing inside
       this pod, so OpenAI sees one stable client = one stable session.

  Identity continuity (ADR-001 §3):
    The AgentInstallation row + the agent's User row predate this pod and
    survive its restart/redeploy. The pod is just runtime — no identity
    state lives here that isn't recoverable.
*/}}
{{- range $name, $cfg := .Values.agents.cloudCodex.agents }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cloud-codex-{{ $name }}
  namespace: {{ include "commonly.namespace" $ }}
  labels:
    {{- include "commonly.labels" $ | nindent 4 }}
    app: cloud-codex
    agent: {{ $name }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ $cfg.storage | default "1Gi" }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-codex-{{ $name }}
  namespace: {{ include "commonly.namespace" $ }}
  labels:
    {{- include "commonly.labels" $ | nindent 4 }}
    app: cloud-codex
    agent: {{ $name }}
spec:
  replicas: 1
  # Recreate so the PVC (single-writer RWO) reattaches cleanly on update.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "commonly.selectorLabels" $ | nindent 6 }}
      app: cloud-codex
      agent: {{ $name }}
  template:
    metadata:
      labels:
        {{- include "commonly.selectorLabels" $ | nindent 8 }}
        app: cloud-codex
        agent: {{ $name }}
    spec:
      initContainers:
      # Mirror of clawdbot-deployment's codex-tools-installer init —
      # installs the pinned codex + commonly CLIs into the shared
      # /tools volume so the main container has the binaries available.
      - name: codex-tools-installer
        image: node:22-bookworm-slim
        command:
        - /bin/sh
        - -c
        - |
          set -e
          export NPM_CONFIG_PREFIX=/tools
          apt-get update >/dev/null 2>&1
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            git ca-certificates >/dev/null 2>&1
          # Pin via values.yaml (agents.cloudCodex.codexVersion). The
          # earlier 0.116.0 attempt was based on a misdiagnosis: codex
          # was crashing the MCP subprocess at startup because we never
          # declared the env table on [mcp_servers.commonly] (codex
          # sandboxes spawned MCP children and does not inherit parent
          # env). PR #398 fixes that. End-to-end smoke on 0.125.0
          # confirms MCP tools surfaced and Cody calls them
          # successfully — see PR #400 for the unpin write-up.
          # Default bumped to 0.133.0 (2026-06-09): MCP surfacing
          # re-verified on 0.133 via model-request payload capture. The
          # gate is the env table on [mcp_servers.commonly] below, NOT the
          # codex version (confirmed across 0.116/0.125/0.133).
          npm install --global --no-audit --no-fund \
            "@openai/codex@{{ $.Values.agents.cloudCodex.codexVersion | default "0.133.0" }}" \
            "@commonlyai/mcp@{{ $.Values.agents.cloudCodex.commonlyMcpVersion | default "0.1.2" }}"
          git clone --depth 1 --branch "{{ $.Values.agents.cloudCodex.commonlyCliRef | default "main" }}" \
            https://github.com/Team-Commonly/commonly.git /tmp/commonly-src
          mkdir -p /tools/lib
          cp -r /tmp/commonly-src/cli /tools/lib/commonly-cli
          cd /tools/lib/commonly-cli
          npm install --omit=dev --no-audit --no-fund
          ln -sf /tools/lib/commonly-cli/src/index.js /tools/bin/commonly
          chmod +x /tools/lib/commonly-cli/src/index.js
          /tools/bin/codex --version || true
          /tools/bin/commonly --version || true
        volumeMounts:
        - name: tools
          mountPath: /tools
      containers:
      - name: agent
        image: node:22-bookworm-slim
        command:
        - /bin/sh
        - -c
        - |
          set -e
          export PATH="/tools/bin:$PATH"
          export HOME=/state
          mkdir -p /state/.codex /state/.commonly/tokens

          # ca-certificates aren't included in node:22-bookworm-slim base,
          # but codex CLI needs them for TLS to api.openai.com /
          # auth.openai.com. Install once at boot (idempotent — apt skips
          # what's already there) so the run loop's outbound HTTPS works.
          # git is also missing from the slim base; the agent shells out to
          # `git clone`, `git push`, etc. during an agent run, so install
          # it here alongside ca-certs. Boot delay is one-off (apt cache
          # warm from ca-certs install above) and the binary is tiny.
          if [ ! -d /etc/ssl/certs ] || [ -z "$(ls -A /etc/ssl/certs 2>/dev/null)" ] || ! command -v git >/dev/null 2>&1; then
            echo "[cloud-codex] installing ca-certificates + git for TLS / VCS"
            apt-get update >/dev/null 2>&1 || true
            DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends ca-certificates git >/dev/null 2>&1 || true
            update-ca-certificates >/dev/null 2>&1 || true
          fi

          # Seed ~/.commonly/tokens/<name>.json — `commonly agent run`
          # uses loadAgentToken() to find the runtime credentials for this
          # agent name. The record shape mirrors what `commonly agent
          # attach` would write on a laptop.
          # Token-file name uses the local wrapper alias (COMMONLY_AGENT_NAME);
          # `agentName` and `instanceId` INSIDE the file are the registry-side
          # identifiers the poller passes to /api/agents/runtime/events.
          cat > /state/.commonly/tokens/${COMMONLY_AGENT_NAME}.json <<EOF
          {
            "agentName": "${COMMONLY_REGISTRY_AGENT_NAME}",
            "instanceId": "${COMMONLY_AGENT_INSTANCE_ID:-$COMMONLY_AGENT_NAME}",
            "podId": "${COMMONLY_POD_ID}",
            "instanceUrl": "${COMMONLY_API_URL}",
            "runtimeToken": "${COMMONLY_AGENT_TOKEN}",
            "adapter": "${COMMONLY_ADAPTER:-codex}",
            "savedAt": "$(date -u +%FT%TZ)"
          }
          EOF
          chmod 600 /state/.commonly/tokens/${COMMONLY_AGENT_NAME}.json

          # Task #65: ALSO rewrite /state/.commonly/config.json on every
          # boot so `commonly agent run` resolves the dev instance + the
          # current runtime token instead of falling back to its stale
          # PVC copy or the public https://api.commonly.me default. Without
          # this the CLI hits "fetch failed" forever after a token rotation
          # or pod move (verified empirically 2026-05-18 — Cody silently
          # polled the wrong URL for hours).
          cat > /state/.commonly/config.json <<EOF
          {
            "instances": {
              "dev": {
                "url": "${COMMONLY_API_URL}",
                "token": "",
                "agentTokens": {
                  "${COMMONLY_AGENT_NAME}": "${COMMONLY_AGENT_TOKEN}"
                }
              }
            },
            "active": "dev"
          }
          EOF
          chmod 600 /state/.commonly/config.json

          # Seed ~/.codex/config.toml so codex CLI routes its model calls
          # through LiteLLM instead of straight to chatgpt.com. The LiteLLM
          # pod already holds cluster-IP-bound auth.json (rotator-managed,
          # operator-device-auth'd), so this agent shares the same auth
          # surface as every other openclaw moltbot agent — single quota
          # pool, single rotation, single observability.
          #
          # Runtime stays codex: codex CLI still spawns, still sandboxes,
          # still owns tool use and sessions. Only the HTTPS layer is proxied.
          cat > /state/.codex/config.toml <<EOF
          # wire_api=responses below -> LiteLLM /v1/responses. Must use the unprefixed
          # codex-cli/* alias (maps to chatgpt/gpt-5.4); the prefixed chat-path aliases
          # 400 with "model not supported" on /responses. See litellm-config.yaml.
          model = "codex-cli/gpt-5.4"
          model_provider = "litellm"

          # Codex CLI's default sandbox uses bubblewrap (bwrap), which
          # requires CAP_SYS_ADMIN / unprivileged user-namespaces — neither
          # available to standard k8s containers. Without this knob, every
          # shell tool call (git/pwd/ls/...) fails with "bwrap: Failed to
          # make / slave: Permission denied" inside the pod (verified
          # empirically 2026-05-15). The pod is the security perimeter —
          # PVC-scoped workspace, no host mounts, isolated identity.
          # bwrap inside the pod is redundant.
          sandbox_mode = "danger-full-access"
          approval_policy = "never"

          [model_providers.litellm]
          name = "LiteLLM"
          base_url = "${COMMONLY_LITELLM_BASE_URL}"
          wire_api = "responses"
          env_key = "LITELLM_API_KEY"

          # @commonlyai/mcp gives this codex instance the kernel tool
          # surface (commonly_react_to_message, commonly_post_message,
          # memory verbs, dm verbs, ...) via stdio MCP. Without this block,
          # codex sees no kernel tools and ends up posting emoji as a
          # literal message body when @-mentioned to "react".
          #
          # The env table is REQUIRED — codex does NOT inherit the
          # parent container env when it spawns the MCP subprocess
          #
          # NOTE: keep this comment free of backticks. The heredoc is
          # unquoted (<<EOF) so backticks command-substitute — a previous
          # version wrapped 'env' in backticks here, which ran the env
          # command and dumped every container env var (incl. the
          # GitHub PAT) literally into the deployed config.toml on the
          # pod PVC. See PR #399.
          # (verified empirically 2026-05-17 against codex 0.116.0
          # AND 0.125.0). Without these two vars, the subprocess
          # crashes at startup with "fatal: COMMONLY_API_URL is
          # required" and the model sees no commonly_* tools. The bug
          # mimicked openai/codex#19871 but was actually our own
          # bootstrap omission — bisecting codex versions never moved
          # the needle.
          [mcp_servers.commonly]
          command = "/tools/bin/commonly-mcp"
          args = []
          env = { COMMONLY_API_URL = "${COMMONLY_API_URL}", COMMONLY_AGENT_TOKEN = "${COMMONLY_AGENT_TOKEN}" }
          EOF

          # Codex CLI looks for LITELLM_API_KEY at call time. The virtual
          # key is injected from a k8s Secret created at install time
          # alongside COMMONLY_AGENT_TOKEN.
          export LITELLM_API_KEY="${COMMONLY_LITELLM_KEY:-}"
          if [ -z "$LITELLM_API_KEY" ]; then
            echo "[cloud-codex] WARNING: COMMONLY_LITELLM_KEY is empty — model calls will 401 at LiteLLM"
          fi

          # If a GitHub PAT is present, wire it into both git's
          # credential helper (so `git clone https://github.com/...` and
          # `git push` work without prompting) and gh CLI (so `gh pr
          # create` authenticates). Idempotent — re-running rewrites the
          # same credentials file. Silent no-op when GITHUB_PAT is empty,
          # which keeps non-dev tiers safe if the env ever lands without
          # the secret.
          if [ -n "${GITHUB_PAT:-}" ]; then
            # Trim any trailing newline/carriage-return baked into the
            # secret value (often present when the PAT was minted via
            # `cat token | base64`). git's libcurl refuses to parse a URL
            # whose password component contains a newline ("credential
            # url cannot be parsed") — verified empirically against the
            # live `commonly-github-pat` 2026-05-15.
            TRIMMED_GITHUB_PAT=$(printf '%s' "${GITHUB_PAT}" | tr -d '\n\r')
            git config --global credential.helper store
            mkdir -p /state
            printf 'https://x-access-token:%s@github.com\n' "${TRIMMED_GITHUB_PAT}" > /state/.git-credentials
            chmod 600 /state/.git-credentials
            git config --global credential.helper "store --file=/state/.git-credentials"
            git config --global user.name "${GIT_AUTHOR_NAME:-Cody}"
            git config --global user.email "${GIT_AUTHOR_EMAIL:-cody@commonly.me}"
            echo "[cloud-codex] git credentials seeded from GITHUB_PAT"
          else
            echo "[cloud-codex] no GITHUB_PAT in env — git/gh operations will require interactive auth"
          fi

          echo "[cloud-codex] config.toml seeded for LiteLLM provider; starting commonly agent run ${COMMONLY_AGENT_NAME}"
          exec /tools/bin/commonly agent run "${COMMONLY_AGENT_NAME}"
        env:
        - name: COMMONLY_AGENT_NAME
          value: {{ $name | quote }}
        - name: COMMONLY_REGISTRY_AGENT_NAME
          # The registry-side agentName (matches AgentInstallation.agentName).
          # Defaults to "cloud-codex" since that's what this Helm template is
          # for; override if you ever install under a different name.
          value: {{ $cfg.registryAgentName | default "cloud-codex" | quote }}
        - name: COMMONLY_AGENT_INSTANCE_ID
          value: {{ $cfg.agentInstanceId | default $name | quote }}
        - name: COMMONLY_POD_ID
          value: {{ $cfg.podId | quote }}
        - name: COMMONLY_ADAPTER
          value: {{ $cfg.adapter | default "codex" | quote }}
        - name: COMMONLY_API_URL
          value: {{ $cfg.apiUrl | default $.Values.agents.cloudCodex.apiUrl | quote }}
        - name: COMMONLY_AGENT_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ $cfg.tokenSecret | default (printf "cloud-codex-%s-token" $name) }}
              key: token
        # Codex CLI is configured to call LiteLLM instead of chatgpt.com
        # directly (see config.toml in the boot script). Two values needed:
        # the base URL and a LiteLLM virtual key. ChatGPT auth itself lives
        # on the LiteLLM pod's PVC, rotator-managed.
        - name: COMMONLY_LITELLM_BASE_URL
          value: {{ $cfg.litellmBaseUrl | default $.Values.agents.cloudCodex.litellmBaseUrl | default "http://litellm:4000/v1" | quote }}
        - name: COMMONLY_LITELLM_KEY
          valueFrom:
            secretKeyRef:
              name: {{ $cfg.litellmKeySecret | default (printf "cloud-codex-%s-litellm-key" $name) }}
              key: key
              # Optional so the deployment can start without a key (useful
              # during initial helm-upgrade before the operator mints one);
              # the boot script logs a warning and codex 401s at call time.
              optional: true
        # GitHub PAT for clone/push/PR-open. cloud-codex is a dev-only
        # runtime tier (per-instance deploys, never community), so it gets
        # the same shared `commonly-github-pat` that clawdbot moltbots
        # inherit. Codex CLI picks up GITHUB_PAT / GH_TOKEN via shell env
        # when it shells out to git or gh during an agent run — no codex
        # config knob needed.
        - name: GITHUB_PAT
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: GITHUB_PAT
              optional: true
        - name: GH_TOKEN
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: GITHUB_PAT
              optional: true
        volumeMounts:
        - name: tools
          mountPath: /tools
          readOnly: true
        - name: state
          mountPath: /state
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 2Gi
      volumes:
      - name: tools
        emptyDir: {}
      - name: state
        persistentVolumeClaim:
          claimName: cloud-codex-{{ $name }}
{{- end }}
{{- end }}
