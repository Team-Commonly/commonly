{{- if .Values.litellm.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: {{ include "commonly.namespace" . }}
  labels:
    {{- include "commonly.labels" . | nindent 4 }}
    app: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "commonly.selectorLabels" . | nindent 6 }}
      app: litellm
  template:
    metadata:
      labels:
        {{- include "commonly.selectorLabels" . | nindent 8 }}
        app: litellm
    spec:
      containers:
      - name: litellm
        image: "{{ .Values.litellm.image.repository }}:{{ .Values.litellm.image.tag }}"
        imagePullPolicy: IfNotPresent
        args: ["--config", "/app/config.yaml"]
        ports:
        - name: http
          containerPort: 4000
          protocol: TCP
        env:
        - name: LITELLM_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: litellm-master-key
        # Build DATABASE_URL from parts; $(PG_PASSWORD) is substituted by K8s at runtime
        - name: PG_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: postgres-password
        - name: DATABASE_URL
          value: "postgresql://{{ .Values.backend.env.pgUser }}:$(PG_PASSWORD)@{{ .Values.backend.env.pgHost }}:{{ .Values.backend.env.pgPort }}/{{ .Values.backend.env.pgDatabase }}?sslmode=require"
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: gemini-api-key
              optional: true
        - name: OPENROUTER_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openrouter-api-key
              optional: true
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openai-api-key
              optional: true
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: anthropic-api-key
              optional: true
        # chatgpt/ provider reads auth.json from CHATGPT_TOKEN_DIR (written by init container)
        - name: CHATGPT_TOKEN_DIR
          value: /chatgpt-auth
        volumeMounts:
        - name: litellm-config
          mountPath: /app/config.yaml
          subPath: config.yaml
        - name: chatgpt-auth
          mountPath: /chatgpt-auth
        resources:
          {{- toYaml .Values.litellm.resources | nindent 10 }}
        # /health/readiness does not require auth; /health requires Bearer token
        # Startup probe gives LiteLLM up to 3m for Prisma DB migrations on first boot
        startupProbe:
          httpGet:
            path: /health/readiness
            port: 4000
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 18
        readinessProbe:
          httpGet:
            path: /health/readiness
            port: 4000
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health/readiness
            port: 4000
          periodSeconds: 30
          failureThreshold: 3
      initContainers:
      # Seed auth.json for LiteLLM's chatgpt/ provider from k8s secrets.
      # The chatgpt/ provider ignores litellm_params.api_key; it reads CHATGPT_TOKEN_DIR/auth.json.
      #
      # CRITICAL: expires_at must equal the real JWT exp claim (Unix seconds), not "now+1day".
      # LiteLLM trusts expires_at, not the JWT — if expires_at is future but the JWT is expired,
      # every call returns 401. If expires_at is 0 or past, LiteLLM triggers interactive device
      # auth at STARTUP and the pod never becomes Ready. Parsing the real exp avoids both bugs.
      # The daily refresh job (refreshCodexOAuthTokenIfNeeded) restarts this pod when it refreshes
      # the token, so the init container always picks up fresh credentials.
      - name: codex-auth-seed
        image: python:3-alpine
        command:
        - python3
        - -c
        - |
          import os, sys, base64, json, datetime

          access = os.environ.get('OPENAI_CODEX_ACCESS_TOKEN', '')
          if not access:
              with open('/chatgpt-auth/auth.json', 'w') as f:
                  json.dump({}, f)
              print('No Codex token configured, wrote empty auth.json')
              sys.exit(0)

          try:
              # Decode JWT payload (middle section, base64url-encoded) to get real exp
              payload_b64 = access.split('.')[1]
              padding = 4 - len(payload_b64) % 4
              if padding != 4:
                  payload_b64 += '=' * padding
              payload = json.loads(base64.b64decode(
                  payload_b64.replace('-', '+').replace('_', '/')
              ))
              exp = int(payload.get('exp', 0))
          except Exception as e:
              print(f'JWT parse error: {e}', file=sys.stderr)
              exp = 0

          out = {'access_token': access, 'expires_at': exp}
          refresh = os.environ.get('OPENAI_CODEX_REFRESH_TOKEN', '')
          id_tok = os.environ.get('OPENAI_CODEX_ID_TOKEN', '')
          if refresh:
              out['refresh_token'] = refresh
          if id_tok:
              out['id_token'] = id_tok

          with open('/chatgpt-auth/auth.json', 'w') as f:
              json.dump(out, f)

          now_ts = int(datetime.datetime.now(datetime.timezone.utc).timestamp())
          exp_str = datetime.datetime.fromtimestamp(exp, datetime.timezone.utc).isoformat() if exp else 'unknown'
          status = 'VALID' if exp > now_ts else 'EXPIRED — refresh job will restart pod with fresh token'
          print(f'auth.json written — expires_at={exp} ({exp_str}) [{status}]')
        env:
        - name: OPENAI_CODEX_ACCESS_TOKEN
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openai-codex-access-token
              optional: true
        - name: OPENAI_CODEX_REFRESH_TOKEN
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openai-codex-refresh-token
              optional: true
        - name: OPENAI_CODEX_ID_TOKEN
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openai-codex-id-token
              optional: true
        volumeMounts:
        - name: chatgpt-auth
          mountPath: /chatgpt-auth
      volumes:
      - name: litellm-config
        configMap:
          name: litellm-config
      - name: chatgpt-auth
        emptyDir: {}
      {{- with .Values.litellm.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.litellm.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
