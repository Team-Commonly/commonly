{{- if .Values.litellm.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: {{ include "commonly.namespace" . }}
  labels:
    {{- include "commonly.labels" . | nindent 4 }}
    app: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "commonly.selectorLabels" . | nindent 6 }}
      app: litellm
  template:
    metadata:
      labels:
        {{- include "commonly.selectorLabels" . | nindent 8 }}
        app: litellm
    spec:
      containers:
      - name: litellm
        image: "{{ .Values.litellm.image.repository }}:{{ .Values.litellm.image.tag }}"
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-c"]
        args:
          - |
            python3 -c "
            f='/usr/lib/python3.13/site-packages/litellm/llms/openai/responses/transformation.py'
            s=open(f).read()
            old='        # Input is expected to be either str or List, no single BaseModel expected\n        return input'
            new='        # Input is expected to be either str or List, no single BaseModel expected\n        if isinstance(input, str):\n            return [{\"role\": \"user\", \"content\": input}]\n        return input'
            if old in s:
                open(f,'w').write(s.replace(old,new))
                print('LiteLLM patch applied: string input -> list for chatgpt responses API')
            else:
                print('LiteLLM patch: pattern not found, may already be fixed upstream')
            "
            # Write the custom callback that signals the rotator on 429s.
            # LiteLLM's get_instance_fn resolves callbacks via spec_from_file_location
            # relative to the config file's directory (/app/), NOT via importlib.
            # So we must place the module next to config.yaml.
            cat > /app/rate_limit_signal.py <<'PYEOF'
            """LiteLLM callback: writes a signal file when a request hits a rate limit (429).
            The codex-auth-rotator sidecar polls this file and rotates accounts immediately.
            Must extend CustomLogger for LiteLLM to invoke the hooks.

            Also monkey-patches LiteLLM's chatgpt/* responses bridge to work around
            BerriAI/litellm#25429 — chatgpt.com Codex /responses currently returns
            empty `output: []` in the final completed event, but text deltas come
            through correctly. We capture the deltas during stream iteration and
            inject a synthetic message item when the final output is empty.
            Patch applies at module-load (LiteLLM imports this as a callback)."""
            import json
            import os
            import time
            import logging
            from litellm.integrations.custom_logger import CustomLogger

            # ---------- BerriAI/litellm#25429 patch ----------
            try:
                from litellm.completion_extras.litellm_responses_transformation import (
                    handler as _resp_handler,
                )
                from litellm.types.llms.openai import ResponsesAPIResponse as _ResponsesAPIResponse

                _patch_log = logging.getLogger("litellm-patches.chatgpt-empty-output")

                def _accumulate_text(event, acc):
                    et = getattr(event, "type", None)
                    delta = getattr(event, "delta", None)
                    if et == "response.output_text.delta" and isinstance(delta, str):
                        acc.append(delta)
                    elif et == "response.refusal.delta" and isinstance(delta, str):
                        acc.append(delta)

                def _maybe_inject(response_obj, accumulated):
                    if not response_obj:
                        return response_obj
                    output = getattr(response_obj, "output", None)
                    if output:
                        return response_obj
                    if not accumulated:
                        return response_obj
                    text = "".join(accumulated).strip()
                    if not text:
                        return response_obj
                    synthetic = {
                        "type": "message",
                        "role": "assistant",
                        "content": [{"type": "output_text", "text": text, "annotations": []}],
                    }
                    try:
                        if isinstance(output, list):
                            output.append(synthetic)
                        else:
                            setattr(response_obj, "output", [synthetic])
                        _patch_log.warning(
                            f"chatgpt-empty-output-patch: synthesized {len(text)} chars from deltas"
                        )
                    except Exception as exc:
                        _patch_log.error(f"chatgpt-empty-output-patch: inject failed: {exc}")
                    return response_obj

                _Handler = _resp_handler.LiteLLMResponsesTransformationHandler

                async def _patched_async(self, stream_iter):
                    accumulated = []
                    async for chunk in stream_iter:
                        _accumulate_text(chunk, accumulated)
                    completed = getattr(stream_iter, "completed_response", None)
                    response_obj = getattr(completed, "response", None) if completed else None
                    if response_obj is None:
                        raise ValueError("Stream ended without a completed response")
                    response_obj = _maybe_inject(response_obj, accumulated)
                    hidden_params = getattr(stream_iter, "_hidden_params", None)
                    response = self._coerce_response_object(response_obj, hidden_params)
                    if not isinstance(response, _ResponsesAPIResponse):
                        raise ValueError("Stream completed response is invalid")
                    return response

                def _patched_sync(self, stream_iter):
                    accumulated = []
                    for chunk in stream_iter:
                        _accumulate_text(chunk, accumulated)
                    completed = getattr(stream_iter, "completed_response", None)
                    response_obj = getattr(completed, "response", None) if completed else None
                    if response_obj is None:
                        raise ValueError("Stream ended without a completed response")
                    response_obj = _maybe_inject(response_obj, accumulated)
                    hidden_params = getattr(stream_iter, "_hidden_params", None)
                    response = self._coerce_response_object(response_obj, hidden_params)
                    if not isinstance(response, _ResponsesAPIResponse):
                        raise ValueError("Stream completed response is invalid")
                    return response

                _Handler._collect_response_from_stream_async = _patched_async
                _Handler._collect_response_from_stream = _patched_sync
                print(
                    "[litellm-patches] chatgpt-empty-output (BerriAI #25429) APPLIED",
                    flush=True,
                )
            except Exception as _patch_err:
                print(
                    f"[litellm-patches] chatgpt-empty-output FAILED to apply: {_patch_err}",
                    flush=True,
                )
            # ---------- end patch ----------

            SIGNAL_FILE = '/chatgpt-auth/rotate-now'

            def _is_rate_limit(exc_str: str) -> bool:
                s = exc_str.lower()
                return any(t in s for t in (
                    '429', 'rate_limit', 'ratelimit', 'rate limit', 'too many requests',
                    'ratelimiterror',
                ))

            def _write_signal(model: str, exc_str: str):
                try:
                    tmp = SIGNAL_FILE + '.tmp'
                    with open(tmp, 'w') as f:
                        json.dump({
                            'timestamp': time.time(),
                            'model': model,
                            'exception': exc_str[:200],
                        }, f)
                    os.replace(tmp, SIGNAL_FILE)
                    print(f'[rate-limit-signaler] SIGNALED rotate-now (model={model})', flush=True)
                except Exception as e:
                    print(f'[rate-limit-signaler] write failed: {e}', flush=True)

            class RateLimitSignaler(CustomLogger):
                def log_pre_api_call(self, model, messages, kwargs):
                    pass

                def log_success_event(self, kwargs, response_obj, start_time, end_time):
                    pass

                def log_failure_event(self, kwargs, response_obj, start_time, end_time):
                    exc = kwargs.get('exception')
                    if not exc: return
                    exc_str = str(exc)
                    if _is_rate_limit(exc_str):
                        _write_signal(kwargs.get('model', 'unknown'), exc_str)

                async def async_log_success_event(self, kwargs, response_obj, start_time, end_time):
                    pass

                async def async_log_failure_event(self, kwargs, response_obj, start_time, end_time):
                    exc = kwargs.get('exception')
                    if not exc: return
                    exc_str = str(exc)
                    if _is_rate_limit(exc_str):
                        _write_signal(kwargs.get('model', 'unknown'), exc_str)

            proxy_handler_instance = RateLimitSignaler()
            PYEOF
            echo "rate-limit-signaler callback installed at /app/rate_limit_signal.py"
            exec litellm --config /app/config.yaml
        ports:
        - name: http
          containerPort: 4000
          protocol: TCP
        env:
        - name: LITELLM_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: litellm-master-key
        - name: PG_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: postgres-password
        - name: DATABASE_URL
          value: "postgresql://{{ .Values.backend.env.pgUser }}:$(PG_PASSWORD)@{{ .Values.backend.env.pgHost }}:{{ .Values.backend.env.pgPort }}/{{ .Values.backend.env.pgDatabase }}?sslmode=require&schema=litellm"
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: gemini-api-key
              optional: true
        - name: OPENROUTER_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openrouter-api-key
              optional: true
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openai-api-key
              optional: true
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: anthropic-api-key
              optional: true
        # chatgpt/ provider reads auth.json from CHATGPT_TOKEN_DIR (written by init container).
        # Account-1 token is written to auth.json; accounts 2 & 3 use api_key in litellm_params.
        - name: CHATGPT_TOKEN_DIR
          value: /chatgpt-auth
        # Codex account tokens — account-1 goes to auth.json; accounts 2 & 3 use api_key.
        - name: OPENAI_CODEX_ACCESS_TOKEN
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openai-codex-access-token
              optional: true
        - name: OPENAI_CODEX_ACCESS_TOKEN_2
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openai-codex-access-token-2
              optional: true
        - name: OPENAI_CODEX_ACCESS_TOKEN_3
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openai-codex-access-token-3
              optional: true
        # Force prompt/response storage in spend logs regardless of runtime general_settings.
        # The config-file setting (store_prompts_in_spend_logs: true) is sometimes shadowed by
        # the in-memory general_settings dict at startup; the env var is the reliable fallback.
        - name: STORE_PROMPTS_IN_SPEND_LOGS
          value: "true"
        volumeMounts:
        - name: litellm-config
          mountPath: /app/config.yaml
          subPath: config.yaml
        - name: chatgpt-auth
          mountPath: /chatgpt-auth
        resources:
          {{- toYaml .Values.litellm.resources | nindent 10 }}
        # /health/readiness does not require auth; /health requires Bearer token
        # Startup probe gives LiteLLM up to 3m for Prisma DB migrations on first boot
        startupProbe:
          httpGet:
            path: /health/readiness
            port: 4000
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 18
        readinessProbe:
          httpGet:
            path: /health/readiness
            port: 4000
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health/readiness
            port: 4000
          periodSeconds: 30
          failureThreshold: 3
      # Sidecar that rotates which Codex account's tokens are active in auth.json.
      # LiteLLM's chatgpt/ Authenticator reads auth.json on each get_access_token() call,
      # so rotation takes effect without requiring a pod restart. Each tick, this picks
      # the NEXT account in round-robin order and writes its tokens to auth.json.
      # Rotation interval: 10 minutes (spreads load; each user has an individual quota
      # on the ChatGPT Team).
      - name: codex-auth-rotator
        image: python:3-alpine
        command:
        - python3
        - -c
        - |
          import os, json, time, base64, datetime, urllib.request, urllib.parse, urllib.error

          OAUTH_URL = 'https://auth.openai.com/oauth/token'
          ROTATION_INTERVAL_SEC = int(os.environ.get('CODEX_ROTATION_INTERVAL_SEC', '600'))  # 10 min
          STATE_FILE = '/chatgpt-auth/rotator_state.json'
          AUTH_FILE = '/chatgpt-auth/auth.json'
          SIGNAL_FILE = '/chatgpt-auth/rotate-now'
          SIGNAL_POLL_SEC = 10  # how often to check for rate-limit signal during sleep
          SIGNAL_MAX_AGE_SEC = 120  # ignore stale signals older than this

          def check_and_consume_signal():
              """Check if LiteLLM's rate-limit callback wrote a signal file. Returns True if we should rotate NOW."""
              if not os.path.exists(SIGNAL_FILE):
                  return False
              try:
                  with open(SIGNAL_FILE) as f:
                      sig = json.load(f)
                  age = time.time() - sig.get('timestamp', 0)
                  if age > SIGNAL_MAX_AGE_SEC:
                      # Stale — clean up and ignore
                      os.remove(SIGNAL_FILE)
                      return False
                  # Consume the signal
                  model = sig.get('model', '?')
                  os.remove(SIGNAL_FILE)
                  print(f'[rotator] rate-limit signal consumed — model={model}, rotating early', flush=True)
                  return True
              except Exception as e:
                  print(f'[rotator] signal read failed: {e}', flush=True)
                  return False

          def interruptible_sleep(total_seconds):
              """Sleep in small chunks so we can respond quickly to rate-limit signals."""
              slept = 0
              while slept < total_seconds:
                  if check_and_consume_signal():
                      return True  # triggered early
                  sleep_this = min(SIGNAL_POLL_SEC, total_seconds - slept)
                  time.sleep(sleep_this)
                  slept += sleep_this
              return False

          def token_exp(tok):
              if not tok: return 0
              try:
                  b = tok.split('.')[1]
                  b += '=' * (4 - len(b) % 4)
                  return int(json.loads(base64.b64decode(b.replace('-','+').replace('_','/'))).get('exp', 0))
              except Exception:
                  return 0

          def refresh_token_call(refresh_tok, client_id, label):
              if not refresh_tok or not client_id:
                  return None
              body = urllib.parse.urlencode({
                  'grant_type': 'refresh_token',
                  'refresh_token': refresh_tok,
                  'client_id': client_id,
                  'scope': 'openid profile email',
              }).encode('utf-8')
              req = urllib.request.Request(OAUTH_URL, data=body, headers={'Content-Type': 'application/x-www-form-urlencoded'})
              try:
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      p = json.loads(resp.read().decode('utf-8'))
              except Exception as e:
                  print(f'[rotator] [{label}] refresh failed: {e}', flush=True)
                  return None
              new_access = p.get('access_token', '')
              if not new_access:
                  return None
              return {
                  'access_token': new_access,
                  'refresh_token': p.get('refresh_token', refresh_tok),
                  'id_token': p.get('id_token', ''),
                  'exp': token_exp(new_access),
              }

          def load_state():
              try:
                  with open(STATE_FILE) as f:
                      return json.load(f)
              except Exception:
                  return {'last_index': -1}

          def save_state(st):
              try:
                  with open(STATE_FILE, 'w') as f:
                      json.dump(st, f)
              except Exception as e:
                  print(f'[rotator] save_state failed: {e}', flush=True)

          def get_candidates():
              specs = [
                  ('1', 'OPENAI_CODEX_ACCESS_TOKEN', 'OPENAI_CODEX_REFRESH_TOKEN', 'OPENAI_CODEX_ID_TOKEN'),
                  ('2', 'OPENAI_CODEX_ACCESS_TOKEN_2', 'OPENAI_CODEX_REFRESH_TOKEN_2', ''),
                  ('3', 'OPENAI_CODEX_ACCESS_TOKEN_3', 'OPENAI_CODEX_REFRESH_TOKEN_3', 'OPENAI_CODEX_ID_TOKEN_3'),
              ]
              out = []
              for label, a_env, r_env, i_env in specs:
                  access = os.environ.get(a_env, '')
                  refresh = os.environ.get(r_env, '')
                  id_tok = os.environ.get(i_env, '') if i_env else ''
                  if access or refresh:
                      out.append((label, access, refresh, id_tok))
              return out

          def write_auth(label, access, refresh, id_tok, exp):
              out = {'access_token': access, 'expires_at': exp}
              if refresh: out['refresh_token'] = refresh
              if id_tok: out['id_token'] = id_tok
              tmp = AUTH_FILE + '.tmp'
              with open(tmp, 'w') as f:
                  json.dump(out, f)
              os.replace(tmp, AUTH_FILE)  # atomic
              exp_str = datetime.datetime.fromtimestamp(exp, datetime.timezone.utc).isoformat() if exp else 'unknown'
              print(f'[rotator] active account-{label} (expires {exp_str})', flush=True)

          print(f'[rotator] starting — rotation every {ROTATION_INTERVAL_SEC}s (or on 429 signal)', flush=True)
          client_id = os.environ.get('OPENAI_CODEX_CLIENT_ID', '')
          # Clean any stale signal file from a previous pod instance
          if os.path.exists(SIGNAL_FILE):
              try: os.remove(SIGNAL_FILE)
              except Exception: pass
          # Give init container's selection a moment to settle
          interruptible_sleep(ROTATION_INTERVAL_SEC)

          while True:
              now_ts = int(datetime.datetime.now(datetime.timezone.utc).timestamp())
              candidates = get_candidates()
              if not candidates:
                  print('[rotator] no candidates configured, sleeping', flush=True)
                  interruptible_sleep(ROTATION_INTERVAL_SEC)
                  continue

              state = load_state()
              start_idx = (state.get('last_index', -1) + 1) % len(candidates)

              chosen = None
              for offset in range(len(candidates)):
                  idx = (start_idx + offset) % len(candidates)
                  label, access, refresh, id_tok = candidates[idx]
                  exp = token_exp(access) if access else 0
                  if access and exp > now_ts + 60:
                      chosen = (idx, label, access, refresh, id_tok, exp)
                      break
                  if refresh and client_id:
                      print(f'[rotator] account-{label} expired, refreshing…', flush=True)
                      fresh = refresh_token_call(refresh, client_id, label)
                      if fresh:
                          chosen = (idx, label, fresh['access_token'], fresh['refresh_token'], fresh['id_token'] or id_tok, fresh['exp'])
                          break

              if not chosen:
                  print('[rotator] no usable account this tick, keeping existing auth.json', flush=True)
              else:
                  idx, label, access, refresh, id_tok, exp = chosen
                  write_auth(label, access, refresh, id_tok, exp)
                  save_state({'last_index': idx, 'timestamp': now_ts})

              # Sleep until next scheduled tick OR until a rate-limit signal fires
              interruptible_sleep(ROTATION_INTERVAL_SEC)
        env:
        - name: CODEX_ROTATION_INTERVAL_SEC
          value: "600"
        - name: OPENAI_CODEX_ACCESS_TOKEN
          valueFrom:
            secretKeyRef: {name: api-keys, key: openai-codex-access-token, optional: true}
        - name: OPENAI_CODEX_REFRESH_TOKEN
          valueFrom:
            secretKeyRef: {name: api-keys, key: openai-codex-refresh-token, optional: true}
        - name: OPENAI_CODEX_ID_TOKEN
          valueFrom:
            secretKeyRef: {name: api-keys, key: openai-codex-id-token, optional: true}
        - name: OPENAI_CODEX_ACCESS_TOKEN_2
          valueFrom:
            secretKeyRef: {name: api-keys, key: openai-codex-access-token-2, optional: true}
        - name: OPENAI_CODEX_REFRESH_TOKEN_2
          valueFrom:
            secretKeyRef: {name: api-keys, key: openai-codex-refresh-token-2, optional: true}
        - name: OPENAI_CODEX_ACCESS_TOKEN_3
          valueFrom:
            secretKeyRef: {name: api-keys, key: openai-codex-access-token-3, optional: true}
        - name: OPENAI_CODEX_REFRESH_TOKEN_3
          valueFrom:
            secretKeyRef: {name: api-keys, key: openai-codex-refresh-token-3, optional: true}
        - name: OPENAI_CODEX_ID_TOKEN_3
          valueFrom:
            secretKeyRef: {name: api-keys, key: openai-codex-id-token-3, optional: true}
        - name: OPENAI_CODEX_CLIENT_ID
          valueFrom:
            secretKeyRef: {name: api-keys, key: openai-codex-client-id, optional: true}
        volumeMounts:
        - name: chatgpt-auth
          mountPath: /chatgpt-auth
      initContainers:
      # Write the best available (non-expired) Codex token to auth.json for LiteLLM's chatgpt/ provider.
      # Account-1 entries in litellm-config have no api_key — the chatgpt/ provider reads
      # CHATGPT_TOKEN_DIR/auth.json at startup. Accounts 2 & 3 use api_key in litellm_params directly.
      # Priority: account-3 first (quota available), then account-1 as fallback, else empty (disables chatgpt/ provider).
      # NOTE: chatgpt/ provider ignores api_key in litellm_params — all accounts share this single auth.json.
      # There is no per-deployment rotation; whichever account is written here is used for ALL chatgpt/ calls.
      - name: codex-auth-seed
        image: python:3-alpine
        command:
        - python3
        - -c
        - |
          import os, sys, base64, json, datetime, urllib.request, urllib.parse, urllib.error

          OAUTH_URL = 'https://auth.openai.com/oauth/token'

          def token_exp(tok):
              if not tok:
                  return 0
              try:
                  b = tok.split('.')[1]
                  b += '=' * (4 - len(b) % 4)
                  return int(json.loads(base64.b64decode(b.replace('-', '+').replace('_', '/'))).get('exp', 0))
              except Exception:
                  return 0

          def refresh_token(refresh_tok, client_id, label):
              """Exchange refresh_token for fresh access_token. Returns (access, refresh, id_token, exp) or None."""
              if not refresh_tok or not client_id:
                  return None
              body = urllib.parse.urlencode({
                  'grant_type': 'refresh_token',
                  'refresh_token': refresh_tok,
                  'client_id': client_id,
                  'scope': 'openid profile email',
              }).encode('utf-8')
              req = urllib.request.Request(
                  OAUTH_URL,
                  data=body,
                  headers={'Content-Type': 'application/x-www-form-urlencoded'},
              )
              try:
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      payload = json.loads(resp.read().decode('utf-8'))
              except urllib.error.HTTPError as e:
                  err_body = e.read().decode('utf-8', errors='replace')[:200]
                  print(f'  [{label}] refresh failed: HTTP {e.code} {err_body}')
                  return None
              except Exception as e:
                  print(f'  [{label}] refresh failed: {e}')
                  return None
              new_access = payload.get('access_token', '')
              new_id = payload.get('id_token', '')
              new_refresh = payload.get('refresh_token', refresh_tok)
              exp = token_exp(new_access) or (int(datetime.datetime.now(datetime.timezone.utc).timestamp()) + int(payload.get('expires_in', 0) or 0))
              if not new_access:
                  print(f'  [{label}] refresh returned no access_token')
                  return None
              return (new_access, new_refresh, new_id, exp)

          now_ts = int(datetime.datetime.now(datetime.timezone.utc).timestamp())
          client_id = os.environ.get('OPENAI_CODEX_CLIENT_ID', '')

          # All three accounts in preferred order. Account-1 is primary; 3 and 2 are
          # fallbacks only used when account-1's tokens are expired AND unrefreshable.
          candidates = [
              ('', os.environ.get('OPENAI_CODEX_ACCESS_TOKEN', ''), os.environ.get('OPENAI_CODEX_REFRESH_TOKEN', ''), os.environ.get('OPENAI_CODEX_ID_TOKEN', '')),
              ('3', os.environ.get('OPENAI_CODEX_ACCESS_TOKEN_3', ''), os.environ.get('OPENAI_CODEX_REFRESH_TOKEN_3', ''), os.environ.get('OPENAI_CODEX_ID_TOKEN_3', '')),
              ('2', os.environ.get('OPENAI_CODEX_ACCESS_TOKEN_2', ''), os.environ.get('OPENAI_CODEX_REFRESH_TOKEN_2', ''), ''),
          ]

          chosen = None
          for (suffix, access, refresh, id_tok) in candidates:
              label = f'account-{"1" if suffix == "" else suffix}'
              if not access and not refresh:
                  print(f'{label}: no tokens configured, skipping')
                  continue
              exp = token_exp(access) if access else 0
              # Prefer valid access token (with 60s buffer to avoid edge-race expiry)
              if access and exp > now_ts + 60:
                  chosen = (suffix, access, refresh, id_tok, exp)
                  print(f'{label}: access_token valid (expires {exp}, +{exp - now_ts}s)')
                  break
              # Otherwise try refresh
              if refresh and client_id:
                  print(f'{label}: access_token expired/missing, refreshing…')
                  refreshed = refresh_token(refresh, client_id, label)
                  if refreshed:
                      new_access, new_refresh, new_id, new_exp = refreshed
                      print(f'{label}: refreshed successfully (expires {new_exp}, +{new_exp - now_ts}s)')
                      chosen = (suffix, new_access, new_refresh, new_id or id_tok, new_exp)
                      break
              else:
                  print(f'{label}: no refresh_token or client_id, skipping')

          if not chosen:
              with open('/chatgpt-auth/auth.json', 'w') as f:
                  json.dump({}, f)
              print('No valid Codex token found after checking all accounts — wrote empty auth.json')
              sys.exit(0)

          suffix, access, refresh, id_tok, exp = chosen
          out = {'access_token': access, 'expires_at': exp}
          if refresh:
              out['refresh_token'] = refresh
          if id_tok:
              out['id_token'] = id_tok

          with open('/chatgpt-auth/auth.json', 'w') as f:
              json.dump(out, f)

          exp_str = datetime.datetime.fromtimestamp(exp, datetime.timezone.utc).isoformat()
          print(f'auth.json written — account-{"1" if suffix == "" else suffix} expires_at={exp} ({exp_str})')
        env:
        - name: OPENAI_CODEX_ACCESS_TOKEN
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openai-codex-access-token
              optional: true
        - name: OPENAI_CODEX_REFRESH_TOKEN
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openai-codex-refresh-token
              optional: true
        - name: OPENAI_CODEX_ID_TOKEN
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openai-codex-id-token
              optional: true
        - name: OPENAI_CODEX_ACCESS_TOKEN_3
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openai-codex-access-token-3
              optional: true
        - name: OPENAI_CODEX_REFRESH_TOKEN_3
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openai-codex-refresh-token-3
              optional: true
        - name: OPENAI_CODEX_ID_TOKEN_3
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openai-codex-id-token-3
              optional: true
        # Account-2: used when accounts 1 and 3 are exhausted/expired
        - name: OPENAI_CODEX_ACCESS_TOKEN_2
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openai-codex-access-token-2
              optional: true
        - name: OPENAI_CODEX_REFRESH_TOKEN_2
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openai-codex-refresh-token-2
              optional: true
        # Client ID for OAuth refresh flow
        - name: OPENAI_CODEX_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openai-codex-client-id
              optional: true
        volumeMounts:
        - name: chatgpt-auth
          mountPath: /chatgpt-auth
      volumes:
      - name: litellm-config
        configMap:
          name: litellm-config
      - name: chatgpt-auth
        emptyDir: {}
      {{- with .Values.litellm.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.litellm.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
