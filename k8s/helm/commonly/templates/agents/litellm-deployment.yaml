{{- if .Values.litellm.enabled }}
{{- if .Values.litellm.chatgptAuth.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: litellm-chatgpt-auth
  namespace: {{ include "commonly.namespace" . }}
  labels:
    {{- include "commonly.labels" . | nindent 4 }}
    app: litellm
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.litellm.chatgptAuth.persistence.size | default "1Gi" }}
  {{- with .Values.litellm.chatgptAuth.persistence.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: {{ include "commonly.namespace" . }}
  labels:
    {{- include "commonly.labels" . | nindent 4 }}
    app: litellm
spec:
  replicas: 1
  {{- if .Values.litellm.chatgptAuth.persistence.enabled }}
  # PVC is RWO single-writer; Recreate ensures the old pod releases before
  # the new one tries to attach. Without this, helm-upgrade can hang for
  # 5+ minutes on the new pod waiting for the volume.
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "commonly.selectorLabels" . | nindent 6 }}
      app: litellm
  template:
    metadata:
      labels:
        {{- include "commonly.selectorLabels" . | nindent 8 }}
        app: litellm
    spec:
      containers:
      - name: litellm
        image: "{{ .Values.litellm.image.repository }}:{{ .Values.litellm.image.tag }}"
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-c"]
        args:
          - |
            # Patch litellm's OpenAI responses-input transform to wrap a bare string
            # `input` into a [{"role":"user","content":...}] list. OpenAI's Codex /responses
            # backend rejects a raw string ("Input must be a list"); the chatgpt provider
            # inherits this openai transform. Path resolved via litellm.__file__ (the server
            # imports from /app/litellm — an earlier hardcoded /usr/lib path made this a
            # silent no-op). Idempotent; no-ops cleanly if the upstream signature changes.
            python3 -c "
            import litellm, os
            f=os.path.join(os.path.dirname(litellm.__file__),'llms','openai','responses','transformation.py')
            s=open(f).read()
            old='        # Input is expected to be either str or List, no single BaseModel expected\n        return input'
            new='        # Input is expected to be either str or List, no single BaseModel expected\n        if isinstance(input, str):  # commonly: wrap bare str for chatgpt /responses\n            return [{\"role\": \"user\", \"content\": input}]\n        return input'
            if 'commonly: wrap bare str' in s:
                print('LiteLLM responses-input patch: already applied')
            elif old in s:
                open(f,'w').write(s.replace(old,new,1))
                print('LiteLLM responses-input patch applied: bare-str input -> list for chatgpt /responses')
            else:
                print('LiteLLM responses-input patch: pattern not found (version changed?) - review needed')
            "
            # Disable LiteLLM_SpendLogToolIndex population. LiteLLM (1.88.0) inserts one
            # row per tool-call into this table but provides NO retention, cleanup, or
            # disable flag for it, so it grows unbounded (hit 6.4M rows / ~4 GB on dev,
            # 2026-06). SpendLogs itself is still pruned by LiteLLM's own
            # maximum_spend_logs_retention_period; only this un-prunable sibling is disabled
            # (we don't use the tool-usage dashboard). Path resolved via litellm.__file__
            # (the server imports from /app/litellm, not site-packages). No-ops cleanly if
            # the upstream signature changes.
            python3 -c "
            import litellm, os
            f=os.path.join(os.path.dirname(litellm.__file__),'proxy','db','spend_log_tool_index.py')
            s=open(f).read()
            old='async def process_spend_logs_tool_usage(\n    prisma_client: PrismaClient,\n    logs_to_process: List[Dict[str, Any]],\n) -> None:'
            new=old+'\n    return  # commonly: disabled (LiteLLM never prunes SpendLogToolIndex; unbounded)'
            if 'commonly: disabled' in s:
                print('LiteLLM tool-index patch: already applied')
            elif old in s:
                open(f,'w').write(s.replace(old,new,1))
                print('LiteLLM tool-index patch applied: SpendLogToolIndex population disabled')
            else:
                print('LiteLLM tool-index patch: pattern not found (version changed?) - review needed')
            "
            # Write the custom callback that signals the rotator on 429s.
            # LiteLLM's get_instance_fn resolves callbacks via spec_from_file_location
            # relative to the config file's directory (/app/), NOT via importlib.
            # So we must place the module next to config.yaml.
            cat > /app/rate_limit_signal.py <<'PYEOF'
            """LiteLLM callback: writes a signal file when a request hits a rate limit (429).
            The codex-auth-rotator sidecar polls this file and rotates accounts immediately.
            Must extend CustomLogger for LiteLLM to invoke the hooks."""
            import json
            import os
            import time
            from litellm.integrations.custom_logger import CustomLogger

            SIGNAL_FILE = '/chatgpt-auth/rotate-now'

            def _is_rate_limit(exc_str: str) -> bool:
                s = exc_str.lower()
                return any(t in s for t in (
                    '429', 'rate_limit', 'ratelimit', 'rate limit', 'too many requests',
                    'ratelimiterror',
                ))

            def _is_codex_model(model: str) -> bool:
                # Only codex rotates the ChatGPT account pool. Nemotron (the codex
                # fallback) and every other provider also throw 429s under load, but
                # rotating codex accounts can't help them — it only thrashes the
                # active-account pointer and burns refresh_tokens. Codex surfaces as
                # 'openai-codex/*' (public alias) or 'chatgpt/*' (litellm_params.model).
                m = (model or '').lower()
                return 'codex' in m or 'chatgpt' in m

            def _write_signal(model: str, exc_str: str):
                try:
                    tmp = SIGNAL_FILE + '.tmp'
                    with open(tmp, 'w') as f:
                        json.dump({
                            'timestamp': time.time(),
                            'model': model,
                            'exception': exc_str[:200],
                        }, f)
                    os.replace(tmp, SIGNAL_FILE)
                    print(f'[rate-limit-signaler] SIGNALED rotate-now (model={model})', flush=True)
                except Exception as e:
                    print(f'[rate-limit-signaler] write failed: {e}', flush=True)

            class RateLimitSignaler(CustomLogger):
                def log_pre_api_call(self, model, messages, kwargs):
                    pass

                def log_success_event(self, kwargs, response_obj, start_time, end_time):
                    pass

                def log_failure_event(self, kwargs, response_obj, start_time, end_time):
                    exc = kwargs.get('exception')
                    if not exc: return
                    exc_str = str(exc)
                    model = kwargs.get('model', 'unknown')
                    if _is_rate_limit(exc_str) and _is_codex_model(model):
                        _write_signal(model, exc_str)

                async def async_log_success_event(self, kwargs, response_obj, start_time, end_time):
                    pass

                async def async_log_failure_event(self, kwargs, response_obj, start_time, end_time):
                    exc = kwargs.get('exception')
                    if not exc: return
                    exc_str = str(exc)
                    model = kwargs.get('model', 'unknown')
                    if _is_rate_limit(exc_str) and _is_codex_model(model):
                        _write_signal(model, exc_str)

            proxy_handler_instance = RateLimitSignaler()
            PYEOF
            echo "rate-limit-signaler callback installed at /app/rate_limit_signal.py"
            # Patch litellm's ChatGPT authenticator to FAIL FAST in headless mode instead
            # of dropping into an interactive device-login. When auth.json is expired AND
            # the refresh token is dead, the stock get_access_token() calls
            # _login_device_code(), which prints a device code and BLOCKS up to 15 min
            # polling for an operator to approve. There is no operator in this pod, so it
            # hangs past the startup probe -> SIGKILL -> crash loop, and each restart
            # re-requests a device code, hammering the endpoint into a 429. This turned a
            # routine ~2-week token expiry into a ~10-day litellm OUTAGE (2026-06-24): the
            # proxy never bound :4000, so the router's codex->nemotron fallback never got a
            # turn. With CHATGPT_DISABLE_DEVICE_LOGIN set, get_access_token() raises
            # GetAccessTokenError instead -> litellm boots, marks codex unhealthy, and the
            # fallback serves requests until an operator re-auths OUT OF BAND via the
            # codex-cli sidecar (a separate codex process, unaffected by this patch).
            # Idempotent; no-ops cleanly if the upstream signature changes.
            python3 -c "
            import litellm, os
            f=os.path.join(os.path.dirname(litellm.__file__),'llms','chatgpt','authenticator.py')
            s=open(f).read()
            old='        cooldown_remaining = self._get_device_code_cooldown_remaining(auth_data)'
            new='        if os.getenv(\"CHATGPT_DISABLE_DEVICE_LOGIN\"):  # commonly: fail-fast headless\n            raise GetAccessTokenError(\"ChatGPT auth invalid/expired and interactive device-login is disabled (CHATGPT_DISABLE_DEVICE_LOGIN); re-auth out-of-band via the codex-cli sidecar. Requests fall back per router fallbacks.\")\n' + old
            if 'commonly: fail-fast headless' in s:
                print('LiteLLM chatgpt fail-fast patch: already applied')
            elif old in s:
                open(f,'w').write(s.replace(old,new,1))
                print('LiteLLM chatgpt fail-fast patch applied: headless device-login -> GetAccessTokenError')
            else:
                print('LiteLLM chatgpt fail-fast patch: pattern not found (version changed?) - review needed')
            "
            exec litellm --config /app/config.yaml
        ports:
        - name: http
          containerPort: 4000
          protocol: TCP
        env:
        - name: LITELLM_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: litellm-master-key
        - name: PG_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: postgres-password
        - name: DATABASE_URL
          value: "postgresql://{{ .Values.backend.env.pgUser }}:$(PG_PASSWORD)@{{ .Values.backend.env.pgHost }}:{{ .Values.backend.env.pgPort }}/{{ .Values.backend.env.pgDatabase }}?sslmode=require&schema=litellm"
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: gemini-api-key
              optional: true
        - name: OPENROUTER_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openrouter-api-key
              optional: true
        - name: OPENROUTER_API_KEY_2
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openrouter-api-key-2
              optional: true
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openai-api-key
              optional: true
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: anthropic-api-key
              optional: true
        # chatgpt/ provider reads auth.json from CHATGPT_TOKEN_DIR (written by the
        # codex-auth-rotator sidecar; source files seeded by operator via the codex-cli
        # sidecar). See ADR-014.
        - name: CHATGPT_TOKEN_DIR
          value: /chatgpt-auth
        # Fail fast instead of interactive device-login when codex auth is dead. The
        # chatgpt authenticator otherwise blocks startup on a 15-min device-code poll
        # (no operator in-pod) -> crash loop -> 429 endpoint lockout. With this set, dead
        # auth raises GetAccessTokenError and the router falls back to nemotron; an
        # operator re-auths out-of-band via the codex-cli sidecar. See the startup patch
        # above + ADR-014.
        - name: CHATGPT_DISABLE_DEVICE_LOGIN
          value: "1"
        # Force prompt/response storage in spend logs regardless of runtime general_settings.
        # The config-file setting (store_prompts_in_spend_logs: true) is sometimes shadowed by
        # the in-memory general_settings dict at startup; the env var is the reliable fallback.
        - name: STORE_PROMPTS_IN_SPEND_LOGS
          value: "true"
        volumeMounts:
        - name: litellm-config
          mountPath: /app/config.yaml
          subPath: config.yaml
        - name: chatgpt-auth
          mountPath: /chatgpt-auth
        resources:
          {{- toYaml .Values.litellm.resources | nindent 10 }}
        # /health/readiness does not require auth; /health requires Bearer token
        # Startup probe gives LiteLLM up to 3m for Prisma DB migrations on first boot
        startupProbe:
          httpGet:
            path: /health/readiness
            port: 4000
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 18
        readinessProbe:
          httpGet:
            path: /health/readiness
            port: 4000
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health/readiness
            port: 4000
          periodSeconds: 30
          failureThreshold: 3
      # Sidecar that rotates which Codex account's tokens are active in auth.json.
      # LiteLLM's chatgpt/ Authenticator reads auth.json on each get_access_token() call,
      # so rotation takes effect without requiring a pod restart. Each tick, this picks
      # the NEXT account in round-robin order and writes its tokens to auth.json.
      # Rotation interval: 10 minutes (spreads load; each user has an individual quota
      # on the ChatGPT Team).
      #
      # Disable when CODEX_BYPASS_LITELLM=true — the rotator burns refresh_tokens on
      # calls that no longer happen (bypass mode routes Codex direct to chatgpt.com via
      # OpenClaw's native handler, LiteLLM's chatgpt/ bridge is unused). Keeping the
      # rotator on would invalidate the OAuth tokens we seed into each agent's
      # auth-profiles.json via injectCodexTokenToAgentAuthProfiles.
      {{- if .Values.litellm.codexAuthRotator.enabled }}
      - name: codex-auth-rotator
        image: python:3-alpine
        command:
        - python3
        - -c
        - |
          import os, json, time, base64, datetime, urllib.request, urllib.parse, urllib.error

          OAUTH_URL = 'https://auth.openai.com/oauth/token'
          ROTATION_INTERVAL_SEC = int(os.environ.get('CODEX_ROTATION_INTERVAL_SEC', '600'))  # 10 min
          STATE_FILE = '/chatgpt-auth/rotator_state.json'
          AUTH_FILE = '/chatgpt-auth/auth.json'
          SIGNAL_FILE = '/chatgpt-auth/rotate-now'
          SIGNAL_POLL_SEC = 10  # how often to check for rate-limit signal during sleep
          SIGNAL_MAX_AGE_SEC = 120  # ignore stale signals older than this

          def check_and_consume_signal():
              """Check if LiteLLM's rate-limit callback wrote a signal file. Returns True if we should rotate NOW."""
              if not os.path.exists(SIGNAL_FILE):
                  return False
              try:
                  with open(SIGNAL_FILE) as f:
                      sig = json.load(f)
                  age = time.time() - sig.get('timestamp', 0)
                  if age > SIGNAL_MAX_AGE_SEC:
                      # Stale — clean up and ignore
                      os.remove(SIGNAL_FILE)
                      return False
                  # Consume the signal
                  model = sig.get('model', '?')
                  os.remove(SIGNAL_FILE)
                  print(f'[rotator] rate-limit signal consumed — model={model}, rotating early', flush=True)
                  return True
              except Exception as e:
                  print(f'[rotator] signal read failed: {e}', flush=True)
                  return False

          def interruptible_sleep(total_seconds):
              """Sleep in small chunks so we can respond quickly to rate-limit signals."""
              slept = 0
              while slept < total_seconds:
                  if check_and_consume_signal():
                      return True  # triggered early
                  sleep_this = min(SIGNAL_POLL_SEC, total_seconds - slept)
                  time.sleep(sleep_this)
                  slept += sleep_this
              return False

          def token_exp(tok):
              if not tok: return 0
              try:
                  b = tok.split('.')[1]
                  b += '=' * (4 - len(b) % 4)
                  return int(json.loads(base64.b64decode(b.replace('-','+').replace('_','/'))).get('exp', 0))
              except Exception:
                  return 0

          def refresh_token_call(refresh_tok, client_id, label):
              if not refresh_tok or not client_id:
                  return None
              body = urllib.parse.urlencode({
                  'grant_type': 'refresh_token',
                  'refresh_token': refresh_tok,
                  'client_id': client_id,
                  'scope': 'openid profile email',
              }).encode('utf-8')
              req = urllib.request.Request(OAUTH_URL, data=body, headers={'Content-Type': 'application/x-www-form-urlencoded'})
              try:
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      p = json.loads(resp.read().decode('utf-8'))
              except Exception as e:
                  print(f'[rotator] [{label}] refresh failed: {e}', flush=True)
                  return None
              new_access = p.get('access_token', '')
              if not new_access:
                  return None
              return {
                  'access_token': new_access,
                  'refresh_token': p.get('refresh_token', refresh_tok),
                  'id_token': p.get('id_token', ''),
                  'exp': token_exp(new_access),
              }

          def load_state():
              try:
                  with open(STATE_FILE) as f:
                      return json.load(f)
              except Exception:
                  return {'last_index': -1}

          def save_state(st):
              try:
                  with open(STATE_FILE, 'w') as f:
                      json.dump(st, f)
              except Exception as e:
                  print(f'[rotator] save_state failed: {e}', flush=True)

          def _read_pod_auth_file(path):
              """Read a codex auth.json from disk. Returns (access, refresh, id_token) or None.

              Handles two shapes:
                - codex CLI 0.125+ (nested): {"tokens": {"access_token": "...", ...}, ...}
                - rotator-written (flat):    {"access_token": "...", "refresh_token": "...", ...}
              """
              try:
                  with open(path) as f:
                      d = json.load(f)
                  tokens = d.get('tokens') if isinstance(d.get('tokens'), dict) else d
                  access = tokens.get('access_token', '') or d.get('access_token', '')
                  refresh = tokens.get('refresh_token', '') or d.get('refresh_token', '')
                  id_tok = tokens.get('id_token', '') or d.get('id_token', '')
                  if access or refresh:
                      return access, refresh, id_tok
              except Exception:
                  pass
              return None

          def get_candidates():
              """Build the rotation candidate list.

              Pod-side device-auth'd files at /chatgpt-auth/auth-{1,2,3}.json.
              Operator created these via `kubectl exec` into the codex-cli sidecar +
              `codex login --device-auth`. Tokens are cluster-IP-bound, so ChatGPT
              doesn't invalidate them on cluster usage. See ADR-014.
              """
              pod_files = [
                  ('1', '/chatgpt-auth/auth-1.json'),
                  ('2', '/chatgpt-auth/auth-2.json'),
                  ('3', '/chatgpt-auth/auth-3.json'),
              ]
              out = []
              for label, path in pod_files:
                  rec = _read_pod_auth_file(path)
                  if rec:
                      access, refresh, id_tok = rec
                      out.append((label, access, refresh, id_tok))
              return out

          def write_auth(label, access, refresh, id_tok, exp):
              out = {'access_token': access, 'expires_at': exp}
              if refresh: out['refresh_token'] = refresh
              if id_tok: out['id_token'] = id_tok
              tmp = AUTH_FILE + '.tmp'
              with open(tmp, 'w') as f:
                  json.dump(out, f)
              os.replace(tmp, AUTH_FILE)  # atomic
              exp_str = datetime.datetime.fromtimestamp(exp, datetime.timezone.utc).isoformat() if exp else 'unknown'
              print(f'[rotator] active account-{label} (expires {exp_str})', flush=True)

          print(f'[rotator] starting — rotation every {ROTATION_INTERVAL_SEC}s (or on 429 signal)', flush=True)
          client_id = os.environ.get('OPENAI_CODEX_CLIENT_ID', '')
          # Clean any stale signal file from a previous pod instance
          if os.path.exists(SIGNAL_FILE):
              try: os.remove(SIGNAL_FILE)
              except Exception: pass
          # Give init container's selection a moment to settle
          interruptible_sleep(ROTATION_INTERVAL_SEC)

          while True:
              now_ts = int(datetime.datetime.now(datetime.timezone.utc).timestamp())
              candidates = get_candidates()
              if not candidates:
                  print('[rotator] no candidates configured, sleeping', flush=True)
                  interruptible_sleep(ROTATION_INTERVAL_SEC)
                  continue

              state = load_state()
              start_idx = (state.get('last_index', -1) + 1) % len(candidates)

              chosen = None
              for offset in range(len(candidates)):
                  idx = (start_idx + offset) % len(candidates)
                  label, access, refresh, id_tok = candidates[idx]
                  exp = token_exp(access) if access else 0
                  if access and exp > now_ts + 60:
                      chosen = (idx, label, access, refresh, id_tok, exp)
                      break
                  if refresh and client_id:
                      print(f'[rotator] account-{label} expired, refreshing…', flush=True)
                      fresh = refresh_token_call(refresh, client_id, label)
                      if fresh:
                          chosen = (idx, label, fresh['access_token'], fresh['refresh_token'], fresh['id_token'] or id_tok, fresh['exp'])
                          break

              if not chosen:
                  print('[rotator] no usable account this tick, keeping existing auth.json', flush=True)
              else:
                  idx, label, access, refresh, id_tok, exp = chosen
                  write_auth(label, access, refresh, id_tok, exp)
                  save_state({'last_index': idx, 'timestamp': now_ts})

              # Sleep until next scheduled tick OR until a rate-limit signal fires
              interruptible_sleep(ROTATION_INTERVAL_SEC)
        env:
        - name: CODEX_ROTATION_INTERVAL_SEC
          # 30 min (was 10 min). ChatGPT's anti-abuse detection invalidates
          # sessions that swap in/out of the same account too frequently —
          # observed in dev when 3 accounts rotating every 10 min would all
          # be `token_invalidated` server-side within hours despite JWTs
          # claiming a future exp. Longer interval = lower detection signal.
          # Can be overridden per-deploy via Helm if you have one dedicated
          # cluster-only account and don't need rotation at all.
          value: "1800"
        - name: OPENAI_CODEX_CLIENT_ID
          valueFrom:
            secretKeyRef: {name: api-keys, key: openai-codex-client-id, optional: true}
        volumeMounts:
        - name: chatgpt-auth
          mountPath: /chatgpt-auth
      {{- end }}
      # codex-cli sidecar: provides the codex binary inside the LiteLLM pod
      # so an operator can run `codex login --device-auth` from within the
      # cluster. The resulting auth.json lands on the shared chatgpt-auth
      # PVC (as /chatgpt-auth/auth-N.json), and the codex-auth-rotator
      # above prefers those pod-side files over the env-var-fed tokens.
      #
      # ChatGPT binds OAuth sessions to the IP/device that completed
      # device-auth. Doing device-auth on a laptop and uploading tokens
      # to the cluster invalidates the session on first cluster use.
      # Doing device-auth from inside this pod produces a cluster-IP-
      # bound session that survives. See PR #362 / cloud-codex-deployment
      # for the per-agent precedent.
      #
      # Operator flow (one-time per account, after pod is up):
      #   kubectl exec -n {{ include "commonly.namespace" . }} -it deploy/litellm -c codex-cli -- /scripts/auth-login.sh 1
      # Sign in to ChatGPT in browser with account #N. Upon success the
      # script copies ~/.codex/auth.json to /chatgpt-auth/auth-1.json.
      # Repeat for accounts 2 and 3.
      - name: codex-cli
        image: node:22-bookworm-slim
        command:
        - /bin/sh
        - -c
        - |
          # Install codex CLI + ca-certs on first boot, then idle so the
          # operator can exec into us. The sleep loop is intentional —
          # there's no continuous workload here; this sidecar exists
          # purely to provide `codex` inside the same pod that holds the
          # chatgpt-auth PVC.
          if [ ! -x /usr/local/bin/codex ]; then
            apt-get update >/dev/null 2>&1 || true
            DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends ca-certificates >/dev/null 2>&1 || true
            update-ca-certificates >/dev/null 2>&1 || true
            npm install --global --no-audit --no-fund "@openai/codex@{{ .Values.litellm.codexCli.version | default "0.125.0" }}" >/dev/null 2>&1 || true
          fi
          mkdir -p /scripts
          cat > /scripts/auth-login.sh <<'SCRIPT'
          #!/bin/sh
          # auth-login.sh <account-number>
          # Runs codex login --device-auth interactively. Operator follows the URL+code
          # printed to stdout, completes in browser, and on success the resulting
          # auth.json is copied to /chatgpt-auth/auth-N.json for the rotator to pick up.
          set -e
          N="${1:-}"
          if [ -z "$N" ]; then echo "usage: $0 <account-number>"; exit 1; fi
          HOMEDIR="/tmp/codex-login-$N"
          rm -rf "$HOMEDIR"
          mkdir -p "$HOMEDIR/.codex"
          HOME="$HOMEDIR" codex login --device-auth
          if [ ! -s "$HOMEDIR/.codex/auth.json" ]; then
            echo "auth.json was not written — login did not complete"
            exit 1
          fi
          cp "$HOMEDIR/.codex/auth.json" "/chatgpt-auth/auth-$N.json"
          chmod 600 "/chatgpt-auth/auth-$N.json"
          echo "wrote /chatgpt-auth/auth-$N.json — rotator will pick it up on next tick"
          SCRIPT
          chmod +x /scripts/auth-login.sh
          echo "[codex-cli] ready. Run device-auth via:"
          echo "[codex-cli]   kubectl exec -it <litellm-pod> -c codex-cli -- /scripts/auth-login.sh <1|2|3>"
          while true; do sleep 3600; done
        volumeMounts:
        - name: chatgpt-auth
          mountPath: /chatgpt-auth
        resources:
          requests:
            cpu: 20m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
      initContainers:
      # Seed /chatgpt-auth/auth.json from a pod-side device-auth'd file before LiteLLM
      # starts, so the chatgpt/ provider has a token to read on first boot. This avoids
      # a startup race with codex-auth-rotator (which runs as a sidecar and only writes
      # auth.json on its first scheduled tick). If no pod-side auth-N.json exists yet
      # (fresh cluster — operator hasn't run auth-login.sh), writes empty auth.json
      # and the chatgpt/ provider stays disabled until the operator seeds an account.
      #
      # All OAuth refresh + multi-account rotation logic lives in the rotator sidecar.
      # See ADR-014.
      - name: codex-auth-seed
        image: python:3-alpine
        command:
        - python3
        - -c
        - |
          import json, os, sys, base64

          def token_exp(tok):
              if not tok:
                  return 0
              try:
                  b = tok.split('.')[1]
                  b += '=' * (4 - len(b) % 4)
                  return int(json.loads(base64.b64decode(b.replace('-', '+').replace('_', '/'))).get('exp', 0))
              except Exception:
                  return 0

          def read_pod_auth(path):
              try:
                  with open(path) as f:
                      d = json.load(f)
              except Exception:
                  return None
              tokens = d.get('tokens') if isinstance(d.get('tokens'), dict) else d
              access = tokens.get('access_token', '') or d.get('access_token', '')
              refresh = tokens.get('refresh_token', '') or d.get('refresh_token', '')
              id_tok = tokens.get('id_token', '') or d.get('id_token', '')
              if not (access or refresh):
                  return None
              return access, refresh, id_tok

          chosen = None
          for label in ('1', '2', '3'):
              rec = read_pod_auth(f'/chatgpt-auth/auth-{label}.json')
              if not rec:
                  continue
              access, refresh, id_tok = rec
              chosen = (label, access, refresh, id_tok, token_exp(access))
              print(f'seed: using pod-side auth-{label}.json (exp={chosen[4]})')
              break

          out = {}
          if chosen:
              label, access, refresh, id_tok, exp = chosen
              out = {'access_token': access, 'expires_at': exp}
              if refresh:
                  out['refresh_token'] = refresh
              if id_tok:
                  out['id_token'] = id_tok
          else:
              print('seed: no pod-side auth-N.json found — writing empty auth.json. '
                    'Run `/scripts/auth-login.sh <N>` from the codex-cli sidecar to seed.')

          with open('/chatgpt-auth/auth.json', 'w') as f:
              json.dump(out, f)
        volumeMounts:
        - name: chatgpt-auth
          mountPath: /chatgpt-auth
      volumes:
      - name: litellm-config
        configMap:
          name: litellm-config
      - name: chatgpt-auth
        {{- if .Values.litellm.chatgptAuth.persistence.enabled }}
        persistentVolumeClaim:
          claimName: litellm-chatgpt-auth
        {{- else }}
        emptyDir: {}
        {{- end }}
      {{- with .Values.litellm.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.litellm.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
