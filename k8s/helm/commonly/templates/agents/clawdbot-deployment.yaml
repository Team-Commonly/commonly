{{- if .Values.agents.clawdbot.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clawdbot-gateway
  namespace: {{ include "commonly.namespace" . }}
  labels:
    {{- include "commonly.labels" . | nindent 4 }}
    app: clawdbot-gateway
spec:
  replicas: 1
  {{- if .Values.agents.clawdbot.strategy }}
  strategy:
    {{- toYaml .Values.agents.clawdbot.strategy | nindent 4 }}
  {{- else }}
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "commonly.selectorLabels" . | nindent 6 }}
      app: clawdbot-gateway
  template:
    metadata:
      labels:
        {{- include "commonly.selectorLabels" . | nindent 8 }}
        app: clawdbot-gateway
    spec:
      {{- with .Values.agents.clawdbot.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
      - name: clawdbot-auth-seed
        image: "{{ .Values.agents.clawdbot.image.repository }}:{{ .Values.agents.clawdbot.image.tag }}"
        imagePullPolicy: {{ .Values.agents.clawdbot.image.pullPolicy }}
        command:
        - /bin/sh
        - -c
        - |
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const configPath = process.env.OPENCLAW_CONFIG_PATH || '/config/moltbot.json';
          const stateDir = process.env.OPENCLAW_STATE_DIR || '/state';
          const stateConfigPath = path.join(stateDir, 'moltbot.json');
          const geminiKey = (process.env.GEMINI_API_KEY || '').trim();
          const geminiKey2 = (process.env.GEMINI_API_KEY_2 || '').trim();
          const openrouterKey = (process.env.OPENROUTER_API_KEY || '').trim();
          const anthropicKey = (process.env.ANTHROPIC_API_KEY || '').trim();
          const openaiKey = (process.env.OPENAI_API_KEY || '').trim();
          const codexAccess = (process.env.OPENAI_CODEX_ACCESS_TOKEN || '').trim();
          const codexRefresh = (process.env.OPENAI_CODEX_REFRESH_TOKEN || '').trim();
          // OpenClaw compares profile.expires against Date.now() (milliseconds).
          // The secret stores expires_at as Unix SECONDS (10-digit) from the OAuth
          // device flow. Convert to ms here; pass-through if already 13-digit ms.
          const _toMs = (s) => { const n = parseInt(s || '0', 10); return n > 0 && n < 10_000_000_000 ? n * 1000 : n; };
          const codexExpires = _toMs(process.env.OPENAI_CODEX_EXPIRES_AT);
          const codexAccess2 = (process.env.OPENAI_CODEX_ACCESS_TOKEN_2 || '').trim();
          const codexRefresh2 = (process.env.OPENAI_CODEX_REFRESH_TOKEN_2 || '').trim();
          const codexExpires2 = _toMs(process.env.OPENAI_CODEX_EXPIRES_AT_2);
          const codexIdToken2 = (process.env.OPENAI_CODEX_ID_TOKEN_2 || '').trim();
          const codexAccountId2 = (process.env.OPENAI_CODEX_ACCOUNT_ID_2 || '').trim();
          const codexAccess3 = (process.env.OPENAI_CODEX_ACCESS_TOKEN_3 || '').trim();
          const codexRefresh3 = (process.env.OPENAI_CODEX_REFRESH_TOKEN_3 || '').trim();
          const codexExpires3 = _toMs(process.env.OPENAI_CODEX_EXPIRES_AT_3);
          const codexIdToken3 = (process.env.OPENAI_CODEX_ID_TOKEN_3 || '').trim();
          const codexAccountId3 = (process.env.OPENAI_CODEX_ACCOUNT_ID_3 || '').trim();
          if (!fs.existsSync(configPath)) {
            console.log('[auth-seed] missing config:', configPath);
            process.exit(0);
          }
          let cfg;
          try {
            cfg = JSON.parse(fs.readFileSync(configPath, 'utf8'));
          } catch (err) {
            console.log('[auth-seed] invalid config:', err.message);
            process.exit(0);
          }
          // Preserve accounts from the existing PVC state across gateway restarts.
          // The ConfigMap carries gateway settings but accounts are written to the PVC
          // by the provisioner at runtime — the ConfigMap accounts section is often empty.
          // Merging ensures agents stay connected after a pod restart without requiring
          // a full reprovision-all.
          let existingState = null;
          if (fs.existsSync(stateConfigPath)) {
            try { existingState = JSON.parse(fs.readFileSync(stateConfigPath, 'utf8')); } catch (e) {}
          }
          const existingAccounts = existingState?.channels?.commonly?.accounts || {};
          const cfgAccounts = cfg?.channels?.commonly?.accounts || {};
          // ConfigMap wins per-accountId (for updates), PVC-only accounts are preserved
          const mergedAccounts = { ...existingAccounts, ...cfgAccounts };
          const preserved = Object.keys(existingAccounts).filter(k => !cfgAccounts[k]).length;
          if (preserved > 0) {
            cfg.channels = cfg.channels || {};
            cfg.channels.commonly = cfg.channels.commonly || {};
            cfg.channels.commonly.accounts = mergedAccounts;
            console.log('[auth-seed] preserved', preserved, 'accounts from existing PVC state');
          }
          // Preserve agents.list and bindings from PVC — these are written by the provisioner
          // at runtime and are NOT in the ConfigMap. Without this, every gateway restart wipes
          // all agent configs because cfg (ConfigMap) has an empty agents.list.
          const existingAgents = existingState?.agents?.list;
          if (Array.isArray(existingAgents) && existingAgents.length > 0) {
            cfg.agents = cfg.agents || {};
            cfg.agents.list = existingAgents;
            console.log('[auth-seed] preserved', existingAgents.length, 'agents from existing PVC state');
          }
          const existingBindings = existingState?.bindings;
          if (Array.isArray(existingBindings) && existingBindings.length > 0) {
            cfg.bindings = existingBindings;
            console.log('[auth-seed] preserved', existingBindings.length, 'bindings from existing PVC state');
          }
          // Write merged config to PVC
          fs.writeFileSync(stateConfigPath, JSON.stringify(cfg, null, 2));
          console.log('[auth-seed] wrote config to writable path:', stateConfigPath);
          const accounts = cfg?.channels?.commonly?.accounts || {};
          const accountIds = Object.keys(accounts);
          if (!accountIds.length) {
            console.log('[auth-seed] no accounts found');
            process.exit(0);
          }
          accountIds.forEach((accountId) => {
            const agentDir = path.join(stateDir, 'agents', accountId, 'agent');
            const authPath = path.join(agentDir, 'auth-profiles.json');
            const customProfiles = accounts[accountId]?.authProfiles;
            const hasCustomProfiles = customProfiles && typeof customProfiles === 'object'
              && Object.keys(customProfiles).length > 0;
            fs.mkdirSync(agentDir, { recursive: true });
            // Load existing file if present (patch mode) to avoid clobbering live-refreshed tokens
            let store;
            if (!hasCustomProfiles && fs.existsSync(authPath)) {
              try { store = JSON.parse(fs.readFileSync(authPath, 'utf8')); } catch (e) { store = null; }
              store = store || { version: 1, profiles: {} };
              store.profiles = store.profiles || {};
            } else {
              store = { version: 1, profiles: hasCustomProfiles ? { ...customProfiles } : {} };
              if (geminiKey && !store.profiles['google:default']) {
                store.profiles['google:default'] = { type: 'api_key', provider: 'google', key: geminiKey };
              }
              if (geminiKey2 && !store.profiles['google:backup']) {
                store.profiles['google:backup'] = { type: 'api_key', provider: 'google', key: geminiKey2 };
              }
              if (openrouterKey && !store.profiles['openrouter:default']) {
                store.profiles['openrouter:default'] = { type: 'api_key', provider: 'openrouter', key: openrouterKey };
              }
              if (anthropicKey && !store.profiles['anthropic:default']) {
                store.profiles['anthropic:default'] = { type: 'api_key', provider: 'anthropic', key: anthropicKey };
              }
              if (openaiKey && !store.profiles['openai:default']) {
                store.profiles['openai:default'] = { type: 'api_key', provider: 'openai', key: openaiKey };
              }
            }
            // Always upsert codex OAuth if K8s secret has a token newer than what is on disk.
            // Account 1 is the primary; account 2 is the fallback for rate-limit resilience.
            const codexOrder = [];
            // hasLiteLLMKey: community agents have sk- key via provisioner; account-2/3 have raw JWTs
            // that LiteLLM rejects. When sk- is present, skip adding account-2/3 to codexOrder.
            const _codexCliProfile = store.profiles['openai-codex:codex-cli'];
            const hasLiteLLMKey = _codexCliProfile && typeof _codexCliProfile.access === 'string' && _codexCliProfile.access.startsWith('sk-');
            if (codexAccess && codexRefresh) {
              const existing = store.profiles['openai-codex:codex-cli'];
              const hasLiteLLMKey = existing && typeof existing.access === 'string' && existing.access.startsWith('sk-');
              if (!hasLiteLLMKey && (!existing || codexExpires > (existing.expires || 0))) {
                store.profiles['openai-codex:codex-cli'] = {
                  type: 'oauth', provider: 'openai-codex',
                  access: codexAccess, refresh: codexRefresh,
                  expires: codexExpires || (Date.now() + 3600000),
                };
                console.log('[auth-seed] upserted codex oauth account-1:', authPath);
              } else if (hasLiteLLMKey) {
                console.log('[auth-seed] skipped codex oauth upsert (LiteLLM key in place):', authPath);
              }
              // Push codex-cli (account-1) LAST below, after acct-2 + acct-3, so
              // rotation tries the fresh tokens first. Track with a flag.
              var _hasCodexCli = true;
            }
            // Account 2 fallback — skip entirely when LiteLLM key is in place so
            // raw OAuth JWTs are never written to this profile.
            if (codexAccess2 && codexRefresh2 && !hasLiteLLMKey) {
              const existing2 = store.profiles['openai-codex:account-2'];
              if (!existing2 || codexExpires2 > (existing2.expires || 0)) {
                store.profiles['openai-codex:account-2'] = {
                  type: 'oauth', provider: 'openai-codex',
                  access: codexAccess2, refresh: codexRefresh2,
                  expires: codexExpires2 || (Date.now() + 3600000),
                };
                console.log('[auth-seed] upserted codex oauth account-2:', authPath);
              }
              codexOrder.push('openai-codex:account-2');
            }
            // order is written after all account blocks below so account-3 is included
            // Also write ~/.codex/auth.json in chatgpt format so acpx uses chatgpt auth
            // (not codex-api-key which requires api.responses.write scope).
            // acpx reads a single auth.json — use account-1 as primary.
            if (codexAccess && codexRefresh) {
              const codexAuthDir = path.join(stateDir, 'agents', accountId, '.codex');
              const codexAuthPath = path.join(codexAuthDir, 'auth.json');
              const codexIdToken = (process.env.OPENAI_CODEX_ID_TOKEN || '').trim();
              const codexAccountId = (process.env.OPENAI_CODEX_ACCOUNT_ID || '').trim();
              const existingCodexAuth = fs.existsSync(codexAuthPath)
                ? (() => { try { return JSON.parse(fs.readFileSync(codexAuthPath, 'utf8')); } catch { return null; } })()
                : null;
              const existingExpires = existingCodexAuth?.tokens?.expires_at
                ? new Date(existingCodexAuth.tokens.expires_at).getTime() : 0;
              if (!existingCodexAuth || codexExpires > existingExpires) {
                fs.mkdirSync(codexAuthDir, { recursive: true });
                const codexAuth = {
                  auth_mode: 'chatgpt',
                  OPENAI_API_KEY: null,
                  tokens: {
                    ...(codexIdToken ? { id_token: codexIdToken } : {}),
                    access_token: codexAccess,
                    refresh_token: codexRefresh,
                    ...(codexAccountId ? { account_id: codexAccountId } : {}),
                  },
                  last_refresh: new Date().toISOString(),
                };
                fs.writeFileSync(codexAuthPath, JSON.stringify(codexAuth, null, 2));
                console.log('[auth-seed] wrote codex auth.json:', codexAuthPath);
                // Write to shared PVC path so lifecycle postStart can copy it to HOME in the main container.
                // (Init container and main container have separate ephemeral filesystems; only volumes are shared.)
                const sharedCodexPath = path.join(stateDir, '.codex', 'auth.json');
                fs.mkdirSync(path.dirname(sharedCodexPath), { recursive: true });
                fs.writeFileSync(sharedCodexPath, JSON.stringify(codexAuth, null, 2));
                console.log('[auth-seed] wrote codex auth.json to shared PVC:', sharedCodexPath);
              }
            }
            // Upsert account-2 fallback profile if K8s secret has a second Codex account
            if (codexAccess2 && codexRefresh2) {
              const existing2 = store.profiles['openai-codex:account-2'];
              if (!existing2 || codexExpires2 > (existing2.expires || 0)) {
                store.profiles['openai-codex:account-2'] = {
                  type: 'oauth', provider: 'openai-codex',
                  access: codexAccess2, refresh: codexRefresh2,
                  expires: codexExpires2 || (Date.now() + 3600000),
                };
                console.log('[auth-seed] upserted codex oauth account-2:', authPath);
              }
              // Write auth-2.json to shared PVC so acpx_run can swap to account-2 on rate-limit.
              const auth2Json = {
                auth_mode: 'chatgpt',
                OPENAI_API_KEY: null,
                tokens: {
                  ...(codexIdToken2 ? { id_token: codexIdToken2 } : {}),
                  access_token: codexAccess2,
                  refresh_token: codexRefresh2,
                  ...(codexAccountId2 ? { account_id: codexAccountId2 } : {}),
                },
                last_refresh: new Date().toISOString(),
              };
              const sharedAuth2Path = path.join(stateDir, '.codex', 'auth-2.json');
              fs.mkdirSync(path.dirname(sharedAuth2Path), { recursive: true });
              fs.writeFileSync(sharedAuth2Path, JSON.stringify(auth2Json, null, 2));
              console.log('[auth-seed] wrote codex auth-2.json to shared PVC:', sharedAuth2Path);
            }
            // Upsert account-3 fallback profile if K8s secret has a third Codex account.
            // Skip when LiteLLM key is in place so raw OAuth JWTs are never written.
            // Account rotation is handled by LiteLLM internally — no direct OAuth fallback needed.
            if (codexAccess3 && codexRefresh3 && !hasLiteLLMKey) {
              const existing3 = store.profiles['openai-codex:account-3'];
              if (!existing3 || codexExpires3 > (existing3.expires || 0)) {
                store.profiles['openai-codex:account-3'] = {
                  type: 'oauth', provider: 'openai-codex',
                  access: codexAccess3, refresh: codexRefresh3,
                  expires: codexExpires3 || (Date.now() + 3600000),
                };
                console.log('[auth-seed] upserted codex oauth account-3:', authPath);
              }
              const auth3Json = {
                auth_mode: 'chatgpt',
                OPENAI_API_KEY: null,
                tokens: {
                  ...(codexIdToken3 ? { id_token: codexIdToken3 } : {}),
                  access_token: codexAccess3,
                  refresh_token: codexRefresh3,
                  ...(codexAccountId3 ? { account_id: codexAccountId3 } : {}),
                },
                last_refresh: new Date().toISOString(),
              };
              const sharedAuth3Path = path.join(stateDir, '.codex', 'auth-3.json');
              fs.mkdirSync(path.dirname(sharedAuth3Path), { recursive: true });
              fs.writeFileSync(sharedAuth3Path, JSON.stringify(auth3Json, null, 2));
              console.log('[auth-seed] wrote codex auth-3.json to shared PVC:', sharedAuth3Path);
              codexOrder.push('openai-codex:account-3');
            }
            // Append account-1 at the END so rotation tries fresh accts first.
            // Remove this when account-1 is re-logged-in and fresh.
            if (typeof _hasCodexCli !== 'undefined' && _hasCodexCli) {
              codexOrder.push('openai-codex:codex-cli');
            }
            // Persist auth order so OpenClaw falls back across accounts on rate-limit
            // NOTE: field must be 'order' (not 'authOrder') — OpenClaw reads store.order
            if (codexOrder.length > 0) {
              store.order = store.order || {};
              store.order['openai-codex'] = codexOrder;
            }
            fs.writeFileSync(authPath, JSON.stringify(store, null, 2));
            console.log('[auth-seed] wrote:', authPath, hasCustomProfiles ? 'custom profiles' : 'patched');
          });
          // Also write auth-profiles.json to the gateway 'main' agentDir — OpenClaw resolves
          // global LLM model auth from /state/agents/main/agent/auth-profiles.json, not the
          // per-account agentDir. Use the last account's store as representative (all accounts
          // share the same codex credentials).
          const mainAgentDir = path.join(stateDir, 'agents', 'main', 'agent');
          const mainAuthPath = path.join(mainAgentDir, 'auth-profiles.json');
          if (accountIds.length > 0) {
            const repAuthPath = path.join(stateDir, 'agents', accountIds[0], 'agent', 'auth-profiles.json');
            if (fs.existsSync(repAuthPath)) {
              fs.mkdirSync(mainAgentDir, { recursive: true });
              fs.copyFileSync(repAuthPath, mainAuthPath);
              console.log('[auth-seed] copied auth-profiles.json to main agentDir:', mainAuthPath);
            }
          }
          // Write global git identity to PVC so main container picks it up via GIT_CONFIG_GLOBAL.
          const gitUserName = (process.env.GIT_USER_NAME || '').trim();
          const gitUserEmail = (process.env.GIT_USER_EMAIL || '').trim();
          if (gitUserName && gitUserEmail) {
            const gitConfigPath = path.join(stateDir, '.gitconfig');
            const gitConfig = `[user]\n\tname = ${gitUserName}\n\temail = ${gitUserEmail}\n`;
            fs.writeFileSync(gitConfigPath, gitConfig);
            console.log('[auth-seed] wrote git identity:', gitUserName, '<' + gitUserEmail + '>');
          }
          NODE
        env:
        - name: OPENCLAW_CONFIG_PATH
          value: /config/moltbot.json
        - name: OPENCLAW_STATE_DIR
          value: /state
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: gemini-api-key
        - name: GEMINI_API_KEY_2
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: gemini-api-key-2
              optional: true
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: anthropic-api-key
              optional: true
        - name: OPENROUTER_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openrouter-api-key
              optional: true
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openai-api-key
              optional: true
        - name: OPENAI_CODEX_ACCESS_TOKEN
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openai-codex-access-token
              optional: true
        - name: OPENAI_CODEX_REFRESH_TOKEN
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openai-codex-refresh-token
              optional: true
        - name: OPENAI_CODEX_EXPIRES_AT
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openai-codex-expires-at
              optional: true
        - name: OPENAI_CODEX_ID_TOKEN
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openai-codex-id-token
              optional: true
        - name: OPENAI_CODEX_ACCOUNT_ID
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openai-codex-account-id
              optional: true
        - name: OPENAI_CODEX_ACCESS_TOKEN_2
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openai-codex-access-token-2
              optional: true
        - name: OPENAI_CODEX_REFRESH_TOKEN_2
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openai-codex-refresh-token-2
              optional: true
        - name: OPENAI_CODEX_EXPIRES_AT_2
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openai-codex-expires-at-2
              optional: true
        - name: OPENAI_CODEX_ID_TOKEN_2
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openai-codex-id-token-2
              optional: true
        - name: OPENAI_CODEX_ACCOUNT_ID_2
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openai-codex-account-id-2
              optional: true
        - name: OPENAI_CODEX_ACCESS_TOKEN_3
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openai-codex-access-token-3
              optional: true
        - name: OPENAI_CODEX_REFRESH_TOKEN_3
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openai-codex-refresh-token-3
              optional: true
        - name: OPENAI_CODEX_EXPIRES_AT_3
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openai-codex-expires-at-3
              optional: true
        - name: OPENAI_CODEX_ID_TOKEN_3
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openai-codex-id-token-3
              optional: true
        - name: OPENAI_CODEX_ACCOUNT_ID_3
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openai-codex-account-id-3
              optional: true
        - name: GIT_USER_NAME
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: git-user-name
              optional: true
        - name: GIT_USER_EMAIL
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: git-user-email
              optional: true
        volumeMounts:
        - name: clawdbot-config
          mountPath: /config
          readOnly: true
        - name: clawdbot-state
          mountPath: /state
      # ADR-005 Stage 2: install codex CLI + @commonly/cli into a shared
      # volume the gateway container mounts. Avoids modifying the
      # _external/clawdbot Dockerfile (which is a submodule on the openclaw
      # fork) — the install lives in helm so it ships with the deploy.
      # `node:22-bookworm-slim` matches the runtime container's Node major
      # so binaries built for libc are compatible.
      - name: codex-tools-installer
        image: node:22-bookworm-slim
        command:
        - /bin/sh
        - -c
        - |
          set -e
          export NPM_CONFIG_PREFIX=/tools
          npm install --global --no-audit --no-fund \
            @openai/codex@latest \
            @commonly/cli@latest
          ls -la /tools/bin/ || true
          /tools/bin/codex --version || true
          /tools/bin/commonly --version || true
        volumeMounts:
        - name: codex-tools
          mountPath: /tools
      containers:
      - name: clawdbot-gateway
        image: "{{ .Values.agents.clawdbot.image.repository }}:{{ .Values.agents.clawdbot.image.tag }}"
        imagePullPolicy: {{ .Values.agents.clawdbot.image.pullPolicy }}
        command:
        - node
        - dist/index.js
        - gateway
        - --bind
        - {{ .Values.agents.clawdbot.config.gatewayBind | default "lan" | quote }}
        - --port
        - {{ .Values.agents.clawdbot.config.gatewayPort | default 18789 | quote }}
        - --allow-unconfigured
        lifecycle:
          postStart:
            exec:
              command:
              - /bin/sh
              - -c
              - mkdir -p /home/node/.codex && cp /state/.codex/auth.json /home/node/.codex/auth.json 2>/dev/null || true
        env:
        # ADR-005 Stage 2: prepend the codex-tools volume to PATH so
        # `codex` and `commonly` are on PATH for operator `kubectl exec`
        # invocations and the run-loop process. Order matters — these
        # binaries shadow any same-named ones in the openclaw image.
        - name: PATH
          value: "/tools/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
        - name: CLAWDBOT_GATEWAY_PORT
          value: {{ .Values.agents.clawdbot.config.gatewayPort | default 18789 | quote }}
        - name: CLAWDBOT_GATEWAY_BIND
          value: {{ .Values.agents.clawdbot.config.gatewayBind | default "lan" | quote }}
        - name: CLAWDBOT_GATEWAY_TOKEN
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: clawdbot-gateway-token
        - name: OPENCLAW_GATEWAY_TOKEN
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: clawdbot-gateway-token
        - name: CLAWDBOT_CONFIG_DIR
          value: /config
        - name: OPENCLAW_STATE_DIR
          value: /state
        - name: OPENCLAW_CONFIG_PATH
          value: /state/moltbot.json
        - name: CLAWDBOT_WORKSPACE_DIR
          value: /workspace
        - name: CLAWDBOT_SKIP_BROWSER_CONTROL_SERVER
          value: "1"
        - name: CLAWDBOT_SKIP_CANVAS_HOST
          value: "1"
        - name: COMMONLY_API_URL
          value: {{ .Values.backend.env.commonlyApiUrl | default (printf "http://backend.%s.svc.cluster.local:5000" (include "commonly.namespace" .)) | quote }}
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: gemini-api-key
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: anthropic-api-key
              optional: true
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openai-api-key
              optional: true
        - name: OPENROUTER_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openrouter-api-key
              optional: true
        - name: BRAVE_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: brave-api-key
              optional: true
        - name: BRAVE_API_KEY_2
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: brave-api-key-2
              optional: true
        - name: FIRECRAWL_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: firecrawl-api-key
              optional: true
        - name: DEEPGRAM_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: deepgram-api-key
              optional: true
        # GitHub PAT — inherited by acpx_run sub-agents so they can clone repos and open PRs
        - name: GITHUB_PAT
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: GITHUB_PAT
              optional: true
        # Git identity — written to PVC by init container; picked up here via GIT_CONFIG_GLOBAL
        - name: GIT_CONFIG_GLOBAL
          value: /state/.gitconfig
        # LiteLLM — routes acpx_run calls through LiteLLM for unified logging + model fallback
        - name: LITELLM_BASE_URL
          value: "http://litellm:4000"
        - name: LITELLM_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: litellm-master-key
              optional: true
        ports:
        - containerPort: {{ .Values.agents.clawdbot.config.gatewayPort | default 18789 }}
          name: gateway
        - containerPort: {{ .Values.agents.clawdbot.config.bridgePort | default 18790 }}
          name: bridge
        resources:
          {{- toYaml .Values.agents.clawdbot.resources | nindent 10 }}
        volumeMounts:
        - name: clawdbot-config
          mountPath: /config
          readOnly: true
        - name: clawdbot-state
          mountPath: /state
        - name: clawdbot-workspace
          mountPath: /workspace
        # ADR-005 Stage 2 — codex + commonly CLIs installed by the
        # codex-tools-installer init container. Mounted read-only here
        # since nothing in the main container needs to write to it.
        - name: codex-tools
          mountPath: /tools
          readOnly: true
      volumes:
      - name: clawdbot-config
        configMap:
          name: clawdbot-config
      - name: clawdbot-state
        persistentVolumeClaim:
          claimName: clawdbot-config-pvc
      - name: clawdbot-workspace
        persistentVolumeClaim:
          claimName: clawdbot-workspace-pvc
      # emptyDir is fine — re-populated on every pod start by the init
      # container. Adds ~30s to startup but avoids a PVC + invalidation
      # logic. Revisit if pod-restart latency becomes a real concern.
      - name: codex-tools
        emptyDir: {}
      {{- with .Values.agents.clawdbot.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agents.clawdbot.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
