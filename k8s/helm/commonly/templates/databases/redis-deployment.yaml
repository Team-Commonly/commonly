{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: {{ include "commonly.namespace" . }}
  labels:
    {{- include "commonly.redis.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "commonly.redis.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "commonly.redis.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - name: redis
        image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
        imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.redis.service.port }}
          name: redis
        resources:
          {{- toYaml .Values.redis.resources | nindent 10 }}
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      {{- if and .Values.redis.nodeSelector (gt (len .Values.redis.nodeSelector) 0) }}
      nodeSelector:
        {{- toYaml .Values.redis.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if and .Values.redis.tolerations (gt (len .Values.redis.tolerations) 0) }}
      tolerations:
        {{- toYaml .Values.redis.tolerations | nindent 8 }}
      {{- end }}
{{- end }}
