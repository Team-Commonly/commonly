# GKE Development Environment Overrides
# Use with: helm install commonly . -f values-dev.yaml

global:
  namespace: commonly-dev
  environment: development

agentProvisioning:
  enabled: true
  createWorkspacePvc: false

backend:
  replicaCount: 1
  image:
    repository: gcr.io/commonly-test/commonly-backend
    tag: latest
    pullPolicy: Always  # Always pull in dev
  nodeSelector:
    pool: dev
  tolerations:
    - key: "pool"
      operator: "Equal"
      value: "dev"
      effect: "NoSchedule"
  env:
    nodeEnv: development
    agentProvisionerK8s: "1"
    agentProvisionerDocker: "0"
    agentProvisionerNodePool: "dev"
    commonlyApiUrl: ""
    clawdbotGatewayUrl: ""
    moltbotGatewayUrl: ""
    pgHost: "commonly-psql-commonly.b.aivencloud.com"
    pgPort: "25450"
    pgDatabase: "defaultdb"
    pgUser: "avnadmin"
    pgSslEnabled: "true"
    pgCaCertPath: "/app/certs/ca.pem"
    marketplaceManifestPath: "/app/packages/commonly-marketplace/marketplace.json"
    logLevel: debug

frontend:
  replicaCount: 1
  image:
    repository: gcr.io/commonly-test/commonly-frontend
    tag: latest
    pullPolicy: Always
  nodeSelector:
    pool: dev
  tolerations:
    - key: "pool"
      operator: "Equal"
      value: "dev"
      effect: "NoSchedule"

mongodb:
  enabled: false
  persistence:
    storageClass: standard-rwo  # GCP standard persistent disk
    size: 50Gi
  nodeSelector:
    pool: dev
  tolerations:
    - key: "pool"
      operator: "Equal"
      value: "dev"
      effect: "NoSchedule"

postgresql:
  enabled: false
  persistence:
    storageClass: standard-rwo
    size: 50Gi

redis:
  enabled: true
  nodeSelector:
    pool: dev
  tolerations:
    - key: "pool"
      operator: "Equal"
      value: "dev"
      effect: "NoSchedule"

externalSecrets:
  enabled: false
  serviceAccount:
    gcpServiceAccount: commonly-secrets-sa@commonly-test.iam.gserviceaccount.com

agents:
  clawdbot:
    enabled: true
    persistence:
      config:
        storageClass: standard-rwo
        size: 1Gi
        accessMode: ReadWriteOnce
      workspace:
        storageClass: standard-rwo
        size: 10Gi
        accessMode: ReadWriteOnce
    nodeSelector:
      pool: dev
    tolerations:
      - key: "pool"
        operator: "Equal"
        value: "dev"
        effect: "NoSchedule"

  commonlyBot:
    enabled: false  # Enable manually when needed

rbac:
  create: true

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  hosts:
    frontend:
      host: app-dev.commonly.me
    backend:
      host: api-dev.commonly.me
  tls:
    enabled: false  # Enable after setting up cert-manager

configMaps:
  marketplaceManifest:
    enabled: true
  skillsCatalog:
    enabled: true
  postgresCA:
    enabled: false

skillsCatalogStorage:
  enabled: true
  size: 1Gi
  storageClassName: standard-rwo
  accessMode: ReadWriteOnce
  bootstrapFromImage: true
  downloadUrl: "https://storage.googleapis.com/commonly-test_cloudbuild/awesome-agent-skills-index.json"

autoscaling:
  backend:
    enabled: false  # Enable after Phase 3

monitoring:
  prometheus:
    enabled: false  # Enable after Phase 3

# Cloudflare Tunnel (optional)
cloudflared:
  enabled: false

backup:
  mongodb:
    enabled: false  # Enable after Phase 3
  postgresql:
    enabled: false  # Enable after Phase 3
