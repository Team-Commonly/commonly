# GKE Development Environment Overrides
# Use with: helm install commonly . -f values-dev.yaml

global:
  namespace: commonly-dev
  environment: development

agentProvisioning:
  enabled: true
  createWorkspacePvc: false

backend:
  replicaCount: 1
  image:
    repository: gcr.io/YOUR_GCP_PROJECT_ID/commonly-backend
    tag: "20260317233807"
    pullPolicy: Always  # Always pull in dev
  nodeSelector:
    pool: dev
  tolerations:
    - key: "pool"
      operator: "Equal"
      value: "dev"
      effect: "NoSchedule"
  env:
    nodeEnv: development
    registrationInviteOnly: "1"
    agentProvisionerK8s: "1"
    agentProvisionerDocker: "0"
    agentProvisionerNodePool: "dev"
    frontendUrl: "https://app-dev.commonly.me"
    backendUrl: "https://api-dev.commonly.me"
    commonlyApiUrl: ""
    clawdbotGatewayUrl: ""
    moltbotGatewayUrl: ""
    pgHost: "YOUR_PG_HOST"
    pgPort: "25450"
    pgDatabase: "defaultdb"
    pgUser: "avnadmin"
    pgSslEnabled: "true"
    pgCaCertPath: "/app/certs/ca.pem"
    marketplaceManifestPath: "/app/packages/commonly-marketplace/marketplace.json"
    logLevel: debug
    agentSessionMaxSizeKb: "2000"

frontend:
  replicaCount: 1
  image:
    repository: gcr.io/YOUR_GCP_PROJECT_ID/commonly-frontend
    tag: "20260317233807"
    pullPolicy: Always
  nodeSelector:
    pool: dev
  tolerations:
    - key: "pool"
      operator: "Equal"
      value: "dev"
      effect: "NoSchedule"

mongodb:
  enabled: false
  persistence:
    storageClass: standard-rwo  # GCP standard persistent disk
    size: 50Gi
  nodeSelector:
    pool: dev
  tolerations:
    - key: "pool"
      operator: "Equal"
      value: "dev"
      effect: "NoSchedule"

postgresql:
  enabled: false
  persistence:
    storageClass: standard-rwo
    size: 50Gi

redis:
  enabled: true
  nodeSelector:
    pool: dev
  tolerations:
    - key: "pool"
      operator: "Equal"
      value: "dev"
      effect: "NoSchedule"

externalSecrets:
  enabled: true
  secretStore:
    name: gcpsm-secretstore
    projectId: YOUR_GCP_PROJECT_ID
    clusterLocation: us-central1
    clusterName: commonly-dev

agents:
  clawdbot:
    enabled: true
    image:
      repository: gcr.io/YOUR_GCP_PROJECT_ID/clawdbot-gateway
      tag: "20260317233807"
      pullPolicy: Always
    strategy:
      type: Recreate
    persistence:
      config:
        storageClass: standard-rwo
        size: 1Gi
        accessMode: ReadWriteOnce
      workspace:
        storageClass: standard-rwo
        size: 10Gi
        accessMode: ReadWriteOnce
    nodeSelector:
      pool: dev
    tolerations:
      - key: "pool"
        operator: "Equal"
        value: "dev"
        effect: "NoSchedule"

  commonlyBot:
    enabled: true
    image:
      repository: gcr.io/YOUR_GCP_PROJECT_ID/commonly-bot
      tag: "latest"
      pullPolicy: Always
    nodeSelector:
      pool: dev
    tolerations:
      - key: "pool"
        operator: "Equal"
        value: "dev"
        effect: "NoSchedule"

rbac:
  create: true

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  hosts:
    frontend:
      host: app-dev.commonly.me
    backend:
      host: api-dev.commonly.me
  tls:
    enabled: false  # Enable after setting up cert-manager

configMaps:
  marketplaceManifest:
    enabled: true
  skillsCatalog:
    enabled: true
  postgresCA:
    enabled: false

skillsCatalogStorage:
  enabled: true
  size: 1Gi
  storageClassName: standard-rwo
  accessMode: ReadWriteOnce
  bootstrapFromImage: true
  downloadUrl: "https://storage.googleapis.com/YOUR_GCP_PROJECT_ID_cloudbuild/awesome-agent-skills-index.json"

autoscaling:
  backend:
    enabled: false  # Enable after Phase 3

monitoring:
  prometheus:
    enabled: false  # Enable after Phase 3

# Cloudflare Tunnel (optional)
cloudflared:
  enabled: true
  namespace: ingress-nginx
  nodeSelector:
    pool: dev
  tolerations:
    - key: "pool"
      operator: "Equal"
      value: "dev"
      effect: "NoSchedule"
  ingressService: ingress-nginx-controller.ingress-nginx.svc.cluster.local

backup:
  mongodb:
    enabled: false  # Enable after Phase 3
  postgresql:
    enabled: false  # Enable after Phase 3
