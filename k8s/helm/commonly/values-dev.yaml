# GKE Development Environment Overrides
# Use with: helm install commonly . -f values-dev.yaml

global:
  namespace: commonly-dev
  environment: development

agentProvisioning:
  enabled: true
  createWorkspacePvc: false

backend:
  replicaCount: 1
  image:
    repository: gcr.io/YOUR_GCP_PROJECT_ID/commonly-backend
    tag: "20260417214615-r4"
    pullPolicy: Always  # Always pull in dev
  nodeSelector:
    pool: dev
  tolerations:
    - key: "pool"
      operator: "Equal"
      value: "dev"
      effect: "NoSchedule"
  env:
    nodeEnv: development
    registrationInviteOnly: "1"
    agentProvisionerK8s: "1"
    agentProvisionerDocker: "0"
    agentProvisionerNodePool: "dev"
    frontendUrl: "https://app-dev.commonly.me"
    backendUrl: "https://api-dev.commonly.me"
    commonlyApiUrl: ""
    clawdbotGatewayUrl: ""
    moltbotGatewayUrl: ""
    pgHost: "YOUR_PG_HOST"
    pgPort: "25450"
    pgDatabase: "defaultdb"
    pgUser: "avnadmin"
    pgSslEnabled: "true"
    pgCaCertPath: "/app/certs/ca.pem"
    marketplaceManifestPath: "/app/packages/commonly-marketplace/marketplace.json"
    logLevel: debug
    agentSessionMaxSizeKb: "150"
    # Bypass off — provisioner now writes LiteLLM virtual keys (not raw
    # Codex JWTs) to per-agent auth-profiles, and LiteLLM proxies Codex
    # via /chatgpt-auth/auth.json (rotator-managed). Pairs with
    # litellm.codexBypassLitellm: false + litellm.codexAuthRotator.enabled: true.
    codexBypassLitellm: "false"

frontend:
  replicaCount: 1
  image:
    repository: gcr.io/YOUR_GCP_PROJECT_ID/commonly-frontend
    tag: "20260412125218"
    pullPolicy: Always
  nodeSelector:
    pool: dev
  tolerations:
    - key: "pool"
      operator: "Equal"
      value: "dev"
      effect: "NoSchedule"

mongodb:
  enabled: false
  persistence:
    storageClass: standard-rwo  # GCP standard persistent disk
    size: 50Gi
  nodeSelector:
    pool: dev
  tolerations:
    - key: "pool"
      operator: "Equal"
      value: "dev"
      effect: "NoSchedule"

postgresql:
  enabled: false
  persistence:
    storageClass: standard-rwo
    size: 50Gi

redis:
  enabled: true
  nodeSelector:
    pool: dev
  tolerations:
    - key: "pool"
      operator: "Equal"
      value: "dev"
      effect: "NoSchedule"

externalSecrets:
  enabled: true
  secretStore:
    name: gcpsm-secretstore
    projectId: YOUR_GCP_PROJECT_ID
    clusterLocation: us-central1
    clusterName: commonly-dev

agents:
  clawdbot:
    enabled: true
    image:
      repository: gcr.io/YOUR_GCP_PROJECT_ID/clawdbot-gateway
      tag: "20260414192025"
      pullPolicy: Always
    strategy:
      type: Recreate
    persistence:
      config:
        storageClass: standard-rwo
        size: 1Gi
        accessMode: ReadWriteOnce
      workspace:
        storageClass: standard-rwo
        size: 10Gi
        accessMode: ReadWriteOnce
    nodeSelector:
      pool: dev
    tolerations:
      - key: "pool"
        operator: "Equal"
        value: "dev"
        effect: "NoSchedule"

  commonlyBot:
    enabled: true
    image:
      repository: gcr.io/YOUR_GCP_PROJECT_ID/commonly-bot
      tag: "20260411055334"
      pullPolicy: Always
    nodeSelector:
      pool: dev
    tolerations:
      - key: "pool"
        operator: "Equal"
        value: "dev"
        effect: "NoSchedule"

rbac:
  create: true

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  hosts:
    frontend:
      host: app-dev.commonly.me
    backend:
      host: api-dev.commonly.me
    litellm:
      host: litellm-dev.commonly.me
  tls:
    enabled: false  # Enable after setting up cert-manager

configMaps:
  marketplaceManifest:
    enabled: true
  skillsCatalog:
    enabled: true
  postgresCA:
    enabled: true

skillsCatalogStorage:
  enabled: true
  size: 1Gi
  storageClassName: standard-rwo
  accessMode: ReadWriteOnce
  bootstrapFromImage: true
  downloadUrl: "https://storage.googleapis.com/YOUR_GCP_PROJECT_ID_cloudbuild/awesome-agent-skills-index.json"

autoscaling:
  backend:
    enabled: false  # Enable after Phase 3

monitoring:
  prometheus:
    enabled: false  # Enable after Phase 3

# Cloudflare Tunnel (optional)
cloudflared:
  enabled: true
  namespace: ingress-nginx
  nodeSelector:
    pool: dev
  tolerations:
    - key: "pool"
      operator: "Equal"
      value: "dev"
      effect: "NoSchedule"
  ingressService: ingress-nginx-controller.ingress-nginx.svc.cluster.local

litellm:
  enabled: true
  # Pinned override on top of values.yaml's v1.82.3-stable default. Testing
  # whether v1.83.7-stable resolves the chatgpt/gpt-5.4 device-code-on-startup
  # crashloop (distinct from but likely related to BerriAI/litellm#25429, which
  # is still open upstream as of 2026-04-21). Roll back here if it regresses.
  image:
    repository: ghcr.io/berriai/litellm
    tag: v1.83.7-stable
  # BerriAI/litellm#25429 workaround used to live here. Now off — acpx is
  # being deprecated in commonly (see ADR-005 Stage 3) and we'd rather route
  # everything through LiteLLM than chase an upstream bug for a code path
  # we're retiring. With bypass off, all Codex traffic goes via LiteLLM's
  # chatgpt/ bridge and the rotator below handles 429-driven account swaps.
  codexBypassLitellm: false
  # Re-enable the codex-auth-rotator sidecar — swaps /chatgpt-auth/auth.json
  # between accounts every 10 min OR on 429 events written by LiteLLM's
  # custom callback. Each ChatGPT Team user has independent quota, so
  # rotation gives real multi-account benefit when one account exhausts.
  codexAuthRotator:
    enabled: true
  nodeSelector:
    pool: dev
  tolerations:
    - key: "pool"
      operator: "Equal"
      value: "dev"
      effect: "NoSchedule"

backup:
  mongodb:
    enabled: false  # Enable after Phase 3
  postgresql:
    enabled: false  # Enable after Phase 3
