name: Tests

on:
  push:
    branches: [ main, v1.0.x ]
  pull_request:
    branches: [ main, v1.0.x ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest

    env:
      JWT_SECRET: test-jwt-secret
      SENDGRID_API_KEY: fake-api-key
      SENDGRID_FROM_EMAIL: test@example.com
      FRONTEND_URL: http://localhost:3000

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: |
          npm ci --include=dev
          cd backend
          npm ci --include=dev
          cd ../frontend
          npm install --legacy-peer-deps
          cd ..

      - name: Backend TypeScript check
        run: |
          cd backend
          npm run tsc:check

      - name: Run backend tests with coverage
        run: |
          cd backend
          npx jest --coverage --forceExit

      - name: Run frontend tests with coverage
        run: |
          cd frontend
          npx jest --coverage --watchAll=false --forceExit

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage/

  integration-test:
    name: Integration Tests (real DBs)
    runs-on: ubuntu-latest
    needs: test

    services:
      mongo:
        image: mongo:7
        ports: ["27017:27017"]
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand(\"ping\").ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: postgres:16
        ports: ["5432:5432"]
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: commonly-test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      JWT_SECRET: test-jwt-secret
      SENDGRID_API_KEY: fake-api-key
      SENDGRID_FROM_EMAIL: test@example.com
      FRONTEND_URL: http://localhost:3000
      INTEGRATION_TEST: "true"
      MONGO_URI: mongodb://localhost:27017/commonly-test
      PG_HOST: localhost
      PG_PORT: "5432"
      PG_DATABASE: commonly-test
      PG_USER: postgres
      PG_PASSWORD: postgres
      PG_SSL_ENABLED: "false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install backend dependencies
        run: cd backend && npm ci --include=dev

      - name: Run integration tests
        run: |
          cd backend
          npx jest --testPathPattern="__tests__/integration" --forceExit --runInBand
