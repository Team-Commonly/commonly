name: Test Coverage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest

    env:
      MONGO_URI: mongodb://mongo:27017/commonly
      JWT_SECRET: test-jwt-secret
      PG_USER: postgres
      PG_PASSWORD: postgres
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DATABASE: commonly
      SENDGRID_API_KEY: fake-api-key
      SENDGRID_FROM_EMAIL: test@example.com
      FRONTEND_URL: http://localhost:3000

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Set up Docker Compose
        uses: isbang/compose-action@v1.5.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Create .env file
        run: |
          echo "MONGO_URI=${{ env.MONGO_URI }}" > .env
          echo "JWT_SECRET=${{ env.JWT_SECRET }}" >> .env
          echo "PG_USER=${{ env.PG_USER }}" >> .env
          echo "PG_PASSWORD=${{ env.PG_PASSWORD }}" >> .env
          echo "PG_HOST=${{ env.PG_HOST }}" >> .env
          echo "PG_PORT=${{ env.PG_PORT }}" >> .env
          echo "PG_DATABASE=${{ env.PG_DATABASE }}" >> .env
          echo "SENDGRID_API_KEY=${{ env.SENDGRID_API_KEY }}" >> .env
          echo "SENDGRID_FROM_EMAIL=${{ env.SENDGRID_FROM_EMAIL }}" >> .env
          echo "FRONTEND_URL=${{ env.FRONTEND_URL }}" >> .env

      - name: Build and start Docker containers
        run: |
          docker compose build
          docker compose up -d

      - name: Wait for containers to be ready
        run: |
          sleep 15
          docker ps | grep backend

      - name: Install backend dependencies
        run: docker exec backend npm install --include=dev

      - name: Run test coverage
        run: docker exec -e NODE_ENV=test -e JWT_SECRET=test-jwt-secret backend npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: backend/coverage/

      - name: Stop containers
        if: always()
        run: docker compose down 