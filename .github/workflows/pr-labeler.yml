name: PR Labeler

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Label PRs by change scope
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: prNumber,
              per_page: 100,
            });

            const labels = new Set();
            for (const file of files) {
              const path = file.filename;
              if (path.startsWith('.github/workflows/')) labels.add('ci');
              if (path.startsWith('k8s/') || path.startsWith('helm/')) labels.add('infra');
              if (
                path.startsWith('src/') ||
                path.startsWith('app/') ||
                path.endsWith('.ts') ||
                path.endsWith('.js')
              ) {
                labels.add('code');
              }
              if (path === 'Dockerfile' || path.includes('/Dockerfile')) labels.add('build');
            }

            const desired = [...labels];
            const existing = context.payload.pull_request.labels.map((label) => label.name);
            const toAdd = desired.filter((label) => !existing.includes(label));
            if (toAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: prNumber,
                labels: toAdd,
              });
            }
