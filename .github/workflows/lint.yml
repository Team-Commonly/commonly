name: Lint Code

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Use Docker Compose GitHub Action
      - name: Set up Docker Compose
        uses: isbang/compose-action@v1.5.1

      - name: Build Docker containers
        run: |
          docker-compose build backend frontend

      - name: Create containers (don't start services)
        run: |
          docker-compose up -d --no-start backend frontend

      # Backend linting in container
      - name: Lint Backend
        run: |
          docker-compose run --rm backend sh -c "npm install --include=dev && npm run lint"

      # Frontend linting in container
      - name: Lint Frontend
        run: |
          docker-compose run --rm frontend sh -c "npm install --include=dev && npm run lint"

      - name: Clean up
        if: always()
        run: docker-compose down 