name: Lint Code

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install backend dependencies
        run: |
          cd backend
          npm install --include=dev

      - name: Lint Backend
        run: |
          cd backend
          npm run lint

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install --include=dev

      - name: Lint Frontend
        run: |
          cd frontend
          npm run lint

      - name: Show logs if linting fails
        if: failure()
        run: |
          echo "Docker container logs:"
          docker compose logs

      - name: Clean up
        if: always()
        run: docker compose down 