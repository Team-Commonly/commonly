version: '3'

services:
  # MongoDB service
  mongo:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

  # PostgreSQL service
  postgres:
    image: postgres:latest
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
      POSTGRES_DB: ${PG_DATABASE:-commonly}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network

  # Backend service
  backend:
    build:
      context: ./backend
    container_name: backend
    ports:
      - "5000:5000"
    depends_on:
      - mongo
      - postgres
    environment:
      # Application settings
      - NODE_ENV=development
      - PORT=5000
      
      # Database settings
      - MONGO_URI=${MONGO_URI}
      - PG_USER=${PG_USER}
      - PG_PASSWORD=${PG_PASSWORD}
      - PG_HOST=${PG_HOST}
      - PG_PORT=${PG_PORT}
      - PG_DATABASE=${PG_DATABASE}
      - PG_SSL_CA_PATH=/app/ca.pem
      
      # Authentication
      - JWT_SECRET=${JWT_SECRET}
      
      # Email settings
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL}
      
      # Frontend URL
      - FRONTEND_URL=${FRONTEND_URL}
      
      # AI Integration
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      
      # Discord Integration
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_PUBLIC_KEY=${DISCORD_PUBLIC_KEY}
      
      # Marketplace manifest
      - MARKETPLACE_MANIFEST_PATH=/app/packages/commonly-marketplace/marketplace.json
      # Skills catalog index
      - SKILLS_CATALOG_PATH=/app/docs/skills/awesome-agent-skills-index.json
      # Agent provisioning config paths
      - OPENCLAW_CONFIG_PATH=/app/external/clawdbot-state/config/moltbot.json
      - COMMONLY_BOT_CONFIG_PATH=/app/external/commonly-bot-state/runtime.json
      # Allow backend to orchestrate docker compose for local runtimes
      - AGENT_PROVISIONER_DOCKER=${AGENT_PROVISIONER_DOCKER:-0}
      - AGENT_PROVISIONER_DOCKER_COMPOSE_FILE=/app/docker-compose.yml
      - DOCKER_COMPOSE_BIN=docker-compose
      
      # Test settings
      - TEST_JWT_SECRET=test-jwt-secret
      - TEST_MONGO_URI=mongodb://mongo:27017/commonly-test
    volumes:
      - ./backend:/app
      # Mount marketplace manifest and agent service manifests for auto-registration
      - ./packages/commonly-marketplace:/app/packages/commonly-marketplace:ro
      - ./external/commonly-agent-services:/app/external/commonly-agent-services:ro
      # Mount skills catalog index
      - ./docs/skills:/app/docs/skills:ro
      # Mount agent runtime config state for provisioning
      - ./external/clawdbot-state/config:/app/external/clawdbot-state/config
      - ./external/commonly-bot-state:/app/external/commonly-bot-state
      # Docker socket for provisioning (disabled by default)
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-compose.yml:/app/docker-compose.yml:ro
      - /app/node_modules
      - ./ca.pem:/app/ca.pem:ro
    networks:
      - app-network

  # Frontend service
  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL}
        - REACT_APP_DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:5000
      - REACT_APP_DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - app-network

  # LiteLLM model gateway (optional)
  litellm:
    profiles: ["litellm"]
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-dev-litellm-key}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./external/litellm/config.yaml:/app/config.yaml:ro
    ports:
      - "4000:4000"
    networks:
      - app-network
    restart: unless-stopped
    command: ["--config", "/app/config.yaml"]

networks:
  app-network:
    driver: bridge

volumes:
  mongo-data:
  postgres-data:
